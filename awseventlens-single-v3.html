/* =========================
   CONFIG (EDIT ONCE)
========================= */
const CFG = {
  API_BASE: "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod",

  // Cognito Hosted UI (photographer admin login)
  COGNITO_DOMAIN: "https://ap-south-1mva8s6f3w.auth.ap-south-1.amazoncognito.com",
  CLIENT_ID: "6j3gec3kk0q0ktkals8cr8s367",

  // IMPORTANT: put your deployed admin SPA URL here
  // Example: https://yourdomain.com/admin.html
  REDIRECT_URI: window.location.origin + window.location.pathname,

  // Public pages (if you host them)
  GUEST_SEARCH_PAGE: "index.html",
  CLIENT_GALLERY_PAGE: "client-gallery.html",
  STAFF_UPLOAD_PAGE: "staff-upload.html",
};

/* =========================
   STATE
========================= */
const S = {
  idToken: localStorage.getItem("idToken") || "",
  collections: [],
  events: [],
  ctx: { collection_id: "", event_id: "" },
};

/* =========================
   UTIL UI
========================= */
function toast(msg, type="info"){
  const el = document.getElementById("toast");
  el.className = "fixed bottom-5 right-5";
  el.innerHTML = `
    <div class="card rounded-2xl px-4 py-3 shadow-xl max-w-md border ${
      type==="ok" ? "border-emerald-400/30" :
      type==="err" ? "border-red-400/30" :
      "border-white/10"
    }">
      <div class="flex items-start gap-3">
        <div class="mt-0.5 ${
          type==="ok" ? "text-emerald-300" :
          type==="err" ? "text-red-300" :
          "text-indigo-300"
        }"><i class="fa-solid ${
          type==="ok" ? "fa-circle-check" :
          type==="err" ? "fa-triangle-exclamation" :
          "fa-circle-info"
        }"></i></div>
        <div class="text-sm text-white/85">${escapeHtml(msg)}</div>
      </div>
    </div>
  `;
  el.classList.remove("hidden");
  setTimeout(()=> el.classList.add("hidden"), 3400);
}
function escapeHtml(s){ return (s||"").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }

function setActiveNav(route){
  document.querySelectorAll(".navlink").forEach(a=>{
    const on = a.dataset.route === route;
    a.classList.toggle("bg-white/5", on);
    a.classList.toggle("border", on);
    a.classList.toggle("border-white/10", on);
  });
}
function setAuthUI(){
  const has = !!S.idToken;
  document.getElementById("btnLogin").classList.toggle("hidden", has);
  document.getElementById("btnLogout").classList.toggle("hidden", !has);
  document.getElementById("tokenBadge").classList.toggle("hidden", !has);
}

/* =========================
   AUTH
========================= */
function login(){
  const u = new URL(CFG.COGNITO_DOMAIN + "/login");
  u.searchParams.set("client_id", CFG.CLIENT_ID);
  u.searchParams.set("response_type", "code");
  u.searchParams.set("scope", "email openid profile");
  u.searchParams.set("redirect_uri", CFG.REDIRECT_URI);
  window.location.href = u.toString();
}
function logout(){
  localStorage.removeItem("idToken");
  S.idToken = "";
  setAuthUI();
  toast("Logged out", "ok");
  window.location.hash = "#/dashboard";
  render();
}
async function exchangeCodeForToken(code){
  const body = new URLSearchParams();
  body.set("grant_type", "authorization_code");
  body.set("client_id", CFG.CLIENT_ID);
  body.set("code", code);
  body.set("redirect_uri", CFG.REDIRECT_URI);

  const res = await fetch(CFG.COGNITO_DOMAIN + "/oauth2/token", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body
  });
  const data = await res.json();
  if(!res.ok) throw new Error(data.error_description || data.error || "Token exchange failed");
  if(!data.id_token) throw new Error("id_token missing");
  localStorage.setItem("idToken", data.id_token);
  S.idToken = data.id_token;
  setAuthUI();
  toast("Login successful", "ok");
}

/* =========================
   API HELPERS
========================= */
async function api(path, body){
  if(!S.idToken) throw new Error("Not logged in");
  const res = await fetch(CFG.API_BASE + path, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + S.idToken
    },
    body: JSON.stringify(body || {})
  });
  const text = await res.text();
  let data; try { data = JSON.parse(text); } catch { data = { raw:text }; }
  if(!res.ok) throw new Error(data.message || data.error || text || ("HTTP "+res.status));
  return data;
}
async function apiPublicGet(pathWithQuery){
  const res = await fetch(CFG.API_BASE + pathWithQuery);
  const text = await res.text();
  let data; try { data = JSON.parse(text); } catch { data = { raw:text }; }
  if(!res.ok) throw new Error(data.message || data.error || text || ("HTTP "+res.status));
  return data;
}
async function apiClient(action, payload, auth=false){
  const headers = { "Content-Type": "application/json" };
  if(auth){
    if(!S.idToken) throw new Error("Not logged in");
    headers["Authorization"] = "Bearer " + S.idToken;
  }
  const res = await fetch(CFG.API_BASE + "/client-api", {
    method: "POST",
    headers,
    body: JSON.stringify({ action, payload: payload || {} })
  });
  const text = await res.text();
  let data; try { data = JSON.parse(text); } catch { data = { raw:text }; }
  if(!res.ok) throw new Error(data.message || data.error || text || ("HTTP "+res.status));
  return data;
}

/* =========================
   DATA LOADERS
========================= */
async function loadCollections(){
  // Try /get-collections first (admin)
  const data = await api("/get-collections", {});
  // common formats: {collections:[...]} OR list directly
  S.collections = data.collections || data.items || data || [];
  return S.collections;
}
async function loadEvents(collection_id){
  if(!collection_id) { S.events=[]; return []; }
  const data = await api("/get-events", { collection_id });
  S.events = data.events || data.items || data || [];
  return S.events;
}
function syncContextSelects(){
  const cSel = document.getElementById("ctxCollection");
  const eSel = document.getElementById("ctxEvent");

  cSel.innerHTML = `<option value="">— Select —</option>` + S.collections.map(c=>{
    const name = c.name || c.title || c.collection_name || c.collection_id;
    return `<option value="${escapeHtml(c.collection_id||c.id||"")}">${escapeHtml(name)}</option>`;
  }).join("");

  cSel.value = S.ctx.collection_id || "";
  eSel.innerHTML = `<option value="">— Select —</option>` + S.events.map(e=>{
    const name = e.name || e.event_name || e.event_id;
    return `<option value="${escapeHtml(e.event_id||e.id||"")}">${escapeHtml(name)}</option>`;
  }).join("");
  eSel.value = S.ctx.event_id || "";
}

/* =========================
   SHA-256 for uploads
========================= */
async function sha256File(file){
  const buf = await file.arrayBuffer();
  const hash = await crypto.subtle.digest("SHA-256", buf);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

async function startUpload(){
  const cid = S.ctx.collection_id;
  const eid = S.ctx.event_id;
  if(!cid || !eid) return toast("Select collection + event first", "err");
  const input = document.getElementById("fileInput");
  const files = Array.from(input?.files || []);
  if(!files.length) return toast("Select files", "err");

  logUpload(`Preparing ${files.length} files...`);
  try{
    // compute hashes
    const meta = [];
    for(const f of files){
      const hash = await sha256File(f);
      meta.push({ name: f.name, type: f.type || "image/jpeg", size: f.size, hash });
      logUpload(`Hashed: ${f.name}  ${hash.slice(0,10)}...`);
    }
    // request presigned URLs
    const data = await api("/generate-upload-urls", { collection_id: cid, event_id: eid, files: meta });
    const urls = data.urls || data.data?.urls || [];
    if(!urls.length) throw new Error("No upload URLs returned");
    // map by hash
    const urlByHash = Object.fromEntries(urls.map(u=>[u.hash, u.uploadURL]));
    // PUT each file
    for(const f of files){
      const hash = meta.find(m=>m.name===f.name && m.size===f.size)?.hash;
      const uploadURL = urlByHash[hash];
      if(!uploadURL){
        logUpload(`SKIP: URL missing for ${f.name}`);
        continue;
      }
      logUpload(`Uploading: ${f.name}`);
      const put = await fetch(uploadURL, {
        method: "PUT",
        headers: {
          "Content-Type": f.type || "image/jpeg",
          "x-amz-meta-original-hash": hash
        },
        body: f
      });
      if(!put.ok) throw new Error(`PUT failed for ${f.name}: ${put.status}`);
      logUpload(`OK: ${f.name}`);
    }
    toast("Upload complete", "ok");
  }catch(e){
    toast(e.message, "err");
    logUpload("ERROR: " + e.message);
  }
}
function logUpload(s){
  const el = document.getElementById("uploadLog");
  if(!el) return;
  el.textContent += (el.textContent ? "\n" : "") + s;
  el.scrollTop = el.scrollHeight;
}

async function uploadBranding(){
  const cid = S.ctx.collection_id;
  const eid = S.ctx.event_id || "";
  if(!cid) return toast("Select collection first", "err");

  const logoFile = document.getElementById("brandLogoFile")?.files?.[0] || null;
  const headerFile = document.getElementById("brandHeaderFile")?.files?.[0] || null;
  const files = [logoFile, headerFile].filter(Boolean);
  if(!files.length) return toast("Select logo/header file", "err");

  try{
    const meta = [];
    for(const f of files){
      const hash = await sha256File(f);
      meta.push({ name: f.name, type: f.type||"image/jpeg", size: f.size, hash });
    }
    const data = await api("/generate-upload-urls", { collection_id: cid, event_id: eid, files: meta });
    const urls = data.urls || [];
    const urlByHash = Object.fromEntries(urls.map(u=>[u.hash, u.uploadURL]));
    const urlPlainByHash = Object.fromEntries(urls.map(u=>[u.hash, (u.uploadURL||"").split("?")[0]]));
    for(const f of files){
      const hash = meta.find(m=>m.name===f.name && m.size===f.size)?.hash;
      const uploadURL = urlByHash[hash];
      if(!uploadURL) throw new Error("Presigned URL missing for "+f.name);
      const put = await fetch(uploadURL, { method:"PUT", headers:{ "Content-Type": f.type||"image/jpeg" }, body:f });
      if(!put.ok) throw new Error(`PUT failed for ${f.name}: ${put.status}`);
      // write output url fields
      const plain = urlPlainByHash[hash];
      if(f === logoFile) document.getElementById("brandLogoUrl").value = plain;
      if(f === headerFile) document.getElementById("brandHeaderUrl").value = plain;
    }
    toast("Branding uploaded. Save Settings to apply.", "ok");
  }catch(e){
    toast(e.message, "err");
  }
}

function setKpisFromAccountStatus(data){
  const c = data.counts || data.data?.counts || {};
  const storage = data.storage_bytes || data.data?.storage_bytes || data.storage || 0;
  document.getElementById("kpiCollections") && (document.getElementById("kpiCollections").textContent = c.collections ?? "—");
  document.getElementById("kpiEvents") && (document.getElementById("kpiEvents").textContent = c.events ?? "—");
  document.getElementById("kpiPhotos") && (document.getElementById("kpiPhotos").textContent = c.photos ?? "—");
  document.getElementById("kpiStorage") && (document.getElementById("kpiStorage").textContent = storage ? prettyBytes(storage) : "—");

function prettyBytes(n){
  const units = ["B","KB","MB","GB","TB"];
  let i=0; let v=Number(n)||0;
  while(v>=1024 && i<units.length-1){ v/=1024; i++; }
  return (i===0? v.toFixed(0): v.toFixed(2)) + " " + units[i];
}

  await loadEvents(id);
  syncContextSelects();
  renderEventsTable();
  toast("Collection selected", "ok");
  render();
}
function selectEvent(id){
  S.ctx.event_id = id;
  syncContextSelects();
  toast("Event selected", "ok");
  render();
}

/* =========================
   INIT
========================= */
async function bootstrap(){
  // OAuth code flow
  const url = new URL(window.location.href);
  const code = url.searchParams.get("code");
  if(code){
    try{
      await exchangeCodeForToken(code);
      // Clean URL
      url.searchParams.delete("code");
      url.searchParams.delete("state");
      window.history.replaceState({}, document.title, url.toString());
    }catch(e){
      toast(e.message, "err");
    }
  }
  setAuthUI();

  // wire buttons
  document.getElementById("btnLogin").onclick = login;
  document.getElementById("btnLogout").onclick = logout;
  document.getElementById("btnReloadContext").onclick = reloadAll;

  // context selects
  document.getElementById("ctxCollection").addEventListener("change", async (e)=>{
    S.ctx.collection_id = e.target.value;
    S.ctx.event_id = "";
    try{
      await loadEvents(S.ctx.collection_id);
      syncContextSelects();
      renderEventsTable();
      render();
    }catch(err){ toast(err.message, "err"); }
  });
  document.getElementById("ctxEvent").addEventListener("change", (e)=>{
    S.ctx.event_id = e.target.value;
    render();
  });

  // load initial data if logged in
  if(S.idToken){
    try{
      await loadCollections();
      syncContextSelects();
      renderCollectionsTable();
      // load status to show KPIs
      try{
        const st = await api("/account-status", {});
        setKpisFromAccountStatus(st);
      }catch(_){}
    }catch(e){
      toast(e.message, "err");
    }
  }

  // router
  window.addEventListener("hashchange", render);
  render();
}

bootstrap();
</script>
</body>
</html>
