<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>EventLens Pro – AI Photo Distribution</title>

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    
    <style>
        /* ================= THEME VARIABLES ================= */
        :root {
            --bg-dark: #050507;
            --bg-panel: #0f0f12;
            --primary: #00e676;       
            --primary-glow: rgba(0, 230, 118, 0.25);
            --accent: #6366f1;        
            --danger: #ef4444;
            --warning: #f59e0b;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --border: rgba(255,255,255,0.08);
            --radius: 12px;
            --font-head: 'Outfit', sans-serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
        }

        * { box-sizing: border-box; outline: none; }
        body { margin: 0; background: var(--bg-dark); color: var(--text-main); font-family: var(--font-body); overflow-x: hidden; font-size: 14px; }
        a { text-decoration: none; color: inherit; transition: 0.3s; cursor: pointer; }
        
        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* ================= UTILITY CLASSES ================= */
        .hidden { display: none !important; }
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        .flex-center { display: flex; align-items: center; justify-content: center; }
        .flex-between { display: flex; align-items: center; justify-content: space-between; }
        .flex-col { display: flex; flex-direction: column; }
        .gap-10 { gap: 10px; } .gap-20 { gap: 20px; }
        .text-center { text-align: center; }
        .text-right { text-align: right; }
        .w-full { width: 100%; }

        /* ================= COMPONENTS ================= */
        .btn {
            display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 8px;
            font-weight: 600; cursor: pointer; border: none; transition: 0.2s; font-family: var(--font-head);
            font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .btn-primary { background: var(--primary); color: #000; box-shadow: 0 0 15px var(--primary-glow); }
        .btn-primary:hover { transform: translateY(-2px); opacity: 0.9; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); }
        .btn-sm { padding: 6px 12px; font-size: 11px; }

        input, select, textarea {
            width: 100%; padding: 10px 14px; background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            border-radius: 8px; color: #fff; font-family: var(--font-body); transition: 0.3s; margin-bottom: 10px; font-size: 14px;
        }
        input:focus, select:focus { border-color: var(--primary); }

        /* CARDS & STATS */
        .card { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 16px; padding: 24px; position: relative; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: linear-gradient(145deg, #15151a, #0f0f12); padding: 20px; border-radius: 16px; border: 1px solid var(--border); display: flex; flex-direction: column; align-items: flex-start; }
        .stat-val { font-size: 28px; font-weight: 800; color: var(--primary); font-family: var(--font-head); line-height: 1.2; }
        .stat-label { color: var(--text-muted); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }

        /* TABLES & LISTS */
        .data-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .data-table th { text-align: left; padding: 12px; color: var(--text-muted); border-bottom: 1px solid var(--border); font-weight: 600; }
        .data-table td { padding: 14px 12px; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .data-table tr:hover td { background: rgba(255,255,255,0.02); }

        /* TABS */
        .tabs { display: flex; gap: 10px; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; overflow-x: auto; }
        .tab-btn { padding: 8px 16px; background: transparent; border-radius: 6px; cursor: pointer; color: var(--text-muted); font-weight: 600; border: 1px solid transparent; white-space: nowrap; }
        .tab-btn:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .tab-btn.active { background: var(--primary); color: #000; border-color: var(--primary); }

        /* UPLOAD & DROPZONE */
        .dropzone { 
            border: 2px dashed var(--border); border-radius: 16px; padding: 40px; text-align: center; 
            transition: 0.3s; cursor: pointer; background: rgba(255,255,255,0.01);
        }
        .dropzone:hover, .dropzone.dragover { border-color: var(--primary); background: rgba(0, 230, 118, 0.05); }
        .upload-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: rgba(255,255,255,0.02); margin-bottom: 5px; border-radius: 6px; font-size: 13px; }
        .progress-bar { height: 4px; background: #333; border-radius: 2px; width: 100%; margin-top: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; }

        /* GUEST SEARCH */
        .search-page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background-size: cover; background-position: center; position: relative; }
        .search-overlay { position: absolute; inset: 0; background: linear-gradient(to top, #000 0%, rgba(0,0,0,0.6) 100%); z-index: 1; }
        .search-content { position: relative; z-index: 2; width: 90%; max-width: 450px; text-align: center; padding: 30px; background: rgba(10,10,10,0.8); backdrop-filter: blur(20px); border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .face-scanner { width: 160px; height: 160px; border-radius: 50%; border: 3px solid var(--border); margin: 0 auto 20px; overflow: hidden; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        .face-scanner.scanning::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: var(--primary); box-shadow: 0 0 15px var(--primary); animation: scan 1.5s infinite ease-in-out; }
        @keyframes scan { 0% { top: 0; opacity: 0; } 50% { opacity: 1; } 100% { top: 100%; opacity: 0; } }

        /* PHOTO GRID */
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .photo-item { aspect-ratio: 1; border-radius: 8px; overflow: hidden; background: #000; position: relative; cursor: pointer; }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        .photo-item:hover img { transform: scale(1.05); }

        /* MODALS */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg-panel); width: 95%; max-width: 500px; padding: 24px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }

        /* TOAST */
        .toast { position: fixed; bottom: 30px; right: 30px; background: #fff; color: #000; padding: 12px 24px; border-radius: 8px; font-weight: 600; transform: translateY(100px); transition: 0.3s; z-index: 3000; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .toast.show { transform: translateY(0); }
        .toast.error { background: var(--danger); color: #fff; }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar" style="position:fixed; top:0; width:100%; padding:15px 0; background:rgba(5,5,7,0.9); backdrop-filter:blur(10px); border-bottom:1px solid var(--border); z-index:1000;" id="main-nav">
        <div class="container flex-between">
            <div class="flex-center gap-10">
                <i class="fa-solid fa-camera-retro" style="color:var(--primary); font-size:20px;"></i>
                <span style="font-family:var(--font-head); font-weight:700; font-size:20px;">EventLens <span style="font-size:10px; background:var(--accent); padding:2px 5px; border-radius:4px;">PRO</span></span>
            </div>
            <div id="nav-actions" class="flex-center gap-10">
                <!-- Injected via JS -->
            </div>
        </div>
    </nav>

    <!-- APP CONTAINER -->
    <main id="app-view" style="padding-top:80px; min-height:100vh;">
        <!-- Views injected here -->
    </main>

    <!-- MODAL -->
    <div id="generic-modal" class="modal">
        <div class="modal-content">
            <div class="flex-between" style="margin-bottom:20px;">
                <h3 id="modal-title" style="margin:0; font-family:var(--font-head);">Title</h3>
                <button onclick="ui.closeModal()" style="background:none; border:none; color:#aaa; cursor:pointer;"><i class="fa-solid fa-xmark fa-lg"></i></button>
            </div>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="toast">Action Successful</div>

    <!-- SCRIPTS -->
    <script>
        // CONFIGURATION
        const CONFIG = {
            API_BASE: 'https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod',
            COGNITO_DOMAIN: 'https://ap-south-1mva8s6f3w.auth.ap-south-1.amazoncognito.com',
            CLIENT_ID: '6j3gec3kk0q0ktkals8cr8s367',
            REDIRECT_URI: window.location.origin + window.location.pathname
        };

        // GLOBAL STATE
        const state = {
            user: null,
            token: localStorage.getItem('idToken'),
            collections: [],
            currentCollection: null,
            events: [],
            photos: [],
            isMasterAdmin: false,
            uploadQueue: [],
            uploading: false
        };

        // UTILITIES
        const utils = {
            showToast: (msg, type = 'success') => {
                const t = document.getElementById('toast');
                t.textContent = msg;
                t.className = `toast ${type} show`;
                setTimeout(() => t.classList.remove('show'), 3000);
            },
            formatBytes: (bytes) => {
                if (!bytes) return '0 B';
                const k = 1024, sizes = ['B', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            },
            apiCall: async (endpoint, method = 'GET', body = null) => {
                if (!state.token) { auth.logout(); throw new Error("Session Expired"); }
                const headers = { 'Authorization': `Bearer ${state.token}`, 'Content-Type': 'application/json' };
                const opts = { method, headers };
                if (body) opts.body = JSON.stringify(body);
                try {
                    const res = await fetch(`${CONFIG.API_BASE}${endpoint}`, opts);
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.message || 'API Error');
                    return data;
                } catch (e) {
                    utils.showToast(e.message, 'error');
                    throw e;
                }
            },
            // Helper for parallel uploads
            asyncPool: async (poolLimit, array, iteratorFn) => {
                const ret = [];
                const executing = [];
                for (const item of array) {
                    const p = Promise.resolve().then(() => iteratorFn(item));
                    ret.push(p);
                    if (poolLimit <= array.length) {
                        const e = p.then(() => executing.splice(executing.indexOf(e), 1));
                        executing.push(e);
                        if (executing.length >= poolLimit) await Promise.race(executing);
                    }
                }
                return Promise.all(ret);
            }
        };

        // AUTH
        const auth = {
            init: async () => {
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                if (code) {
                    try {
                        const res = await fetch(`${CONFIG.COGNITO_DOMAIN}/oauth2/token`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                            body: new URLSearchParams({ grant_type: 'authorization_code', client_id: CONFIG.CLIENT_ID, code, redirect_uri: CONFIG.REDIRECT_URI })
                        });
                        const data = await res.json();
                        if (data.id_token) {
                            localStorage.setItem('idToken', data.id_token);
                            state.token = data.id_token;
                            window.history.replaceState({}, document.title, window.location.pathname);
                            router.navigate('/dashboard');
                        }
                    } catch (e) { utils.showToast('Login Failed', 'error'); }
                }

                if (state.token) {
                    try {
                        const payload = JSON.parse(atob(state.token.split('.')[1]));
                        if (Date.now() >= payload.exp * 1000) { auth.logout(); return; }
                        state.user = payload;
                        state.isMasterAdmin = (payload['cognito:groups'] || []).includes('MasterAdmins');
                        ui.updateNav(true);
                    } catch (e) { auth.logout(); }
                } else {
                    ui.updateNav(false);
                }
            },
            login: () => {
                const scope = "openid profile email aws.cognito.signin.user.admin";
                window.location.href = `${CONFIG.COGNITO_DOMAIN}/login?response_type=code&client_id=${CONFIG.CLIENT_ID}&redirect_uri=${encodeURIComponent(CONFIG.REDIRECT_URI)}&scope=${encodeURIComponent(scope)}`;
            },
            logout: () => {
                localStorage.clear();
                window.location.href = `${CONFIG.COGNITO_DOMAIN}/logout?client_id=${CONFIG.CLIENT_ID}&logout_uri=${encodeURIComponent(CONFIG.REDIRECT_URI)}`;
            }
        };

        // ROUTER
        const router = {
            routes: {
                '/': views => views.landing(),
                '/login': () => auth.login(),
                '/dashboard': views => views.dashboard(),
                '/superadmin': views => views.superadmin(),
                '/collection/:id': (views, params) => views.collection(params.id),
                '/search/:linkId': (views, params) => views.guestSearch(params.linkId)
            },
            navigate: (path) => { window.location.hash = path; },
            handleRoute: () => {
                const hash = window.location.hash.slice(1) || '/';
                const main = document.getElementById('app-view');
                
                if (hash.startsWith('/search/')) {
                    document.getElementById('main-nav').style.display = 'none';
                    main.style.paddingTop = '0';
                } else {
                    document.getElementById('main-nav').style.display = 'block';
                    main.style.paddingTop = '80px';
                }

                let matched = false;
                for (let route in router.routes) {
                    const regex = new RegExp('^' + route.replace(/:\w+/g, '([^/]+)') + '$');
                    const match = hash.match(regex);
                    if (match) {
                        const params = {};
                        const keys = route.match(/:\w+/g);
                        if (keys) keys.forEach((key, i) => params[key.substring(1)] = match[i + 1]);
                        router.routes[route](views, params);
                        matched = true;
                        break;
                    }
                }
                if (!matched) views.landing();
            }
        };

        // VIEWS
        const views = {
            landing: () => {
                document.getElementById('app-view').innerHTML = `
                    <div class="container text-center" style="padding-top:100px;">
                        <h1 style="font-size:64px; font-family:var(--font-head); margin-bottom:20px;">
                            Deliver Photos <br> <span style="color:var(--primary)">Lightning Fast</span>
                        </h1>
                        <p style="color:var(--text-muted); font-size:20px; margin-bottom:40px;">AI Face Recognition for Professional Photographers.</p>
                        <button onclick="auth.login()" class="btn btn-primary" style="padding:15px 30px; font-size:16px;">Launch Dashboard</button>
                    </div>
                `;
            },
            
            dashboard: async () => {
                if (state.isMasterAdmin) { router.navigate('/superadmin'); return; }
                document.getElementById('app-view').innerHTML = `
                    <div class="container">
                        <div id="dashboard-stats" class="stat-grid"></div>
                        <div class="flex-between" style="margin-bottom:20px;">
                            <h2 style="font-family:var(--font-head)">My Collections</h2>
                            <button onclick="ui.modals.collection()" class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Collection</button>
                        </div>
                        <div class="card">
                            <input type="text" placeholder="Search collections..." onkeyup="ui.filterTable('coll-table', this.value)">
                            <table class="data-table" id="coll-table">
                                <thead><tr><th>Name</th><th>Date</th><th>Events</th><th>Photos</th><th>Storage</th><th>Actions</th></tr></thead>
                                <tbody id="collections-list"><tr><td colspan="6" class="text-center">Loading...</td></tr></tbody>
                            </table>
                        </div>
                    </div>
                `;
                
                try {
                    const data = await utils.apiCall('/get-collections');
                    state.collections = data.Items || [];
                    ui.renderDashboard();
                } catch (e) {
                    document.getElementById('collections-list').innerHTML = `<tr><td colspan="6" class="text-center text-danger">Error loading data</td></tr>`;
                }
            },

            superadmin: async () => {
                document.getElementById('app-view').innerHTML = `<div class="container"><h1>Super Admin</h1><div id="sa-content">Loading...</div></div>`;
                // Implementation for Super Admin List...
            },

            collection: async (id) => {
                state.currentCollection = id;
                document.getElementById('app-view').innerHTML = `
                    <div class="container">
                        <div class="flex-between" style="margin-bottom:20px;">
                            <div class="flex-center gap-10">
                                <button onclick="router.navigate('/dashboard')" class="btn btn-outline btn-sm"><i class="fa-solid fa-arrow-left"></i></button>
                                <h2 id="col-title" style="margin:0">Loading...</h2>
                            </div>
                            <div class="flex-center gap-10">
                                <span class="badge" style="background:var(--bg-panel); border:1px solid var(--border); padding:5px 10px; border-radius:5px; font-size:12px;" id="col-stats"></span>
                                <button onclick="ui.modals.deleteCollection('${id}')" class="btn btn-danger btn-sm"><i class="fa-solid fa-trash"></i> Delete</button>
                            </div>
                        </div>

                        <div class="tabs">
                            <button class="tab-btn active" onclick="ui.switchTab('photos')">Photos</button>
                            <button class="tab-btn" onclick="ui.switchTab('events')">Events (Manage)</button>
                            <button class="tab-btn" onclick="ui.switchTab('upload')">Upload & Index</button>
                            <button class="tab-btn" onclick="ui.switchTab('links')">Generate Links</button>
                            <button class="tab-btn" onclick="ui.switchTab('settings')">Settings</button>
                        </div>

                        <!-- PHOTOS TAB -->
                        <div id="tab-photos" class="tab-content">
                            <div class="flex-between" style="margin-bottom:15px;">
                                <input type="text" placeholder="Search by filename..." style="width:250px; margin:0;" onkeyup="ui.filterPhotos(this.value)">
                                <span style="color:var(--text-muted); font-size:12px;">Displaying <span id="photo-count">0</span> photos</span>
                            </div>
                            <div class="photo-grid" id="photo-grid"></div>
                        </div>

                        <!-- EVENTS TAB -->
                        <div id="tab-events" class="tab-content hidden">
                            <div class="card">
                                <div class="flex-between" style="margin-bottom:15px;">
                                    <h3>Event List</h3>
                                    <button onclick="ui.modals.event()" class="btn btn-primary btn-sm">Add Event</button>
                                </div>
                                <table class="data-table">
                                    <thead><tr><th>Event Name</th><th>Date</th><th>Photos</th><th>Actions</th></tr></thead>
                                    <tbody id="event-list-body"></tbody>
                                </table>
                            </div>
                        </div>

                        <!-- UPLOAD TAB -->
                        <div id="tab-upload" class="tab-content hidden">
                            <div class="card">
                                <h3 style="margin-top:0">Upload Photos</h3>
                                <div class="flex-between" style="margin-bottom:20px; flex-wrap:wrap; gap:10px;">
                                    <select id="upload-event-select" style="max-width:300px; margin:0;"><option value="">Select Event (Required)</option></select>
                                    <div style="font-size:12px; color:var(--text-muted);">
                                        <i class="fa-solid fa-info-circle"></i> Supports JPG, PNG, HEIC. Max 20MB.
                                    </div>
                                </div>
                                
                                <div class="dropzone" id="dropzone">
                                    <i class="fa-solid fa-cloud-arrow-up" style="font-size:40px; color:var(--text-muted); margin-bottom:15px;"></i>
                                    <p style="margin:0; font-weight:600;">Drag & Drop photos here</p>
                                    <p style="margin:5px 0 15px; font-size:12px; color:var(--text-muted)">or click to browse</p>
                                    <input type="file" id="file-input" multiple class="hidden" accept="image/jpeg,image/png,image/heic">
                                    <button onclick="document.getElementById('file-input').click()" class="btn btn-outline btn-sm">Browse Files</button>
                                </div>

                                <div id="upload-progress-area" style="margin-top:20px; display:none;">
                                    <div class="flex-between" style="margin-bottom:10px;">
                                        <span style="font-weight:700">Upload Queue</span>
                                        <span id="upload-stats-text" style="font-size:12px;">0/0</span>
                                    </div>
                                    <div class="progress-bar"><div class="progress-fill" id="master-progress"></div></div>
                                    <div id="upload-list" style="max-height:300px; overflow-y:auto; margin-top:15px;"></div>
                                </div>
                                <button id="start-upload-btn" onclick="uploadManager.start()" class="btn btn-primary w-full hidden" style="margin-top:20px;">Start Upload & Indexing</button>
                            </div>
                        </div>

                        <!-- LINKS TAB -->
                        <div id="tab-links" class="tab-content hidden">
                            <div class="card">
                                <h3>Generate Guest Search Link</h3>
                                <div class="stat-grid" style="grid-template-columns: 1fr 1fr; gap:20px; margin-bottom:20px;">
                                    <div>
                                        <label>Select Events</label>
                                        <div id="link-events-list" style="max-height:150px; overflow-y:auto; border:1px solid var(--border); padding:10px; border-radius:8px;"></div>
                                    </div>
                                    <div>
                                        <label>Link Expiry</label>
                                        <select id="link-expiry">
                                            <option value="24">24 Hours</option>
                                            <option value="72">3 Days</option>
                                            <option value="168">1 Week</option>
                                            <option value="0" selected>Lifetime</option>
                                        </select>
                                    </div>
                                </div>
                                <button onclick="ui.generateLink()" class="btn btn-primary">Create Link</button>
                                <div id="generated-links-container" style="margin-top:20px;"></div>
                            </div>
                        </div>

                        <!-- SETTINGS TAB -->
                        <div id="tab-settings" class="tab-content hidden">
                            <div class="card">
                                <h3>Custom Branding</h3>
                                <p style="font-size:12px; color:var(--text-muted)">Customize the look of the Guest Search page.</p>
                                <label>Brand Color</label>
                                <input type="color" id="brand-color" value="#00e676" style="height:40px;">
                                <label>Logo URL</label>
                                <input type="text" id="brand-logo" placeholder="https://your-website.com/logo.png">
                                <label>Banner Image URL</label>
                                <input type="text" id="brand-banner" placeholder="https://...">
                                <button onclick="ui.saveSettings()" class="btn btn-primary">Save Settings</button>
                            </div>
                        </div>
                    </div>
                `;
                
                await ui.loadCollectionData(id);
            },

            guestSearch: async (linkId) => {
                // Correct Flow: 1. Landing with Branding -> 2. Selfie -> 3. Search -> 4. Results
                document.getElementById('app-view').innerHTML = `
                    <div class="search-page" id="guest-bg">
                        <div class="search-overlay"></div>
                        
                        <!-- STEP 1: LANDING & SELFIE -->
                        <div class="search-content" id="step-scan">
                            <img id="guest-logo" class="hidden" style="height:60px; margin-bottom:20px; object-fit:contain;">
                            <h1 style="font-family:var(--font-head); margin-bottom:10px;">Find Your Photos</h1>
                            <p style="color:#ccc; margin-bottom:30px;">Upload a selfie to instantly find your photos from the event.</p>
                            
                            <label for="guest-file" class="face-scanner" id="scanner-ui">
                                <i class="fa-solid fa-camera" style="font-size:40px; color:#555;"></i>
                            </label>
                            <input type="file" id="guest-file" accept="image/*" class="hidden" capture="user" onchange="guestManager.handleSelfie(this.files[0], '${linkId}')">
                            <p style="font-size:12px; color:#666;">Tap the circle to start</p>
                        </div>

                        <!-- STEP 2: RESULTS -->
                        <div class="container hidden" id="step-results" style="position:relative; z-index:2; padding-top:40px;">
                            <div class="flex-between" style="margin-bottom:20px;">
                                <h2 style="font-family:var(--font-head)">Found <span id="match-count" style="color:var(--primary)">0</span> Photos</h2>
                                <button onclick="location.reload()" class="btn btn-outline btn-sm">New Search</button>
                            </div>
                            <div class="photo-grid" id="guest-grid"></div>
                        </div>
                    </div>
                `;
                // Apply mock branding if needed (normally fetched via API)
            }
        };

        // UI LOGIC
        const ui = {
            updateNav: (loggedIn) => {
                const nav = document.getElementById('nav-actions');
                if (loggedIn) {
                    nav.innerHTML = `
                        <button onclick="router.navigate('/dashboard')" class="btn btn-outline btn-sm">Dashboard</button>
                        <button onclick="auth.logout()" class="btn btn-danger btn-sm"><i class="fa-solid fa-power-off"></i></button>
                    `;
                } else {
                    nav.innerHTML = `<button onclick="auth.login()" class="btn btn-primary btn-sm">Login</button>`;
                }
            },
            switchTab: (t) => {
                document.querySelectorAll('.tab-content').forEach(e => e.classList.add('hidden'));
                document.getElementById(`tab-${t}`).classList.remove('hidden');
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                event.target.classList.add('active');
            },
            modals: {
                collection: () => {
                    document.getElementById('modal-title').textContent = 'New Collection';
                    document.getElementById('modal-body').innerHTML = `
                        <label>Collection Name</label><input type="text" id="m-col-name">
                        <button onclick="ui.actions.createCol()" class="btn btn-primary w-full">Create</button>
                    `;
                    document.getElementById('generic-modal').classList.add('active');
                },
                event: () => {
                    document.getElementById('modal-title').textContent = 'Add Event';
                    document.getElementById('modal-body').innerHTML = `
                        <label>Event Name</label><input type="text" id="m-ev-name">
                        <label>Date</label><input type="date" id="m-ev-date">
                        <button onclick="ui.actions.createEv()" class="btn btn-primary w-full">Save</button>
                    `;
                    document.getElementById('generic-modal').classList.add('active');
                },
                deleteCollection: (id) => {
                    if(!confirm('Are you sure? This will delete all photos and events.')) return;
                    ui.actions.deleteCol(id);
                }
            },
            closeModal: () => document.getElementById('generic-modal').classList.remove('active'),
            
            // Dashboard Logic
            renderDashboard: () => {
                // Calculate Stats
                let totalPhotos = 0, totalStorage = 0, totalEvents = 0;
                state.collections.forEach(c => {
                    totalPhotos += (c.total_photo_count || 0);
                    totalStorage += (c.storage_bytes || 0);
                    totalEvents += (c.event_count || 0);
                });

                document.getElementById('dashboard-stats').innerHTML = `
                    <div class="stat-card"><span class="stat-label">Total Photos</span><span class="stat-val">${totalPhotos}</span></div>
                    <div class="stat-card"><span class="stat-label">Events</span><span class="stat-val">${totalEvents}</span></div>
                    <div class="stat-card"><span class="stat-label">Storage Used</span><span class="stat-val">${utils.formatBytes(totalStorage)}</span></div>
                    <div class="stat-card"><span class="stat-label">Collections</span><span class="stat-val">${state.collections.length}</span></div>
                `;

                const tbody = document.getElementById('collections-list');
                if(!state.collections.length) { tbody.innerHTML = `<tr><td colspan="6" class="text-center">No Collections Found</td></tr>`; return; }
                
                tbody.innerHTML = state.collections.map(c => `
                    <tr>
                        <td style="font-weight:600; color:#fff;"><a href="#/collection/${c.collection_id}">${c.name}</a></td>
                        <td>${new Date(c.created_at).toLocaleDateString()}</td>
                        <td>${c.event_count || 0}</td>
                        <td>${c.total_photo_count || 0}</td>
                        <td>${utils.formatBytes(c.storage_bytes)}</td>
                        <td><button onclick="router.navigate('/collection/${c.collection_id}')" class="btn btn-outline btn-sm">Manage</button></td>
                    </tr>
                `).join('');
            },

            // Collection Load Logic
            loadCollectionData: async (id) => {
                try {
                    // Fetch Details
                    const [evRes, phRes] = await Promise.all([
                        utils.apiCall('/get-events', 'POST', { collection_id: id }),
                        utils.apiCall('/get-photos', 'POST', { collection_id: id })
                    ]);
                    
                    state.events = evRes.events || [];
                    state.photos = phRes.photos || [];

                    // Update UI
                    document.getElementById('col-title').textContent = state.collections.find(c => c.collection_id === id)?.name || 'Collection';
                    document.getElementById('col-stats').textContent = `${state.photos.length} Photos • ${state.events.length} Events`;
                    document.getElementById('photo-count').textContent = state.photos.length;

                    // Render Photos
                    const grid = document.getElementById('photo-grid');
                    grid.innerHTML = state.photos.map(p => `<div class="photo-item"><img src="${p.thumbnail_url || p.url}" loading="lazy"></div>`).join('');

                    // Render Events List
                    document.getElementById('event-list-body').innerHTML = state.events.map(e => `
                        <tr>
                            <td>${e.name}</td>
                            <td>${e.event_date}</td>
                            <td>${e.photo_count || 0}</td>
                            <td>
                                <button onclick="ui.actions.deleteEv('${e.event_id}')" class="btn btn-danger btn-sm"><i class="fa-solid fa-trash"></i></button>
                            </td>
                        </tr>
                    `).join('');

                    // Populate Upload Select
                    const sel = document.getElementById('upload-event-select');
                    sel.innerHTML = `<option value="">Select Event (Required)</option>` + state.events.map(e => `<option value="${e.event_id}">${e.name}</option>`).join('');

                    // Populate Link Events List
                    document.getElementById('link-events-list').innerHTML = state.events.map(e => `
                        <div style="margin-bottom:5px;"><input type="checkbox" value="${e.event_id}" id="chk-${e.event_id}"> <label for="chk-${e.event_id}">${e.name}</label></div>
                    `).join('');

                } catch (e) {
                    utils.showToast("Failed to load collection details", 'error');
                }
            },

            actions: {
                createCol: async () => {
                    const name = document.getElementById('m-col-name').value;
                    if(!name) return;
                    await utils.apiCall('/upsert-collection', 'POST', { name });
                    ui.closeModal(); router.navigate('/dashboard');
                },
                deleteCol: async (id) => {
                    await utils.apiCall('/delete-collection', 'POST', { collection_id: id });
                    router.navigate('/dashboard');
                },
                createEv: async () => {
                    const name = document.getElementById('m-ev-name').value;
                    const date = document.getElementById('m-ev-date').value;
                    if(!name || !date) return;
                    await utils.apiCall('/upsert-event', 'POST', { collection_id: state.currentCollection, name, event_date: date });
                    ui.closeModal(); ui.loadCollectionData(state.currentCollection);
                },
                deleteEv: async (eid) => {
                    if(!confirm('Delete event?')) return;
                    await utils.apiCall('/delete-event', 'POST', { collection_id: state.currentCollection, event_id: eid });
                    ui.loadCollectionData(state.currentCollection);
                }
            },

            generateLink: async () => {
                const checked = Array.from(document.querySelectorAll('#link-events-list input:checked')).map(c => c.value);
                if(!checked.length) return utils.showToast('Select at least one event', 'error');
                const expiry = parseInt(document.getElementById('link-expiry').value);
                
                try {
                    const res = await utils.apiCall('/generate-search-link', 'POST', {
                        collection_id: state.currentCollection,
                        event_ids: checked,
                        expiry_hours: expiry
                    });
                    const link = res.searchUrl || res.url;
                    // Shorten link visually
                    document.getElementById('generated-links-container').innerHTML = `
                        <div style="background:#222; padding:15px; border-radius:12px; display:flex; gap:10px; align-items:center; border:1px solid var(--primary);">
                            <div style="flex:1;">
                                <div style="font-size:11px; color:var(--primary); text-transform:uppercase; font-weight:700;">Guest Link</div>
                                <div style="font-family:monospace; color:#fff; word-break:break-all;">${link}</div>
                            </div>
                            <button onclick="navigator.clipboard.writeText('${link}').then(()=>utils.showToast('Copied'))" class="btn btn-primary btn-sm">Copy</button>
                        </div>
                    `;
                } catch(e) { utils.showToast('Failed to create link', 'error'); }
            }
        };

        // UPLOAD MANAGER
        const uploadManager = {
            queue: [],
            init: () => {
                const dz = document.getElementById('dropzone');
                if(!dz) return;
                
                dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
                dz.addEventListener('dragleave', e => { e.preventDefault(); dz.classList.remove('dragover'); });
                dz.addEventListener('drop', e => {
                    e.preventDefault(); dz.classList.remove('dragover');
                    uploadManager.processFiles(e.dataTransfer.files);
                });
                document.getElementById('file-input').addEventListener('change', e => uploadManager.processFiles(e.target.files));
            },
            
            processFiles: async (files) => {
                const list = document.getElementById('upload-list');
                const area = document.getElementById('upload-progress-area');
                area.style.display = 'block';
                document.getElementById('start-upload-btn').classList.remove('hidden');

                for (let file of files) {
                    // Validate MIME
                    if (!['image/jpeg', 'image/png', 'image/heic'].includes(file.type)) {
                        utils.showToast(`Skipped ${file.name} (Invalid Type)`, 'error');
                        continue;
                    }

                    const id = Math.random().toString(36).substr(2, 9);
                    const item = { id, file, status: 'pending' };
                    state.uploadQueue.push(item);
                    
                    const div = document.createElement('div');
                    div.id = `up-${id}`;
                    div.className = 'upload-item';
                    div.innerHTML = `<span>${file.name} (${utils.formatBytes(file.size)})</span><span class="status" style="color:#aaa">Pending</span>`;
                    list.appendChild(div);
                }
                uploadManager.updateStats();
            },

            updateStats: () => {
                const total = state.uploadQueue.length;
                const done = state.uploadQueue.filter(i => i.status === 'done').length;
                document.getElementById('upload-stats-text').textContent = `${done}/${total}`;
                document.getElementById('master-progress').style.width = `${(done/total)*100}%`;
            },

            start: async () => {
                const eventId = document.getElementById('upload-event-select').value;
                if (!eventId) return utils.showToast('Please select an event first', 'error');
                if (state.uploading) return;
                state.uploading = true;
                
                document.getElementById('start-upload-btn').disabled = true;
                document.getElementById('start-upload-btn').textContent = "Uploading...";

                // Process batch (5 concurrent)
                const pending = state.uploadQueue.filter(i => i.status === 'pending');
                
                await utils.asyncPool(5, pending, async (item) => {
                    const uiEl = document.getElementById(`up-${item.id}`).querySelector('.status');
                    uiEl.textContent = "Processing...";
                    uiEl.style.color = "var(--warning)";

                    try {
                        let blob = item.file;
                        // HEIC Conversion
                        if (item.file.name.toLowerCase().endsWith('.heic')) {
                            uiEl.textContent = "Converting...";
                            blob = await heic2any({ blob: item.file, toType: "image/jpeg", quality: 0.8 });
                        }

                        // Get Presigned URL
                        uiEl.textContent = "Getting URL...";
                        const res = await utils.apiCall('/generate-upload-urls', 'POST', {
                            collection_id: state.currentCollection,
                            event_id: eventId,
                            files: [{ name: item.file.name, type: 'image/jpeg' }] // Always upload as JPEG if converted or orig
                        });
                        
                        if (res.skipped && res.skipped.length) {
                            item.status = 'done';
                            uiEl.textContent = "Duplicate";
                            uiEl.style.color = "var(--text-muted)";
                            return;
                        }

                        const { uploadURL } = res.urls[0];
                        
                        // Upload S3
                        uiEl.textContent = "Uploading...";
                        await fetch(uploadURL, { method: 'PUT', body: blob, headers: {'Content-Type': 'image/jpeg'} });
                        
                        // Success
                        item.status = 'done';
                        uiEl.textContent = "Indexed";
                        uiEl.style.color = "var(--primary)";
                        
                    } catch (e) {
                        item.status = 'error';
                        uiEl.textContent = "Failed";
                        uiEl.style.color = "var(--danger)";
                    } finally {
                        uploadManager.updateStats();
                    }
                });

                state.uploading = false;
                document.getElementById('start-upload-btn').disabled = false;
                document.getElementById('start-upload-btn').textContent = "Upload Complete";
                
                // Refresh Grid
                setTimeout(() => ui.loadCollectionData(state.currentCollection), 1000);
            }
        };

        // GUEST SEARCH MANAGER
        const guestManager = {
            handleSelfie: async (file, linkId) => {
                if(!file) return;
                
                const scanner = document.getElementById('scanner-ui');
                scanner.classList.add('scanning');
                
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async () => {
                    const base64 = reader.result.split(',')[1]; // Remove prefix
                    try {
                        const res = await fetch(`${CONFIG.API_BASE}/search`, {
                            method: 'POST',
                            body: JSON.stringify({ image: base64, link_id: linkId }) // Assuming backend uses link_id to resolve collection
                        });
                        const data = await res.json();
                        
                        // Switch View
                        document.getElementById('step-scan').classList.add('hidden');
                        document.getElementById('step-results').classList.remove('hidden');
                        
                        const matches = data.matches || []; // Assume backend returns { matches: [{url:..}] }
                        document.getElementById('match-count').textContent = matches.length;
                        document.getElementById('guest-grid').innerHTML = matches.map(m => `
                            <div class="photo-item"><a href="${m.url}" target="_blank"><img src="${m.thumbnail || m.url}"></a></div>
                        `).join('');

                    } catch (e) {
                        utils.showToast('No match found or Error', 'error');
                        scanner.classList.remove('scanning');
                    }
                };
            }
        };

        // INIT
        window.addEventListener('hashchange', router.handleRoute);
        window.addEventListener('DOMContentLoaded', async () => {
            await auth.init();
            router.handleRoute();
            
            // Re-bind upload events if view loaded
            const obs = new MutationObserver(() => {
                if(document.getElementById('dropzone')) uploadManager.init();
            });
            obs.observe(document.getElementById('app-view'), { childList: true, subtree: true });
        });

    </script>
</body>
</html>
