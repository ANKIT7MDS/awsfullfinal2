<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Client Gallery – EventLens</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary: #00e676;
            --bg: #050505;
            --panel: #111;
            --text: #ffffff;
            --text-muted: #a1a1aa;
            --border: #27272a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            overflow-x: hidden;
        }

        /* LOGIN VIEW */
        #authView {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: var(--panel);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .login-card h1 { font-family: 'Outfit', sans-serif; font-size: 28px; margin-bottom: 8px; }
        .login-card p { color: var(--text-muted); font-size: 14px; margin-bottom: 30px; }
        .pin-input {
            background: #000;
            border: 1px solid var(--border);
            color: #fff;
            padding: 15px;
            border-radius: 12px;
            width: 100%;
            font-size: 18px;
            text-align: center;
            letter-spacing: 4px;
            margin-bottom: 20px;
        }
        .btn-open {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 12px;
            width: 100%;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-open:active { transform: scale(0.98); }

        /* MAIN GALLERY VIEW */
        #galleryView { display: none; }

        /* HEADER & BRANDING */
        .hero {
            height: 300px;
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }
        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.9));
        }
        .brand-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding-bottom: 30px;
        }
        .brand-logo {
            width: 80px; height: 80px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            background: #000;
            margin-bottom: 15px;
            object-fit: cover;
        }
        .brand-title { font-family: 'Outfit', sans-serif; font-size: 24px; font-weight: 800; margin: 0; }

        /* FILTERS BAR */
        .filter-bar {
            position: sticky;
            top: 0;
            background: rgba(5,5,5,0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
        }
        .chip {
            padding: 8px 16px;
            border-radius: 50px;
            background: var(--panel);
            border: 1px solid var(--border);
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }
        .chip.active { background: var(--primary); color: #000; border-color: var(--primary); }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            padding: 4px;
        }
        @media (max-width: 768px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        
        .ph-card {
            aspect-ratio: 1;
            background: #1a1a1a;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }
        .ph-card img {
            width: 100%; height: 100%; object-fit: cover;
            transition: 0.3s;
        }
        .ph-actions {
            position: absolute;
            top: 10px; right: 10px;
            display: flex; flex-direction: column; gap: 8px;
            opacity: 0.8;
        }
        .action-dot {
            width: 34px; height: 34px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 14px;
            backdrop-filter: blur(4px);
        }
        .action-dot.selected { color: var(--primary); }
        .action-dot.fav { color: #ff4081; }

        /* FOOTER / SUBMIT BAR */
        .submit-bar {
            position: fixed;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: #000;
            padding: 12px 24px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 700;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 1000;
            cursor: pointer;
            visibility: hidden;
        }
        .submit-bar.show { visibility: visible; animation: slideUp 0.3s ease; }

        /* LIGHTBOX */
        #lightbox {
            position: fixed; inset: 0;
            background: #000;
            z-index: 2000;
            display: none;
            flex-direction: column;
        }
        .lb-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .lb-content { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .lb-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .lb-footer {
            padding: 30px;
            display: flex;
            justify-content: center;
            gap: 40px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }
        .lb-btn {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            color: var(--text-muted); cursor: pointer; font-size: 12px;
        }
        .lb-btn i { font-size: 24px; }
        .lb-btn.active-sel { color: var(--primary); }
        .lb-btn.active-fav { color: #ff4081; }

        /* TOAST */
        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #222; color: #fff; padding: 12px 24px;
            border-radius: 12px; border: 1px solid var(--border);
            z-index: 9999; display: none;
        }

        @keyframes slideUp { from { bottom: -50px; } to { bottom: 20px; } }
    </style>
</head>
<body>

    <div id="toast"></div>

    <!-- 1. LOGIN SECTION -->
    <div id="authView">
        <div class="login-card">
            <h1>Welcome</h1>
            <p>Kripya photographer dwara diya gaya PIN enter karein gallery dekhne ke liye.</p>
            <input type="tel" id="pinInput" class="pin-input" maxlength="6" placeholder="••••">
            <button class="btn-open" onclick="accessGallery()">Unlock Gallery</button>
        </div>
    </div>

    <!-- 2. GALLERY SECTION -->
    <div id="galleryView">
        <div class="hero" id="heroBanner">
            <div class="hero-overlay"></div>
            <div class="brand-content">
                <img src="" id="brandLogo" class="brand-logo" onerror="this.style.display='none'">
                <h2 class="brand-title" id="brandTitle">Loading...</h2>
                <p id="welcomeMsg" style="font-size: 13px; opacity: 0.8; margin-top: 5px;"></p>
            </div>
        </div>

        <div class="filter-bar">
            <div class="chip active" onclick="filterGallery('all', this)">All Photos</div>
            <div class="chip" onclick="filterGallery('selected', this)">Selected (<span id="countSel">0</span>)</div>
            <div class="chip" onclick="filterGallery('fav', this)">Favorites (<span id="countFav">0</span>)</div>
        </div>

        <div class="grid" id="photoGrid"></div>

        <div class="submit-bar" id="submitBar" onclick="submitSelections()">
            <span>Send to Photographer</span>
            <i class="fa-solid fa-paper-plane"></i>
        </div>
    </div>

    <!-- 3. LIGHTBOX SECTION -->
    <div id="lightbox">
        <div class="lb-header">
            <button onclick="closeLightbox()" style="background:none; border:none; color:#fff; font-size:24px;"><i class="fa-solid fa-xmark"></i></button>
            <div id="lbCounter" style="font-size: 14px;">1 / 100</div>
            <div style="width: 24px;"></div>
        </div>
        <div class="lb-content">
            <img src="" id="lbImg" class="lb-img">
        </div>
        <div class="lb-footer">
            <div class="lb-btn" id="lbBtnSel" onclick="toggleChoice('selected')">
                <i class="fa-solid fa-circle-check"></i>
                <span>Select for Album</span>
            </div>
            <div class="lb-btn" id="lbBtnFav" onclick="toggleChoice('fav')">
                <i class="fa-solid fa-heart"></i>
                <span>Favorite</span>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod/client-api";
        const params = new URLSearchParams(window.location.search);
        const linkId = params.get('id') || params.get('linkId');
        
        let allPhotos = [];
        let selections = {}; 
        let currentFilter = 'all';
        let currentIdx = 0;

        // 1. ACCESS GALLERY
        async function accessGallery() {
            const pin = document.getElementById('pinInput').value;
            if(!pin) return showToast("PIN enter karein");

            showToast("Opening Gallery...", "info");

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // FIXED: Changed action to 'get-details' which is standard for EventLens initial fetch
                    body: JSON.stringify({ action: "get-details", linkId, pin })
                });

                const data = await res.json();
                if(!res.ok) throw new Error(data.message || "Invalid PIN or Link");

                initGallery(data);
            } catch (err) {
                showToast(err.message, "error");
            }
        }

        // 2. INITIALIZE GALLERY
        function initGallery(data) {
            // Handle different potential response structures
            allPhotos = data.photos || data.items || [];
            const branding = data.branding || {};

            // Apply Branding
            if(branding.color) document.documentElement.style.setProperty('--primary', branding.color);
            document.getElementById('brandTitle').textContent = data.collection_name || data.name || "Your Event";
            document.getElementById('welcomeMsg').textContent = branding.welcome_msg || "";
            if(branding.logo) document.getElementById('brandLogo').src = branding.logo;
            if(branding.header_img) document.getElementById('heroBanner').style.backgroundImage = `url('${branding.header_img}')`;

            // Load Previous Selections if any
            selections = data.existing_selections || data.selections || {};

            renderGrid();
            updateCounters();

            document.getElementById('authView').style.display = 'none';
            document.getElementById('galleryView').style.display = 'block';
        }

        // 3. RENDER GRID
        function renderGrid() {
            const grid = document.getElementById('photoGrid');
            grid.innerHTML = '';

            const filtered = allPhotos.filter(p => {
                if(currentFilter === 'all') return true;
                const s = selections[p.photo_id] || {};
                if(currentFilter === 'selected') return s.selected;
                if(currentFilter === 'fav') return s.fav;
                return true;
            });

            if(filtered.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; padding: 50px; color: var(--text-muted);">No photos found.</div>`;
            }

            filtered.forEach((p, idx) => {
                const s = selections[p.photo_id] || {};
                const card = document.createElement('div');
                card.className = 'ph-card';
                card.onclick = () => openLightbox(allPhotos.indexOf(p));
                
                card.innerHTML = `
                    <img src="${p.thumbnail_url || p.url}" loading="lazy">
                    <div class="ph-actions">
                        ${s.selected ? '<div class="action-dot selected"><i class="fa-solid fa-circle-check"></i></div>' : ''}
                        ${s.fav ? '<div class="action-dot fav"><i class="fa-solid fa-heart"></i></div>' : ''}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 4. SELECTION LOGIC
        function toggleChoice(type) {
            const photo = allPhotos[currentIdx];
            if(!selections[photo.photo_id]) selections[photo.photo_id] = { selected: false, fav: false };
            
            selections[photo.photo_id][type] = !selections[photo.photo_id][type];
            
            updateLightboxUI();
            updateCounters();
            renderGrid();
            
            syncSelection(photo.photo_id, selections[photo.photo_id]);
        }

        async function syncSelection(photoId, state) {
            try {
                fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: "update-selection", 
                        linkId, 
                        photoId, 
                        state 
                    })
                });
            } catch(e) {}
        }

        function updateCounters() {
            let sCount = 0, fCount = 0;
            Object.values(selections).forEach(s => {
                if(s.selected) sCount++;
                if(s.fav) fCount++;
            });

            document.getElementById('countSel').textContent = sCount;
            document.getElementById('countFav').textContent = fCount;

            const sBar = document.getElementById('submitBar');
            if(sCount > 0 || fCount > 0) sBar.classList.add('show');
            else sBar.classList.remove('show');
        }

        function filterGallery(type, el) {
            currentFilter = type;
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            renderGrid();
        }

        // 5. LIGHTBOX
        function openLightbox(idx) {
            currentIdx = idx;
            const photo = allPhotos[idx];
            document.getElementById('lbImg').src = photo.url;
            document.getElementById('lbCounter').textContent = `${idx + 1} / ${allPhotos.length}`;
            updateLightboxUI();
            document.getElementById('lightbox').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function updateLightboxUI() {
            const photo = allPhotos[currentIdx];
            const s = selections[photo.photo_id] || { selected: false, fav: false };
            
            const btnSel = document.getElementById('lbBtnSel');
            const btnFav = document.getElementById('lbBtnFav');

            if(s.selected) btnSel.classList.add('active-sel'); else btnSel.classList.remove('active-sel');
            if(s.fav) btnFav.classList.add('active-fav'); else btnFav.classList.remove('active-fav');
        }

        // 6. FINAL SUBMISSION
        async function submitSelections() {
            if(!confirm("Kya aap apni selections photographer ko bhejna chahte hain?")) return;
            
            showToast("Submitting...", "info");
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // FIXED: Action changed to submit-selections
                    body: JSON.stringify({ action: "submit-selections", linkId })
                });

                if(res.ok) {
                    showToast("Selections safalta purvak bhej di gayi hain!", "success");
                    document.getElementById('submitBar').style.display = 'none';
                } else {
                    const err = await res.json();
                    showToast(err.message || "Submission failed", "error");
                }
            } catch(e) { showToast("Network error during submission", "error"); }
        }

        // UTILS
        function showToast(msg, type = "success") {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.display = 'block';
            t.style.background = type === 'error' ? '#f44336' : (type === 'info' ? '#2196f3' : '#222');
            setTimeout(() => t.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
