/* =========================================================

const API_BASE = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod"; //  [oai_citation:7‡collection-details.html](sediment://file_000000005e1c7207b272f6c2feaddfbd)

// Auth (from dashboard.html)  [oai_citation:9‡dashboard.html](sediment://file_000000003d28720793e8d87a7ccd6bbb)

// NOTE: If you host this SPA at a new URL, update REDIRECT_URI accordingly in Cognito callback URLs.
const REDIRECT_URI = "https://selfiphotos.netlify.app/dashboard.html";

// Endpoints
const GET_ACCOUNT_STATUS_API = `${API_BASE}/account-status`;
const GET_COLLECTIONS_API    = `${API_BASE}/get-collections`;
const UPSERT_COLLECTION_API  = `${API_BASE}/upsert-collection`;

const GET_EVENTS_API         = `${API_BASE}/get-events`;
const GET_PHOTOS_API         = `${API_BASE}/get-photos`;
const UPSERT_EVENT_API       = `${API_BASE}/upsert-event`;
const DELETE_EVENT_API       = `${API_BASE}/delete-event`;

const UPLOAD_URLS_API        = `${API_BASE}/generate-upload-urls`;
const GENERATE_LINK_API      = `${API_BASE}/generate-search-link`;
const GET_LEADS_API          = `${API_BASE}/save-details`; // GET/POST as per mapping  [oai_citation:10‡01_API_ENDPOINTS_TO_LAMBDAS.txt](sediment://file_0000000006407207a06c7a35cb865f07)
const SEARCH_API             = `${API_BASE}/search`;       // guest selfie match  [oai_citation:11‡01_API_ENDPOINTS_TO_LAMBDAS.txt](sediment://file_0000000006407207a06c7a35cb865f07)
const GET_LINKS_API          = `${API_BASE}/get-links`;    // mapping exists  [oai_citation:12‡01_API_ENDPOINTS_TO_LAMBDAS.txt](sediment://file_0000000006407207a06c7a35cb865f07)

/* =========================================================
  STATE
========================================================= */
const $ = (id)=>document.getElementById(id);
const app = $("app");
const toast = $("toast");
let idToken = localStorage.getItem("idToken") || null;
let userPayload = null;

let cacheCollections = [];
let cacheAccount = {};
let cacheEvents = [];
let cachePhotos = [];
let cacheLeads = [];
let faceNameMap = {}; // optional, if you later connect list_people or save-face-name

// Upload state
const SUPPORTED_FORMATS = {
  'image/jpeg': 'JPG','image/png': 'PNG','image/heic': 'HEIC','image/heif': 'HEIF',
  'image/webp': 'WEBP','image/gif': 'GIF','image/bmp': 'BMP','image/tiff': 'TIFF'
}; // from quick-upload.html  [oai_citation:13‡quick-upload.html](sediment://file_000000000e507207b3a1510488e46565)
let uploadQueue = [];
let uploadAbort = false;

/* =========================================================
  UTIL
========================================================= */
function showToast(msg, type="good"){
  toast.className = `toast show ${type==="good"?"good":type==="bad"?"bad":"warn"}`;
  toast.textContent = msg;
  setTimeout(()=>toast.classList.remove("show"), 3200);
}
function escapeHtml(s=""){return String(s).replace(/[&<>"']/g, m=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;" }[m]));}
function fmtDate(d){
  try{ if(!d) return "-"; return new Date(d).toLocaleString("en-IN"); }catch{ return d||"-"; }
}
function formatBytes(bytes=0){
  bytes = Number(bytes)||0;
  if (!bytes) return "0 Bytes";
  const k=1024, sizes=["Bytes","KB","MB","GB","TB"];
  const i = Math.floor(Math.log(bytes)/Math.log(k));
  return `${(bytes/Math.pow(k,i)).toFixed(i?2:0)} ${sizes[i]}`;
}
function copyText(t){
  if(!t) return;
  navigator.clipboard.writeText(String(t)).then(()=>showToast("Copied")).catch(()=>showToast("Copy failed","bad"));
}
function parseJwt(token){
  try{ return JSON.parse(atob(token.split(".")[1])); }catch{ return null; }
}
function setTopbarVisible(v){
  $("topbar").style.display = v ? "block" : "none";
}

/* =========================================================
  API HELPERS
========================================================= */
async function apiFetch(url, {method="GET", body=null, auth=true, headers={}}={}){
  const h = {"Content-Type":"application/json", ...headers};
  if(auth){
    const t = localStorage.getItem("idToken");
    if(t) h["Authorization"] = `Bearer ${t}`;
  }
  const res = await fetch(url, {method, headers:h, body: body ? JSON.stringify(body) : null});
  const data = await res.json().catch(()=> ({}));
  if(!res.ok){
    const msg = data?.message || data?.error || `HTTP ${res.status}`;
    throw new Error(msg);
  }
  return data;
}

/* =========================================================
  ROUTER
========================================================= */
window.addEventListener("hashchange", renderRoute);
document.addEventListener("DOMContentLoaded", async ()=>{
  // If Cognito redirects back with ?code= we can exchange it here
  await handleAuthCodeIfPresent();
  renderRoute();
});

function go(hash){ location.hash = hash; }

function renderRoute(){
  const hash = location.hash || "#/";
  const [path, qs] = hash.split("?");
  const q = new URLSearchParams(qs || "");

  // Guest route => hide admin topbar completely
  if(path.startsWith("#/guest")){
    setTopbarVisible(false);
    renderGuest(q);
    return;
  }
  setTopbarVisible(true);

  // update who chip
  idToken = localStorage.getItem("idToken") || null;
  userPayload = idToken ? parseJwt(idToken) : null;
  const isMaster = !!(userPayload && (userPayload["cognito:groups"]||[]).includes("MasterAdmins")); // dashboard.html logic  [oai_citation:14‡dashboard.html](sediment://file_000000003d28720793e8d87a7ccd6bbb)
  $("whoText").textContent = userPayload ? (isMaster ? "Super Admin" : (userPayload.email || "User")) : "Guest";
  $("btnLogout").style.display = userPayload ? "inline-flex" : "none";
  $("btnGoSuper").style.display = isMaster ? "inline-flex" : "none";
  $("btnGoDashboard").style.display = userPayload ? "inline-flex" : "none";

  if(path==="#/" || path==="#/landing") return renderLanding();
  if(path==="#/login") return renderLogin();
  if(path==="#/dashboard") return renderDashboard();
  if(path==="#/superadmin") return renderSuperAdmin();
  if(path.startsWith("#/collection/")){
    const cid = path.split("#/collection/")[1] || "";
    return renderCollection(cid);
  }
  // fallback
  renderLanding();
}

  AUTH
========================================================= */
async function handleAuthCodeIfPresent(){
  const params = new URLSearchParams(location.search);
  const code = params.get("code");
  if(!code) return;

  try{
    // Same flow as dashboard.html  [oai_citation:15‡dashboard.html](sediment://file_000000003d28720793e8d87a7ccd6bbb)
    const res = await fetch(`${COGNITO_DOMAIN}/oauth2/token`, {
      method: "POST",
      headers: {"Content-Type":"application/x-www-form-urlencoded"},
      body: new URLSearchParams({
        grant_type: "authorization_code",
        client_id: CLIENT_ID,
        code,
        redirect_uri: REDIRECT_URI
      })
    });
    const tokens = await res.json();
    if(!res.ok) throw new Error("Auth failed");
    localStorage.setItem("idToken", tokens.id_token);
    // clean URL
    window.history.replaceState({}, document.title, window.location.pathname + window.location.hash);
  }catch(e){
    console.error(e);
    localStorage.removeItem("idToken");
  }
}

async function refreshDashboard(){
  try{
    showToast("Loading dashboard...", "warn");
    await loadDashboardData();

    // KPIs
    const cols = cacheCollections || [];
    const totalEvents = cols.reduce((a,c)=>a+Number(c.event_count||0),0);
    const totalPhotos = cols.reduce((a,c)=>a+Number(c.total_photo_count||0),0);
    const totalBytes  = cols.reduce((a,c)=>a+Number(c.storage_bytes||0),0);

    $("kCollections").textContent = cols.length;
    $("kEvents").textContent = totalEvents;
    $("kPhotos").textContent = totalPhotos;
    $("kBytes").textContent = formatBytes(totalBytes);
    $("kExpiry").textContent = cacheAccount?.expiry_date ? `Expiry: ${fmtDate(cacheAccount.expiry_date)}` : "—";

    renderCollectionsTable();
    showToast("Dashboard loaded", "good");
  }catch(e){
    console.error(e);
    showToast(e.message || "Failed", "bad");
    if(String(e.message||"").toLowerCase().includes("login")) go("#/login");
  }
}

function renderCollectionsTable(){
  const q = ($("colSearch")?.value||"").trim().toLowerCase();
  const rows = $("colRows");
  let cols = cacheCollections || [];
  if(q) cols = cols.filter(c => String(c.name||"").toLowerCase().includes(q));

  if(!cols.length){
    rows.innerHTML = `<tr><td colspan="6" class="muted">No collections</td></tr>`;
    return;
  }

  rows.innerHTML = cols.map(col=>{
    const cid = escapeHtml(col.collection_id || "");
    const name = escapeHtml(col.name || "Untitled");
    const created = fmtDate(col.created_at || col.created || "");
    const ev = Number(col.event_count||0);
    const ph = Number(col.total_photo_count||0);
    const bytes = formatBytes(col.storage_bytes||0);

    return `
      <tr>
        <td><b>${name}</b><div class="muted" style="font-size:11px;margin-top:3px">${cid}</div></td>

async function saveCollectionAndBranding(){
  const name = ($("cmName").value||"").trim();
  if(!name) return showToast("Name is required","bad");
  const collection_id = ($("cmId").value||"").trim();

  try{
    // Save collection
    const payload = { name };
    if(collection_id) payload.collection_id = collection_id;
    await apiFetch(UPSERT_COLLECTION_API, {method:"POST", body:payload});

    // Need collection id for branding save. If created new, refresh list to get it.
    await refreshDashboard();

    // Resolve final collection id
    let finalId = collection_id;
    if(!finalId){
      const found = (cacheCollections||[]).find(c => c.name===name) || (cacheCollections||[])[0];
      finalId = found?.collection_id;
    }
    if(!finalId) throw new Error("Could not resolve collection_id after save");

    // Save branding settings via client-api (ClientGalleryHandler)  [oai_citation:19‡12_LAMBDA_CODE_FULL_EXPORT.txt](sediment://file_0000000063d87207ab411cf7a09f3e83)
    const preset = $("cmBrandPreset").value;
    const presetColors = ({
      indigo: {accent:"#6366f1", bg:"#07080b"},
      emerald:{accent:"#00d084", bg:"#07080b"},
      amber:  {accent:"#ffb020", bg:"#07080b"},
      mono:   {accent:"#ffffff", bg:"#07080b"}
    })[preset] || {accent:"#6366f1", bg:"#07080b"};

    const settings = {
      // existing client-gallery known flags
      allowDownload: $("cmAllowDownload").value==="true",
      showWatermark: $("cmShowWatermark").value==="true",
      allowSelection: $("cmAllowSelection").value==="true",

      // branding used by THIS SPA guest page (safe extra fields)
      branding: {
        preset,
        accent: presetColors.accent,
        background: presetColors.bg,
        title: ($("cmBrandTitle").value||"").trim() || name,
        tagline: ($("cmBrandTag").value||"").trim() || "Find your photos instantly",
        headerImage: ($("cmHeaderImg").value||"").trim(),
        logo: ($("cmLogo").value||"").trim(),
        footer: ($("cmFooter").value||"").trim() || "Powered by EventLens Pro"
      }
    };

    await fetch(API_CLIENT, {
      method:"POST",
      headers: {"Content-Type":"application/json"},

    }).then(r=>r.json().catch(()=>({}))).then(()=>{});

    showToast("Saved (collection + branding)", "good");

async function loadBranding(collectionId){

    const data = await res.json().catch(()=>({}));

    $("cmFooter").value = branding.footer || "Powered by EventLens Pro";
    $("cmAllowDownload").value = String(!!settings.allowDownload);
    $("cmShowWatermark").value = String(settings.showWatermark !== false);
    $("cmAllowSelection").value = String(settings.allowSelection !== false);
  }catch(e){
    // silent
  }
}

async function refreshCollection(collectionId){
  try{
    showToast("Loading collection...", "warn");

    // load events (same payload as collection-details)  [oai_citation:24‡dashboard.html](sediment://file_000000003d28720793e8d87a7ccd6bbb)
    const evRes = await apiFetch(GET_EVENTS_API, {method:"POST", body:{collection_id: collectionId}});
    cacheEvents = evRes.events || [];
    const summary = evRes.collection_summary || {};
    $("cEventsK").textContent = cacheEvents.length;
    $("cNameK").textContent = summary.name || "—";
    $("cPhotosK").textContent = summary.photo_count || 0;
    $("cLeadsK").textContent  = summary.leads_count || 0;
    $("cBytesK").textContent  = formatBytes(summary.storage_bytes || 0);

    renderEventsTable(collectionId);
    populateEventSelects();

    // load photos
    const phRes = await apiFetch(GET_PHOTOS_API, {method:"POST", body:{collection_id: collectionId, limit: 200}});
    cachePhotos = phRes.photos || phRes.items || [];
    renderPhotoGrid();

    // leads
    await refreshLeads(collectionId);

    showToast("Collection loaded", "good");
  }catch(e){
    console.error(e);
    showToast(e.message || "Failed to load collection", "bad");
  }
}

function renderEventsTable(collectionId){
  const rows = $("evtRows");
  if(!cacheEvents.length){
    rows.innerHTML = `<tr><td colspan="5" class="muted">No events. Create first.</td></tr>`;
    $("linkEventsBox").innerHTML = `<span class="muted">No events to generate link.</span>`;
    return;
  }

  rows.innerHTML = cacheEvents.map(evt=>{
    const id = escapeHtml(evt.event_id || evt.id || "");
    const name = escapeHtml(evt.name || "Untitled");
    const dt = evt.event_date || evt.date || "";
    const pcount = Number(evt.photo_count || evt.photos || 0);
    const gcount = Number(evt.guest_count || evt.leads_count || 0);

    return `
      <tr>
        <td><b>${name}</b><div class="muted" style="font-size:11px;margin-top:3px">${id}</div></td>
        <td>${dt ? escapeHtml(dt) : "-"}</td>
        <td><span class="badge">${pcount}</span></td>
        <td><span class="badge">${gcount}</span></td>
        <td>
          <div class="row" style="gap:8px">
            <button class="btn" onclick="openEditEvent('${escapeHtml(collectionId)}','${id}','${escapeHtml(evt.name||"")}','${escapeHtml(dt||"")}')"><i class="fa-regular fa-pen-to-square"></i> Edit</button>
            <button class="btn danger" onclick="deleteEvent('${escapeHtml(collectionId)}','${id}','${escapeHtml(evt.name||"")}')"><i class="fa-solid fa-trash"></i> Delete</button>
          </div>
        </td>
      </tr>
    `;
  }).join("");

  // link events checkboxes (multi select)
  $("linkEventsBox").innerHTML = cacheEvents.map(evt=>{
    const id = escapeHtml(evt.event_id || evt.id || "");
    const name = escapeHtml(evt.name || "Event");
    return `
      <label class="badge" style="cursor:pointer; user-select:none">
        <input class="linkEvt" type="checkbox" value="${id}" style="margin-right:6px; transform: translateY(1px)">
        ${name}
      </label>
    `;
  }).join("");
}

function populateEventSelects(){
  const sel = $("upEvent");
  const fsel = $("photoEventFilter");
  sel.innerHTML = cacheEvents.map(e=>{
    const id = escapeHtml(e.event_id || e.id || "");
    const name = escapeHtml(e.name || "Event");
    return `<option value="${id}">${name}</option>`;
  }).join("") || `<option value="">No events</option>`;

  fsel.innerHTML = `<option value="all">All Events</option>` + (cacheEvents.map(e=>{
    const id = escapeHtml(e.event_id || e.id || "");
    const name = escapeHtml(e.name || "Event");
    return `<option value="${id}">${name}</option>`;
  }).join(""));
}

async function saveEvent(collectionId){

  if(!event_date) return showToast("Event date required","bad");

  LINK GENERATION (multi-event + expiry + password)
  Backend expects: {collection_id, event_ids, expiry_hours, password}  [oai_citation:25‡collection-details.html](sediment://file_000000005e1c7207b272f6c2feaddfbd)
========================================================= */
async function generateGuestLink(collectionId){
  const checked = Array.from(document.querySelectorAll(".linkEvt:checked")).map(x=>x.value);
  if(!checked.length) return showToast("Select at least one event","bad");

  const expiry_hours = parseInt(($("expiryHours").value||"24"),10) || 24;
  const password = ($("linkPassword").value||"").trim();

  try{
    const data = await apiFetch(GENERATE_LINK_API, {
      method:"POST",
      body:{ collection_id, event_ids: checked, expiry_hours, password }
    });

    // Backend returns searchUrl (points to FRONTEND_URL/?linkId=uuid)  [oai_citation:26‡12_LAMBDA_CODE_FULL_EXPORT.txt](sediment://file_0000000063d87207ab411cf7a09f3e83)
    // We convert to our SPA guest route (short + stable):
    const linkId = (data.searchUrl || "").split("linkId=")[1] || "";
    if(!linkId) throw new Error("No linkId returned");
    const spaLink = `${location.origin}${location.pathname}#/guest?linkId=${encodeURIComponent(linkId)}`;

    $("genLinkText").value = spaLink;
    $("genLinkOpen").href = spaLink;
    $("linkResult").classList.remove("hidden");
    showToast("Link generated","good");
  }catch(e){
    console.error(e);
    showToast(e.message || "Link failed","bad");
  }
}

function renderPhotoGrid(){
  const grid = $("photoGrid");
  if(!grid) return;

  const evFilter = ($("photoEventFilter")?.value||"all");
  const q = ($("photoSearch")?.value||"").trim().toLowerCase();

  let list = cachePhotos || [];
  if(evFilter !== "all"){
    list = list.filter(p => String(p.event_id||p.event||"") === String(evFilter));
  }
  if(q){
    list = list.filter(p => {
      const pid = String(p.photo_id||p.id||"").toLowerCase();
      const tags = Array.isArray(p.ai_tags)? p.ai_tags.join(" ").toLowerCase() : "";
      return pid.includes(q) || tags.includes(q);
    });
  }

  if(!list.length){
    grid.innerHTML = `<div class="card soft" style="grid-column:1/-1"><div class="help">No photos found. Upload to get started.</div></div>`;
    return;
  }

  grid.innerHTML = list.map(p=>{
    const thumb = p.thumbnail_url || p.thumb || p.url || "";
    const faces = Number(p.face_count || (Array.isArray(p.face_ids)?p.face_ids.length:0) || 0);
    const tags = Array.isArray(p.ai_tags)? p.ai_tags.length : 0;
    return `
      <div class="photo" onclick='openPhotoModal(${JSON.stringify(p).replace(/</g,"\\u003c")})'>
        <img src="${escapeHtml(thumb)}" loading="lazy" onerror="this.style.opacity=.25"/>
        <div class="pbadges">
          ${faces? `<span class="badge"><i class="fa-solid fa-user"></i> ${faces}</span>`:""}
          ${tags? `<span class="badge"><i class="fa-solid fa-robot"></i> ${tags}</span>`:""}
        </div>
      </div>
    `;
  }).join("");
}

async function refreshLeads(collectionId){
  const tbody = $("leadRows");
  try{
    // Your flowchart notes POST/GET both are used; we do POST action=list first  [oai_citation:27‡10_END_TO_END_FLOWCHART.txt](sediment://file_00000000ff0c7207be2733fe328d7964)
    let data = null;

    try{
      data = await apiFetch(GET_LEADS_API, {method:"POST", body:{ action:"list", collection_id: collectionId }, auth:false, headers:{}});
    }catch{
      // fallback GET (older path)
      const res = await fetch(`${GET_LEADS_API}?collection_id=${encodeURIComponent(collectionId)}`, {method:"GET"});
      data = await res.json().catch(()=>({}));
      if(!res.ok) throw new Error(data?.message || "Failed to load leads");
    }

    cacheLeads = data.leads || data.items || data.data || [];
    $("cLeadsK").textContent = cacheLeads.length;

    if(!cacheLeads.length){
      tbody.innerHTML = `<tr><td colspan="5" class="muted">No leads yet.</td></tr>`;
      return;
    }

    tbody.innerHTML = cacheLeads.map(l=>{
      const name = escapeHtml(l.name || l.guest_name || "-");
      const mobile = escapeHtml(l.mobile || l.phone || "-");
      const eventId = escapeHtml(l.event_id || l.event || "-");
      const selfie = l.selfie_url || l.selfie || l.selfie_s3_url || "";
      const t = fmtDate(l.created_at || l.time || l.timestamp || "");
      const selfieCell = selfie ? `<a class="btn" style="padding:6px 10px;font-size:12px" target="_blank" href="${escapeHtml(selfie)}"><i class="fa-regular fa-image"></i> View</a>` : `<span class="muted">NA</span>`;
      return `<tr><td>${name}</td><td>${mobile}</td><td>${eventId}</td><td>${selfieCell}</td><td>${t}</td></tr>`;
    }).join("");
  }catch(e){
    console.error(e);
    tbody.innerHTML = `<tr><td colspan="5" class="muted">Failed to load leads</td></tr>`;
  }
}

/* =========================================================

  - Compute SHA-256 per file to support duplicate-safe keys and backend indexing GSI (collection_id-sha256-index exists)  [oai_citation:28‡12_LAMBDA_CODE_FULL_EXPORT.txt](sediment://file_0000000063d87207ab411cf7a09f3e83)
  - Request presigned URLs: POST /generate-upload-urls  [oai_citation:29‡01_API_ENDPOINTS_TO_LAMBDAS.txt](sediment://file_0000000006407207a06c7a35cb865f07)
  - PUT to S3 with returned urls
  - After upload: poll get-events/get-photos to reflect indexing progress (best frontend-only indicator)
========================================================= */
function addFilesToQueue(fileList){
  const files = Array.from(fileList||[]);
  if(!files.length) return;

  // filter formats
  const ok = files.filter(f => f.type.startsWith("image/"));
  const rejected = files.filter(f => !f.type.startsWith("image/"));
  if(rejected.length) showToast(`${rejected.length} non-image files ignored`, "warn");

  uploadQueue.push(...ok);
  renderUploadQueue();
}
function clearUploadQueue(){
  uploadQueue = [];
  uploadAbort = false;
  renderUploadQueue();
  $("upProg").textContent = "—";
}
function cancelUpload(){
  uploadAbort = true;
  showToast("Upload cancelling...","warn");
}
function renderUploadQueue(){
  const box = $("upList");
  if(!uploadQueue.length){
    box.innerHTML = "No files";
    return;
  }
  box.innerHTML = uploadQueue.slice(0,120).map((f,i)=>{
    const fmt = SUPPORTED_FORMATS[f.type] || f.type || "IMG";
    return `<div style="display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px dashed rgba(32,39,55,.55)">
      <div style="min-width:0">
        <b>${escapeHtml(f.name)}</b>
        <div class="muted" style="font-size:11px">${fmt} • ${formatBytes(f.size)}</div>
      </div>
      <span class="badge">${i+1}</span>
    </div>`;
  }).join("") + (uploadQueue.length>120 ? `<div class="muted" style="padding-top:8px">+ ${uploadQueue.length-120} more</div>`:"");
}

async function sha256Hex(file){
  const buf = await file.arrayBuffer();
  const hash = await crypto.subtle.digest("SHA-256", buf);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

async function startUpload(collectionId){
  if(!uploadQueue.length) return showToast("Select files first","bad");
  const eventId = ($("upEvent").value||"").trim();
  if(!eventId) return showToast("Select event first","bad");

  uploadAbort = false;

  try{
    showToast("Preparing upload URLs...", "warn");

    // Build file descriptors for backend
    // (Backend usually needs: collection_id, event_id, files[{filename,content_type,size,sha256}])
    // If backend ignores extra fields, it's still safe.
    const batch = uploadQueue.slice(); // full queue
    const filesMeta = [];

    $("upProg").textContent = `Hashing ${batch.length} files...`;
    for(let i=0;i<batch.length;i++){
      if(uploadAbort) throw new Error("Upload cancelled");
      const f = batch[i];
      const sha = await sha256Hex(f);
      filesMeta.push({
        filename: f.name,
        content_type: f.type || "application/octet-stream",
        size: f.size,
        sha256: sha
      });
      $("upProg").textContent = `Hashing ${i+1}/${batch.length}...`;
    }

    // Request presigned URLs
    const upReq = await apiFetch(UPLOAD_URLS_API, {
      method:"POST",
      body: { collection_id: collectionId, event_id: eventId, files: filesMeta }
    });

    // Try to normalize response
    const items = upReq.uploads || upReq.urls || upReq.items || upReq.data || upReq.presigned || upReq;
    const list = Array.isArray(items) ? items : (items?.uploads || items?.files || []);
    if(!Array.isArray(list) || !list.length) throw new Error("Upload URLs not returned by backend");

    // Map by filename or index
    const byName = {};
    list.forEach(x=>{
      const fn = x.filename || x.name || x.original || x.file || "";
      byName[fn] = x;
    });

    // Upload each file to its presigned URL
    let ok=0, fail=0;
    for(let i=0;i<batch.length;i++){
      if(uploadAbort) throw new Error("Upload cancelled");
      const f = batch[i];
      const meta = byName[f.name] || list[i];
      const putUrl = meta?.uploadUrl || meta?.upload_url || meta?.url || meta?.presigned_url;
      if(!putUrl){
        fail++;
        $("upProg").textContent = `Missing URL for ${f.name} (${i+1}/${batch.length})`;
        continue;
      }

      $("upProg").textContent = `Uploading ${i+1}/${batch.length}...`;
      const putRes = await fetch(putUrl, {
        method:"PUT",
        headers: { "Content-Type": f.type || "application/octet-stream" },
        body: f
      });
      if(putRes.ok) ok++; else fail++;
      $("upProg").textContent = `Uploaded ${i+1}/${batch.length} • OK ${ok} • FAIL ${fail}`;
    }

    uploadQueue = [];
    renderUploadQueue();

    showToast(`Upload done. OK ${ok}, FAIL ${fail}`, fail? "warn":"good");

    // Poll to reflect indexing progress (best frontend indicator)
    await pollIndexProgress(collectionId, 8);

  }catch(e){
    console.error(e);
    showToast(e.message || "Upload failed","bad");
    $("upProg").textContent = "—";
  }
}

async function pollIndexProgress(collectionId, rounds=6){
  // indexing is async (S3 pipeline). We poll events/photos and update KPIs.
  for(let i=0;i<rounds;i++){
    if(uploadAbort) return;
    $("upProg").textContent = `Indexing... refresh ${i+1}/${rounds}`;
    await new Promise(r=>setTimeout(r, 2500));
    await refreshCollection(collectionId);
  }
  $("upProg").textContent = "Indexing check completed.";
}

function applyGuestTheme(theme){
  // theme = {accent, title, tagline, headerImage, logo, footer}
  const accent = theme?.accent || "#6366f1";
  document.documentElement.style.setProperty("--brand", accent);
  document.documentElement.style.setProperty("--brand2", accent);

  $("gTitle").textContent = theme?.title || "Guest Search";
  $("gTag").textContent = theme?.tagline || "Upload your selfie to find your photos";
  $("gFooter").textContent = theme?.footer || "Powered by EventLens Pro";

  // logo: if url present show image, else icon
  const lb = $("gLogoBox");
  lb.style.background = `linear-gradient(135deg, ${accent}, rgba(0,208,132,.9))`;

  }else{
    lb.innerHTML = `<i class="fa-solid fa-sparkles"></i>`;

    $("gHeroImg").style.display = "block";

async function guestLoadTheme(linkId){
  // Best-effort:
  // 1) Resolve link -> get collection_id + event_ids (if lambda returns it)
  // 2) Use client-api get_client_view to get settings.branding  [oai_citation:32‡client-gallery.html](sediment://file_00000000ea1c7207bf4a35789c1a7cb1)
  let collection_id = null;
  let event_ids = [];
  try{
    if(linkId){
      const data = await apiFetch(GET_LINKS_API, {method:"POST", body:{ link_id: linkId }, auth:true}).catch(()=>null);
      // NOTE: your get-links lambda response format is not included in snippets, so we keep robust
      collection_id = data?.collection_id || data?.item?.collection_id || null;
      event_ids = data?.event_ids || data?.item?.event_ids || [];
    }
  }catch{}

  // If no collection id, return default theme
  if(!collection_id) return { accent:"#6366f1", title:"Guest Search", tagline:"Upload your selfie to find your photos", footer:"Powered by EventLens Pro" };

  // populate event dropdown (if we got event_ids)
  try{
    const sel = $("gEvent");
    if(Array.isArray(event_ids) && event_ids.length){
      sel.innerHTML = `<option value="">Auto</option>` + event_ids.map(eid=>`<option value="${escapeHtml(eid)}">${escapeHtml(eid)}</option>`).join("");
    }
  }catch{}

  try{
    const res = await fetch(API_CLIENT, {
      method:"POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ action:"get_client_view", payload:{ collection_id }})
    });
    const data = await res.json().catch(()=>({}));
    if(!res.ok) throw new Error("theme load failed");
    const settings = data.settings || {};
    const b = settings.branding || {};
    return {
      accent: b.accent || "#6366f1",
      title: b.title || data.collection_name || "Guest Search",
      tagline: b.tagline || "Upload your selfie to find your photos",
      headerImage: b.headerImage || "",
      logo: b.logo || "",

    };
  }catch{
    return { accent:"#6366f1", title:"Guest Search", tagline:"Upload your selfie to find your photos", footer:"Powered by EventLens Pro" };
  }
}

  $("gName").value = "";
  $("gMobile").value = "";
  $("gStatus").textContent = "Waiting...";
  $("gResults").innerHTML = "";
  window.__guestLast = null;
}

async function fileToBase64(file){
  const buf = await file.arrayBuffer();
  const bytes = new Uint8Array(buf);
  let binary = "";
  const chunk = 0x8000;
  for(let i=0;i<bytes.length;i+=chunk){
    binary += String.fromCharCode(...bytes.subarray(i,i+chunk));
  }
  const b64 = btoa(binary);
  return `data:${file.type||"image/jpeg"};base64,${b64}`;
}

async function guestSearch(linkId){
  if(!linkId) return showToast("Invalid linkId","bad");
  const f = $("gSelfie").files?.[0];
  if(!f) return showToast("Please select selfie","bad");

  $("gStatus").textContent = "Uploading selfie + searching...";
  $("gResults").innerHTML = "";

  try{
    const selfie = await fileToBase64(f);

    // POST /search (selfie-search-find-matches)  [oai_citation:33‡10_END_TO_END_FLOWCHART.txt](sediment://file_00000000ff0c7207be2733fe328d7964)
    const res = await fetch(SEARCH_API, {
      method:"POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ link_id: linkId, selfie })
    });
    const data = await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(data?.message || "Search failed");

    const photos = data.photos || data.matches || data.results || [];
    window.__guestLast = { selfie, photos, raw:data };

    if(!Array.isArray(photos) || !photos.length){
      $("gStatus").textContent = "No matches found. Try a clearer selfie.";
      return;
    }

    $("gStatus").textContent = `Found ${photos.length} photos. Now fill details and submit.`;
    $("gResults").innerHTML = photos.slice(0,48).map(p=>{
      const url = p.url || p.signed_url || p.photo_url || p.thumbnail_url || "";
      return `
        <div class="photo" onclick="window.open('${escapeHtml(url)}','_blank')">
          <img src="${escapeHtml(url)}" loading="lazy"/>
        </div>
      `;
    }).join("");

  }catch(e){
    console.error(e);
    $("gStatus").textContent = "Error: " + (e.message||"Failed");
    showToast(e.message||"Search failed","bad");
  }
}

async function guestSubmitLead(linkId){
  if(!linkId) return showToast("Invalid linkId","bad");
  const last = window.__guestLast;
  if(!last || !last.photos || !last.photos.length) return showToast("First search selfie & get results","bad");

  const name = ($("gName").value||"").trim();
  const mobile = ($("gMobile").value||"").trim();
  const event_id = ($("gEvent").value||"").trim();

  if(!name) return showToast("Name required","bad");
  if(!/^\d{10}$/.test(mobile)) return showToast("Enter valid 10-digit mobile","bad");

  try{
    $("gStatus").textContent = "Submitting details...";

    // POST /save-details (selfie-search-save-details)  [oai_citation:34‡10_END_TO_END_FLOWCHART.txt](sediment://file_00000000ff0c7207be2733fe328d7964)
    const payload = {
      link_id: linkId,
      name,
      mobile,

      event_id: event_id || undefined,
      selfie: last.selfie,
      results: last.photos
    };

    const res = await fetch(GET_LEADS_API, {
      method:"POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(payload)
    });
    const data = await res.json().catch(()=>({}));
    if(!res.ok) throw new Error(data?.message || "Submit failed");

    $("gStatus").textContent = "Submitted! You can close this page.";
    showToast("Submitted successfully","good");
  }catch(e){
    console.error(e);
    showToast(e.message||"Submit failed","bad");
    $("gStatus").textContent = "Error: " + (e.message||"Submit failed");
  }
}
