<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>EventLens Pro – Deep Trace</title>
  
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    :root { --bg:#030305; --panel:#0f0f12; --green:#00e676; --red:#ff4757; --text:#fff; --border:rgba(255,255,255,0.1); }
    body { background:var(--bg); color:var(--text); font-family:"Plus Jakarta Sans",sans-serif; margin:0; padding:20px; }
    
    .card { background:var(--panel); border:1px solid var(--border); padding:20px; border-radius:12px; margin-bottom:20px; }
    .btn { background:var(--green); color:#000; border:none; padding:10px 20px; border-radius:50px; font-weight:700; cursor:pointer; }
    .btn.sec { background:transparent; border:1px solid var(--border); color:#fff; }
    .btn:disabled { opacity:0.5; cursor:not-allowed; }
    
    input, select { background:rgba(0,0,0,0.3); border:1px solid var(--border); color:#fff; padding:10px; border-radius:8px; width:100%; margin-bottom:10px; }
    
    /* Log Console */
    #console { 
        background:#000; border:1px solid #333; color:#0f0; 
        font-family:'Courier New', monospace; font-size:12px; 
        height:400px; overflow-y:scroll; padding:15px; 
        white-space:pre-wrap; word-break:break-all;
    }
    .log-row { border-bottom:1px solid #222; padding:4px 0; }
    .c-sent { color:#70a1ff; } /* Blue for Request */
    .c-recv { color:#eccc68; } /* Yellow for Response */
    .c-err { color:#ff4757; font-weight:bold; }
    .c-ok { color:#2ed573; }

    .view { display:none; }
    .view.active { display:block; }
  </style>
</head>
<body>

  <div style="max-width:1000px; margin:0 auto;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2>EventLens <span style="color:var(--green)">Deep Trace</span></h2>
        <button class="btn sec" onclick="localStorage.clear(); location.reload()">Logout</button>
    </div>

    <!-- LOGIN -->
    <div id="vLogin" class="view">
        <div class="card" style="text-align:center;">
            <h3>Login Required</h3>
            <button class="btn" onclick="login()">Login with Cognito</button>
        </div>
    </div>

    <!-- MAIN -->
    <div id="vMain" class="view">
        
        <div class="card">
            <h3>1. Target</h3>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <div>
                    <label>Collection</label>
                    <select id="colSelect" onchange="loadEvents(this.value)"><option>Loading...</option></select>
                </div>
                <div>
                    <label>Event</label>
                    <select id="evSelect"><option>Select Collection First</option></select>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>2. Upload Test</h3>
            
            <div style="margin-bottom:15px; background:rgba(255,255,255,0.05); padding:10px; border-radius:8px;">
                <label style="display:flex; align-items:center; gap:10px; cursor:pointer;">
                    <input type="checkbox" id="skipProcess" style="width:auto; margin:0;"> 
                    <span style="font-weight:bold; color:var(--red);">Skip Processing (Send Raw File)</span>
                </label>
                <div style="font-size:11px; color:#aaa; margin-left:24px;">
                    Check this if normal upload returns "0 URLs". It sends the file without canvas/hash changes.
                </div>
            </div>

            <input type="file" id="fileIn" multiple accept="image/*">
            <button class="btn" id="upBtn" onclick="runUpload()" disabled>Start Upload Trace</button>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between;">
                <h3>System Log</h3>
                <button class="btn sec" onclick="$('console').innerHTML=''">Clear</button>
            </div>
            <div id="console">Ready. Select files to begin.</div>
        </div>

    </div>
  </div>

<script>
/** CONFIG */
const API = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod";
const AUTH = "https://ap-south-1mva8s6f3w.auth.ap-south-1.amazoncognito.com";
const CLIENT_ID = "6j3gec3kk0q0ktkals8cr8s367";

let token = localStorage.getItem('idToken');
const $ = id => document.getElementById(id);
const log = (msg, cls='') => {
    const d = new Date().toISOString().split('T')[1].split('.')[0];
    $('console').innerHTML += `<div class="log-row ${cls}">[${d}] ${msg}</div>`;
    $('console').scrollTop = $('console').scrollHeight;
};

/** AUTH & INIT */
if(location.search.includes('code')){
    const code = new URLSearchParams(location.search).get('code');
    fetch(`${AUTH}/oauth2/token`, {
        method:'POST',
        headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body: `grant_type=authorization_code&client_id=${CLIENT_ID}&code=${code}&redirect_uri=${location.origin+location.pathname}`
    }).then(r=>r.json()).then(d=>{
        if(d.id_token) { localStorage.setItem('idToken', d.id_token); location.href = location.pathname; }
        else alert('Login failed');
    });
} else if(token) {
    $('vMain').classList.add('active');
    initData();
} else {
    $('vLogin').classList.add('active');
}

function login(){
    location.href = `${AUTH}/login?response_type=code&client_id=${CLIENT_ID}&redirect_uri=${location.origin+location.pathname}`;
}

/** DATA LOADING */
async function api(path, method='GET', body){
    log(`${method} ${path}`, 'c-sent');
    try {
        const res = await fetch(API+path, {
            method,
            headers: { 'Authorization':`Bearer ${token}`, 'Content-Type':'application/json' },
            body: body ? JSON.stringify(body) : undefined
        });
        const txt = await res.text();
        log(`RESPONSE (${res.status}): ${txt.substring(0, 200)}...`, res.ok?'c-recv':'c-err');
        return JSON.parse(txt);
    } catch(e) {
        log(`NET ERROR: ${e.message}`, 'c-err');
        throw e;
    }
}

async function initData(){
    const data = await api('/get-collections');
    const cols = data.Items || [];
    $('colSelect').innerHTML = '<option value="">Select Collection</option>' + 
        cols.map(c => `<option value="${c.collection_id}">${c.name}</option>`).join('');
}

async function loadEvents(cid){
    if(!cid) return;
    const data = await api('/get-events', 'POST', { collection_id: cid });
    const evs = data.events || [];
    $('evSelect').innerHTML = '<option value="">Select Event</option>' + 
        evs.map(e => `<option value="${e.event_id}">${e.name}</option>`).join('');
}

$('fileIn').onchange = (e) => {
    $('upBtn').disabled = e.target.files.length === 0;
    $('upBtn').innerText = `Upload ${e.target.files.length} Files`;
};

/** === UPLOAD CORE === */
async function runUpload(){
    const cid = $('colSelect').value;
    const eid = $('evSelect').value;
    const files = Array.from($('fileIn').files);
    const skipProc = $('skipProcess').checked;

    if(!cid || !eid) return alert('Select Collection and Event');
    
    $('upBtn').disabled = true;
    log('--- STARTING TRACE ---');
    log(`Mode: ${skipProc ? 'RAW (No Processing)' : 'PROCESSED (Canvas+Hash)'}`);

    for(let f of files){
        try {
            let fileToSend = f;
            let fileHash = "raw_hash_skipped";

            // 1. Pre-processing
            if(!skipProc){
                log(`Processing ${f.name}...`);
                fileToSend = await processFile(f);
                fileHash = await computeHash(fileToSend);
                log(`Hash Generated: ${fileHash.substring(0,10)}...`);
            }

            // 2. Prepare Payload
            // FIX: Sending BOTH 'type' and 'content_type' to be safe
            const fileMeta = {
                name: fileToSend.name,
                type: 'image/jpeg',         // Standard
                content_type: 'image/jpeg', // Cognito/Lambda might prefer this
                size: fileToSend.size,
                hash: fileHash
            };

            const payload = {
                collection_id: cid,
                event_id: eid,
                files: [fileMeta] // Sending 1 by 1 for trace clarity
            };

            log(`PAYLOAD SENT:\n${JSON.stringify(payload, null, 2)}`, 'c-sent');

            // 3. Get URL
            const urlRes = await api('/generate-upload-urls', 'POST', payload);
            log(`RAW RESPONSE:\n${JSON.stringify(urlRes, null, 2)}`, 'c-recv');

            // 4. Analyze
            if(urlRes.skipped && urlRes.skipped.includes(0)){
                log('RESULT: Backend says DUPLICATE.', 'c-err');
                continue;
            }

            if(!urlRes.items || urlRes.items.length === 0){
                log('RESULT: Backend returned 0 URLs. Something is wrong with Input format.', 'c-err');
                continue;
            }

            // 5. Upload
            const item = urlRes.items[0];
            log(`Uploading to S3... (${item.uploadUrl.substring(0,30)}...)`);
            
            const s3Res = await fetch(item.uploadUrl, {
                method: 'PUT',
                body: fileToSend,
                headers: { 'Content-Type': 'image/jpeg' }
            });

            if(!s3Res.ok) throw new Error(`S3 Error: ${s3Res.status}`);
            log('S3 Upload: OK', 'c-ok');

            // 6. Register
            log('Registering...');
            await api('/register-photo', 'POST', {
                collection_id: cid,
                event_id: eid,
                object_key: item.key,
                filename: fileToSend.name,
                size: fileToSend.size,
                content_type: 'image/jpeg',
                hash: fileHash
            });
            log('Register: OK. Photo should be visible now.', 'c-ok');

        } catch(e) {
            log(`FATAL ERROR: ${e.message}`, 'c-err');
        }
    }
    
    $('upBtn').disabled = false;
    log('--- TRACE COMPLETE ---');
}

/** HELPERS */
function processFile(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.src = e.target.result;
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = img.width; canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle="#FFF"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.drawImage(img, 0, 0);
        // Force Rename
        const newName = file.name.split('.')[0].replace(/[^a-z0-9]/gi,'_') + ".jpg";
        canvas.toBlob(b => resolve(new File([b], newName, {type:'image/jpeg'})), 'image/jpeg', 0.9);
      };
    };
    reader.readAsDataURL(file);
  });
}

async function computeHash(file) {
  const buf = await file.arrayBuffer();
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
</script>
</body>
</html>
