<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>EventLens – Find Your Photos</title>

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- Libs: Confetti & ZIP -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <style>
    /* =========================================
       THEME & BASICS
       ========================================= */
    :root {
      --bg-dark: #030305;
      --bg-panel: #0f0f12;
      --primary: #00e676;
      --primary-dim: rgba(0, 230, 118, 0.15);
      --accent: #6366f1;
      --danger: #ff4757;
      --text-main: #ffffff;
      --text-muted: #94949e;
      --border-color: rgba(255, 255, 255, 0.08);
      --glass-bg: rgba(20, 20, 23, 0.7);
      --radius-lg: 24px;
      --radius-md: 16px;
      --radius-full: 9999px;
      --ease: cubic-bezier(0.23, 1, 0.32, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }

    body {
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 50% 0%, rgba(0, 230, 118, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 85% 30%, rgba(99, 102, 241, 0.05) 0%, transparent 50%);
      color: var(--text-main);
      font-family: "Plus Jakarta Sans", sans-serif;
      font-size: 16px;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* Container */
    .container {
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
      padding: 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header { text-align: center; margin-bottom: 32px; padding-top: 10px; }
    .logo {
      font-family: 'Outfit', sans-serif;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 8px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #fff 0%, #ccc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo i { -webkit-text-fill-color: var(--primary); }
    .subtitle { color: var(--text-muted); font-size: 15px; font-weight: 500; }

    /* Card Component */
    .card {
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 32px 24px;
      box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
      animation: slideUp 0.6s var(--ease);
      display: none; /* Hidden by default */
    }
    .card.active { display: block; }
    
    .card::before {
      content:''; position: absolute; top:0; left:0; right:0; height:1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    }

    @keyframes slideUp { from { opacity:0; transform:translateY(40px); } to { opacity:1; transform:translateY(0); } }

    .step-label {
      font-size: 12px; font-weight: 700; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px;
    }
    .step-title {
      font-family: 'Outfit', sans-serif; font-size: 24px; font-weight: 700; margin-bottom: 24px; color: var(--text-main); line-height: 1.2;
    }

    /* Upload Area */
    .upload-box {
      border: 2px dashed var(--border-color);
      border-radius: var(--radius-md);
      padding: 40px 20px;
      text-align: center;
      transition: 0.3s var(--ease);
      background: rgba(255,255,255,0.02);
      cursor: pointer;
      position: relative;
    }
    .upload-box:hover { border-color: var(--primary); background: rgba(0, 230, 118, 0.05); }
    .upload-box:active { transform: scale(0.98); }
    
    .cam-circle {
      width: 80px; height: 80px; border-radius: 50%; background: var(--bg-dark);
      border: 1px solid var(--border-color); margin: 0 auto 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; color: var(--text-muted); transition: 0.3s;
    }
    .upload-box:hover .cam-circle { color: var(--primary); border-color: var(--primary); transform: scale(1.1); }

    /* Inputs & Buttons */
    input[type="text"], input[type="tel"] {
      width: 100%; padding: 16px; background: rgba(0,0,0,0.4);
      border: 1px solid var(--border-color); border-radius: var(--radius-md);
      color: white; font-size: 16px; margin-bottom: 16px; font-family: inherit; transition: 0.3s;
    }
    input:focus { border-color: var(--primary); background: rgba(0,0,0,0.6); box-shadow: 0 0 0 4px var(--primary-dim); }

    .btn {
      width: 100%; padding: 18px; border-radius: var(--radius-full); border: none;
      font-size: 16px; font-weight: 700; cursor: pointer; font-family: 'Outfit', sans-serif;
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      transition: all 0.3s var(--ease); position: relative; overflow: hidden;
    }
    .btn.primary { background: var(--primary); color: #000; box-shadow: 0 8px 24px -4px rgba(0, 230, 118, 0.4); }
    .btn.primary:hover { transform: translateY(-2px); box-shadow: 0 12px 30px -4px rgba(0, 230, 118, 0.6); }
    .btn.primary:active { transform: translateY(0); }
    
    .btn.secondary { background: rgba(255,255,255,0.06); color: var(--text-main); border: 1px solid transparent; }
    .btn.secondary:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.1); }

    /* Gallery */
    .gallery-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
      margin-top: 20px;
    }
    .ph {
      aspect-ratio: 1; border-radius: 12px; overflow: hidden; position: relative;
      background: #000; cursor: pointer; transition: 0.2s;
    }
    .ph img { width: 100%; height: 100%; object-fit: cover; transition: 0.4s; }
    .ph .check {
      position: absolute; top: 6px; right: 6px; width: 22px; height: 22px;
      border-radius: 50%; background: rgba(0,0,0,0.5); border: 1.5px solid rgba(255,255,255,0.6);
      display: flex; align-items: center; justify-content: center; color: transparent; transition: 0.2s;
    }
    .ph.selected img { opacity: 0.4; transform: scale(0.95); }
    .ph.selected .check { background: var(--primary); border-color: var(--primary); color: #000; transform: scale(1.1); }

    /* Filters */
    .filter-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 16px; scrollbar-width: none; }
    .filter-chip {
      white-space: nowrap; padding: 8px 16px; border-radius: 30px;
      background: rgba(255,255,255,0.05); border: 1px solid var(--border-color);
      color: var(--text-muted); font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s;
    }
    .filter-chip.active { background: var(--primary); color: #000; border-color: var(--primary); }

    /* Loader & Preview */
    #previewContainer { text-align: center; margin-top: 24px; animation: fadeIn 0.4s; }
    #previewImg {
      width: 140px; height: 140px; border-radius: 50%; object-fit: cover;
      border: 4px solid var(--primary); box-shadow: 0 0 40px var(--primary-dim);
      margin-bottom: 24px;
    }
    .scanning-line {
      position: absolute; width: 100%; height: 2px; background: var(--primary);
      top: 0; left: 0; box-shadow: 0 0 10px var(--primary);
      animation: scan 1.5s infinite linear; display: none;
    }
    @keyframes scan { 0% { top:0; opacity:0; } 50% { opacity:1; } 100% { top:100%; opacity:0; } }

    /* Viewer */
    .viewer {
      position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000;
      display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: 0.3s;
    }
    .viewer.open { opacity: 1; pointer-events: all; }
    .viewer-img { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .viewer-img img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .viewer-ctrl { padding: 20px; display: flex; justify-content: space-between; align-items: center; }

  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo"><i class="fa-brands fa-camera-retro"></i>&nbsp;EventLens</div>
    <div class="subtitle">AI Powered Instant Photo Finder</div>
  </header>

  <!-- STEP 1: UPLOAD SELFIE -->
  <div id="cardUpload" class="card active">
    <div class="step-label">Step 1</div>
    <div class="step-title">Upload a selfie to find your photos</div>
    
    <input type="file" id="fileInput" accept="image/*" style="display:none">
    
    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
      <div class="cam-circle"><i class="fa-solid fa-camera"></i></div>
      <div style="font-weight:700; color:#fff; font-size:18px; margin-bottom:6px;">Take a Selfie</div>
      <div style="color:var(--text-muted); font-size:14px;">or upload from gallery</div>
    </div>
  </div>

  <!-- STEP 1.5: PREVIEW & SEARCH -->
  <div id="cardPreview" class="card">
    <div class="step-label">Ready?</div>
    <div class="step-title">Is this you?</div>
    
    <div id="previewContainer">
      <div style="position:relative; width:140px; height:140px; margin:0 auto 24px; border-radius:50%; overflow:hidden;">
        <img id="previewImg" src="" style="width:100%; height:100%; object-fit:cover;">
        <div class="scanning-line" id="scanLine"></div>
      </div>
      
      <div class="row" style="flex-direction:column; gap:12px;">
        <button class="btn primary" id="searchBtn">
          <span>Find My Photos</span> <i class="fa-solid fa-wand-magic-sparkles"></i>
        </button>
        <button class="btn secondary" onclick="resetUpload()">Retake Photo</button>
      </div>
    </div>
  </div>

  <!-- STEP 2: DETAILS & RESULTS -->
  <div id="cardDetails" class="card">
    <div class="step-label">Success!</div>
    <div class="step-title">We found <span id="matchCountVal" style="color:var(--primary)">0</span> photos</div>
    
    <div style="text-align:center; margin-bottom:24px;">
      <p style="color:var(--text-muted); font-size:14px;">Please enter your details to view them.</p>
    </div>

    <input type="text" id="guestName" placeholder="Your Name">
    <input type="tel" id="guestPhone" placeholder="Mobile Number" maxlength="10">
    
    <button class="btn primary" id="viewGalleryBtn">
      View Photos <i class="fa-solid fa-arrow-right"></i>
    </button>
  </div>

  <!-- STEP 3: GALLERY -->
  <div id="gallerySection" style="display:none; animation: slideUp 0.6s var(--ease);">
    
    <!-- Search & Filter -->
    <div style="position:sticky; top:10px; z-index:50; background:rgba(15,15,18,0.9); backdrop-filter:blur(10px); padding:16px; border-radius:var(--radius-md); border:1px solid var(--border-color); margin-bottom:20px; box-shadow:0 10px 30px rgba(0,0,0,0.5);">
      <div class="row" style="margin-bottom:12px;">
         <i class="fa-solid fa-magnifying-glass" style="color:var(--text-muted)"></i>
         <input type="text" id="gallerySearch" placeholder="Search (e.g. smile, stage)..." style="margin:0; border:none; background:transparent; padding:0 10px; flex:1;">
      </div>
      <div class="filter-scroll">
        <div class="filter-chip active" onclick="filterGallery('ALL', this)">All Photos</div>
        <div class="filter-chip" onclick="filterGallery('Smile', this)">😊 Smile</div>
        <div class="filter-chip" onclick="filterGallery('Group', this)">👨‍👩‍👧‍👦 Group</div>
        <div class="filter-chip" onclick="filterGallery('Stage', this)">🎤 Stage</div>
      </div>
      <div class="row" style="justify-content:space-between;">
         <span style="font-size:12px; color:var(--text-muted);"><b id="selCount" style="color:#fff">0</b> Selected</span>
         <div class="row" style="gap:8px;">
           <button class="filter-chip" onclick="selectAll()">Select All</button>
           <button class="filter-chip active" onclick="downloadSelected()"><i class="fa-solid fa-download"></i></button>
         </div>
      </div>
    </div>

    <div id="photoGrid" class="gallery-grid"></div>

    <div style="margin-top:40px; text-align:center;">
      <button class="btn" style="background:#25D366; color:#fff;" onclick="shareWhatsapp()">
        <i class="fa-brands fa-whatsapp"></i> Share Link
      </button>
      <button class="btn secondary" style="margin-top:16px;" onclick="location.reload()">Find Another Person</button>
    </div>

  </div>

</div>

<!-- Photo Viewer Modal -->
<div id="viewer" class="viewer">
  <div style="position:absolute; top:20px; right:20px; z-index:1001;">
    <button class="btn secondary" style="width:40px; height:40px; padding:0; border-radius:50%;" onclick="closeViewer()"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <div class="viewer-img">
    <img id="viewerImg" src="">
  </div>
  <div class="viewer-ctrl">
    <button class="btn secondary" style="width:50px; padding:0;" onclick="prevImg()"><i class="fa-solid fa-chevron-left"></i></button>
    <button class="btn primary" style="width:auto; padding:0 24px;" onclick="toggleViewerSelect()">Select / Unselect</button>
    <button class="btn secondary" style="width:50px; padding:0;" onclick="nextImg()"><i class="fa-solid fa-chevron-right"></i></button>
  </div>
</div>

<script>
  // --- CONFIG ---
  const API_BASE = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod";
  const SEARCH_API = `${API_BASE}/search`;
  const SAVE_API = `${API_BASE}/save-details`;

  // --- STATE ---
  let selfieBase64 = null;
  let allPhotos = [];
  let filteredPhotos = [];
  let selectedUrls = new Set();
  let currentViewerIdx = 0;
  let linkId = new URLSearchParams(location.search).get('linkId');
  let collectionId = new URLSearchParams(location.search).get('cid'); // Collection ID from URL

  // --- DOM ELEMENTS ---
  const $ = (id) => document.getElementById(id);
  const cardUpload = $('cardUpload');
  const cardPreview = $('cardPreview');
  const cardDetails = $('cardDetails');
  const gallerySection = $('gallerySection');

  // --- STEP 1: UPLOAD ---
  $('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if(file){
      const reader = new FileReader();
      reader.onload = (ev) => {
        // Simple compression canvas logic if needed, but for now direct
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let w = img.width, h = img.height;
          const max = 1000;
          if(w>h){ if(w>max){ h*=max/w; w=max; } } else { if(h>max){ w*=max/h; h=max; } }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img,0,0,w,h);
          selfieBase64 = canvas.toDataURL('image/jpeg', 0.8);
          
          $('previewImg').src = selfieBase64;
          switchCard(cardUpload, cardPreview);
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    }
  });

  window.resetUpload = () => {
    $('fileInput').value = '';
    selfieBase64 = null;
    switchCard(cardPreview, cardUpload);
  };

  function switchCard(from, to) {
    from.classList.remove('active');
    setTimeout(() => {
      from.style.display = 'none';
      to.style.display = 'block';
      setTimeout(() => to.classList.add('active'), 10);
    }, 200); // Wait for anim
  }

  // --- STEP 2: SEARCH ---
  $('searchBtn').onclick = async () => {
    if(!linkId) { alert("Invalid Link. Please use the link provided by the photographer."); return; }
    
    const btn = $('searchBtn');
    const originalText = btn.innerHTML;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Scanning...';
    btn.disabled = true;
    $('scanLine').style.display = 'block';

    try {
      // Remove header if present
      const b64Clean = selfieBase64.split(',')[1];
      
      const res = await fetch(SEARCH_API, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ linkId, selfie_image: b64Clean }) // Send clean base64
      });

      const data = await res.json();
      if(!res.ok) throw new Error(data.message || 'Search failed');

      allPhotos = data.matches || [];
      filteredPhotos = [...allPhotos];
      
      $('matchCountVal').textContent = allPhotos.length;
      
      if(allPhotos.length > 0){
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#00e676', '#6366f1'] });
      } else {
        alert("No matches found. Try a clearer selfie.");
        resetUpload();
        return;
      }

      switchCard(cardPreview, cardDetails);

    } catch(e) {
      alert("Error: " + e.message);
      resetUpload();
    } finally {
      btn.innerHTML = originalText;
      btn.disabled = false;
      $('scanLine').style.display = 'none';
    }
  };

  // --- STEP 3: SAVE & GALLERY ---
  $('viewGalleryBtn').onclick = async () => {
    const name = $('guestName').value.trim();
    const phone = $('guestPhone').value.trim();
    if(!name || phone.length < 10) { alert("Please enter valid name and mobile number"); return; }

    const btn = $('viewGalleryBtn');
    btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i>';
    
    // Save details in background
    fetch(SAVE_API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        collection_id: collectionId || 'unknown',
        linkId: linkId,
        name, mobile: phone,
        selfie_image: selfieBase64, // Full data URI
        photo_count: allPhotos.length
      })
    }).catch(console.error);

    // Show Gallery
    cardDetails.style.display = 'none';
    gallerySection.style.display = 'block';
    renderGrid();
  };

  // --- GALLERY LOGIC ---
  $('gallerySearch').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    filteredPhotos = allPhotos.filter(p => (p.ai_tags||[]).join(' ').toLowerCase().includes(q));
    renderGrid();
  });

  window.filterGallery = (tag, el) => {
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    
    if(tag === 'ALL') filteredPhotos = [...allPhotos];
    else filteredPhotos = allPhotos.filter(p => (p.ai_tags||[]).includes(tag));
    
    renderGrid();
  };

  function renderGrid() {
    const grid = $('photoGrid');
    grid.innerHTML = '';
    
    if(!filteredPhotos.length) {
      grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:40px; color:var(--text-muted)">No photos found matching this filter.</div>';
      return;
    }

    filteredPhotos.forEach((p, idx) => {
      const div = document.createElement('div');
      div.className = `ph ${selectedUrls.has(p.url) ? 'selected' : ''}`;
      
      // Tap behavior: If selecting, toggle. If viewing, open viewer.
      div.onclick = (e) => {
        if(e.target.closest('.check')) {
          toggleSelect(p.url);
        } else {
          openViewer(idx);
        }
      };

      div.innerHTML = `
        <img src="${p.thumbnail_url || p.url}" loading="lazy">
        <div class="check"><i class="fa-solid fa-check" style="font-size:12px;"></i></div>
      `;
      grid.appendChild(div);
    });
    $('selCount').textContent = selectedUrls.size;
  }

  function toggleSelect(url) {
    if(selectedUrls.has(url)) selectedUrls.delete(url);
    else selectedUrls.add(url);
    renderGrid();
  }

  window.selectAll = () => {
    if(selectedUrls.size === filteredPhotos.length) selectedUrls.clear();
    else filteredPhotos.forEach(p => selectedUrls.add(p.url));
    renderGrid();
  };

  // --- DOWNLOAD ---
  window.downloadSelected = async () => {
    if(selectedUrls.size === 0) return alert("Select photos to download!");
    const btn = document.querySelector('button[onclick="downloadSelected()"]');
    const oldHtml = btn.innerHTML;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
    
    try {
      const zip = new JSZip();
      const urls = Array.from(selectedUrls);
      
      // Sequential download to avoid browser limits
      for(let i=0; i<urls.length; i++) {
        const blob = await fetch(urls[i]).then(r => r.blob());
        zip.file(`EventLens_Photo_${i+1}.jpg`, blob);
      }
      
      const content = await zip.generateAsync({type:"blob"});
      saveAs(content, "My_Event_Photos.zip");
    } catch(e) {
      alert("Download failed. Try selecting fewer photos.");
    } finally {
      btn.innerHTML = oldHtml;
    }
  };

  window.shareWhatsapp = () => {
    const msg = `Hey! I found my photos using EventLens AI. Check it out: ${window.location.href}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
  };

  // --- VIEWER ---
  function openViewer(idx) {
    currentViewerIdx = idx;
    updateViewer();
    $('viewer').classList.add('open');
  }
  function updateViewer() {
    const p = filteredPhotos[currentViewerIdx];
    $('viewerImg').src = p.url;
  }
  window.closeViewer = () => $('viewer').classList.remove('open');
  window.nextImg = () => {
    currentViewerIdx = (currentViewerIdx + 1) % filteredPhotos.length;
    updateViewer();
  };
  window.prevImg = () => {
    currentViewerIdx = (currentViewerIdx - 1 + filteredPhotos.length) % filteredPhotos.length;
    updateViewer();
  };
  window.toggleViewerSelect = () => {
    const url = filteredPhotos[currentViewerIdx].url;
    toggleSelect(url);
    // Visual feedback could be added here
  };

</script>
</body>
</html>
