<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Upload - EventLens</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>

  <style>
    body { background: #000; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
    .container { width: 100%; max-width: 500px; }
    .card { background: #111; border: 1px solid #333; border-radius: 16px; padding: 30px; text-align: center; }
    h2 { color: #00e676; margin-bottom: 10px; }
    
    select { width: 100%; padding: 14px; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; margin-bottom: 20px; font-size: 16px; }
    
    .upload-box { border: 2px dashed #444; padding: 40px; border-radius: 12px; cursor: pointer; transition: 0.3s; }
    .upload-box:hover { border-color: #00e676; background: rgba(0,230,118,0.05); }
    .upload-box i { font-size: 40px; color: #555; margin-bottom: 10px; }
    
    .btn { background: #00e676; color: #000; border: none; padding: 14px; width: 100%; font-weight: 700; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 20px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .progress-bar { height: 6px; background: #333; border-radius: 3px; margin-top: 20px; overflow: hidden; display: none; }
    .progress-fill { height: 100%; background: #00e676; width: 0%; transition: 0.3s; }
    
    .hidden { display: none; }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    <h2><i class="fa-solid fa-cloud-arrow-up"></i> Staff Upload</h2>
    <p style="color:#888; margin-bottom: 30px;">Select Event & Upload Photos</p>

    <!-- Collection Dropdown (Hidden if cid in URL) -->
    <div id="colSelectWrap">
        <label style="display:block; text-align:left; margin-bottom:5px; color:#888; font-size:12px;">COLLECTION</label>
        <select id="colSelect" onchange="loadEvents()"></select>
    </div>

    <label style="display:block; text-align:left; margin-bottom:5px; color:#888; font-size:12px;">EVENT</label>
    <select id="eventSelect">
      <option value="">Select Event...</option>
    </select>

    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
      <i class="fa-solid fa-images"></i>
      <p>Click to Select Photos</p>
      <input type="file" id="fileInput" multiple accept="image/*" hidden onchange="handleFiles(this.files)">
    </div>

    <div id="fileCount" style="margin-top: 15px; font-weight: 600; color: #00e676; display:none;">0 Files Selected</div>

    <button class="btn" id="uploadBtn" onclick="startUpload()" disabled>Start Upload</button>

    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <p id="statusText" style="margin-top: 10px; font-size: 13px; color: #888;"></p>
  </div>
</div>

<script>
    const API_BASE = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod";
    let token = localStorage.getItem('idToken');
    
    let queue = [];
    const urlParams = new URLSearchParams(window.location.search);
    const preCid = urlParams.get('cid');
    const preEid = urlParams.get('eid');

    window.onload = async () => {
        if(!token) {
            alert("Device not authenticated. Please login as photographer first on dashboard.");
            window.location.href = "dashboard.html"; 
            return;
        }

        if(preCid) {
            document.getElementById('colSelectWrap').classList.add('hidden');
            await loadEvents(preCid);
        } else {
            await loadCollections();
        }
    };

    async function loadCollections() {
        try {
            const res = await fetch(`${API_BASE}/get-collections`, { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            const sel = document.getElementById('colSelect');
            sel.innerHTML = '<option value="">Select Collection...</option>' + 
                (data.Items || []).map(c => `<option value="${c.collection_id}">${c.name}</option>`).join('');
        } catch(e) { console.error(e); alert("Failed to load collections"); }
    }

    async function loadEvents(cidOverride) {
        const cid = cidOverride || document.getElementById('colSelect').value;
        if(!cid) return;

        try {
            const res = await fetch(`${API_BASE}/get-events`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ collection_id: cid })
            });
            const data = await res.json();
            const sel = document.getElementById('eventSelect');
            sel.innerHTML = '<option value="">Select Event...</option>' + 
                (data.events || []).map(e => `<option value="${e.event_id}">${e.name}</option>`).join('');
                
            if(preEid) sel.value = preEid;
        } catch(e) { console.error(e); }
    }

    function handleFiles(files) {
        queue = Array.from(files);
        document.getElementById('fileCount').style.display = 'block';
        document.getElementById('fileCount').innerText = `${queue.length} Files Selected`;
        document.getElementById('uploadBtn').disabled = false;
    }

    async function startUpload() {
        const cid = preCid || document.getElementById('colSelect').value;
        const eid = document.getElementById('eventSelect').value;
        if(!eid) return alert("Select an event!");

        document.getElementById('uploadBtn').disabled = true;
        document.getElementById('progressBar').style.display = 'block';
        const bar = document.getElementById('progressFill');
        const stat = document.getElementById('statusText');

        let processed = 0;
        const chunkSi = 50;

        for(let i=0; i<queue.length; i+=chunkSi) {
            const chunk = queue.slice(i, i+chunkSi);
            stat.innerText = `Processing & Uploading Batch ${Math.ceil((i+1)/50)}...`;
            
            const metas = await Promise.all(chunk.map(async f => {
                let procFile = f;
                
                // 1. Convert HEIC
                if(f.name.toLowerCase().endsWith('.heic')){
                    try {
                        const blob = await heic2any({ blob: f, toType: "image/jpeg", quality: 0.8 });
                        procFile = new File([blob], f.name.replace(/\.heic$/i, ".jpg"), { type: "image/jpeg" });
                    } catch(e) {}
                }

                // 2. FORCE RENAME TO LOWERCASE .jpg (Critical for S3 Indexing Trigger)
                // This handles Photo.JPG, image.png, etc. by forcing them to .jpg suffix
                let parts = procFile.name.split('.');
                if(parts.length > 1) parts.pop(); // Remove existing extension
                let finalName = parts.join('.') + ".jpg";

                const b = await procFile.arrayBuffer();
                const h = await crypto.subtle.digest('SHA-256', b);
                const hash = Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('');
                
                // Send forced .jpg name to backend
                return { name: finalName, type: 'image/jpeg', size: procFile.size, hash: hash, file: procFile };
            }));

            try {
                const res = await fetch(`${API_BASE}/generate-upload-urls`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ collection_id: cid, event_id: eid, files: metas })
                });
                const data = await res.json();

                if(data.urls) {
                    await Promise.all(data.urls.map(u => {
                        const item = metas.find(m => m.hash === u.hash);
                        return fetch(u.uploadURL, {
                            method: 'PUT',
                            body: item.file,
                            headers: { 'Content-Type': 'image/jpeg', 'x-amz-meta-original-hash': u.hash }
                        });
                    }));
                }
            } catch(e) {
                console.error("Batch failed", e);
            }
            
            processed += chunk.length;
            bar.style.width = `${(processed/queue.length)*100}%`;
        }

        stat.innerText = "Upload Complete! Indexing will start automatically.";
        alert("Upload Done! Photos will appear in dashboard shortly.");
        location.reload();
    }
</script>
</body>
</html>
