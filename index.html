<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>EventLens – Smart AI Gallery</title>
  <meta name="referrer" content="no-referrer">
  
  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #050505; --card: #121212; --surface: #1e1e1e;
      --accent: #00e676; --accent-dark: #00b35c; --accent-soft: rgba(0, 230, 118, 0.15);
      --text: #ffffff; --muted: #a1a1aa; --border: #27272a;
      --font-main: 'Plus Jakarta Sans', sans-serif;
      --font-head: 'Outfit', sans-serif;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--font-main); overflow-x: hidden; padding-bottom: 80px; }
    
    /* Branding Header */
    header { position: relative; height: 260px; overflow: hidden; background: #111; border-bottom: 1px solid var(--border); }
    .header-bg { position: absolute; inset: 0; background-size: cover; background-position: center; filter: brightness(0.4); transform: scale(1.05); transition: 0.5s; }
    .header-content { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding: 30px; background: linear-gradient(to top, var(--bg) 10%, transparent); }
    .brand-logo { width: 85px; height: 85px; border-radius: 50%; border: 3px solid var(--accent); object-fit: cover; margin-bottom: 15px; background: #000; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .brand-title { font-family: var(--font-head); font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin: 0; text-align: center; }
    .welcome-msg { font-size: 13px; color: var(--muted); margin-top: 5px; text-align: center; }

    .container { max-width: 1200px; margin: 0 auto; padding: 16px; width: 100%; }
    .screen { display: none; min-height: 60vh; flex-direction: column; align-items: center; justify-content: center; }
    .screen.active { display: flex; }

    /* Selfie Search Box */
    .upload-card { width: 100%; max-width: 400px; background: var(--card); border: 1px solid var(--border); border-radius: 30px; padding: 40px 30px; text-align: center; margin-top: -50px; position: relative; z-index: 10; backdrop-filter: blur(10px); }
    .selfie-trigger { width: 160px; height: 160px; border-radius: 50%; background: var(--surface); border: 2px dashed #444; margin: 25px auto; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; transition: 0.3s; }
    .selfie-trigger:active { transform: scale(0.95); border-color: var(--accent); }
    .selfie-trigger img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
    .scan-line { position: absolute; width: 100%; height: 4px; background: var(--accent); box-shadow: 0 0 15px var(--accent); top: 0; animation: scan 2s infinite linear; display: none; z-index: 5; }
    @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

    /* Counter */
    .counter-box { margin-top: 20px; display: none; font-family: var(--font-head); }
    .counter-val { font-size: 22px; font-weight: 800; color: var(--accent); }

    /* Lead Modal - Professional UI */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 20px; animation: fadeIn 0.3s; }
    .modal-content { background: #1a1a1a; border: 1px solid var(--border); border-radius: 24px; padding: 35px; width: 100%; max-width: 420px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.8); }
    .input-group { margin-bottom: 15px; text-align: left; }
    .input-group label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
    .lead-input { width: 100%; padding: 16px; background: #0a0a0a; border: 1px solid var(--border); color: #fff; border-radius: 12px; font-size: 16px; transition: 0.3s; }
    .lead-input:focus { border-color: var(--accent); background: #000; }
    .btn-unlock { background: var(--accent); color: #000; border: none; padding: 18px; width: 100%; border-radius: 50px; font-weight: 800; font-size: 16px; cursor: pointer; margin-top: 10px; }

    /* Gallery Grid - Responsive & Small Thumbs for Mobile */
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 4px; }
    @media (min-width: 768px) { .grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; padding: 16px; } }
    .ph-card { position: relative; aspect-ratio: 1; background: #111; overflow: hidden; cursor: pointer; border-radius: 4px; }
    .ph-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: 0.3s; }
    .ph-card img.loaded { opacity: 1; }
    .event-tag { position: absolute; bottom: 5px; left: 5px; background: rgba(0,0,0,0.7); color: #fff; padding: 2px 6px; font-size: 8px; border-radius: 4px; font-weight: 600; text-transform: uppercase; }
    .sel-indicator { position: absolute; top: 5px; right: 5px; width: 18px; height: 18px; border-radius: 50%; background: var(--accent); color: #000; display: none; align-items: center; justify-content: center; font-size: 10px; }
    .ph-card.is-selected .sel-indicator { display: flex; }

    /* Results Info */
    .results-header { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 100; }
    .res-count { font-weight: 800; font-size: 15px; font-family: var(--font-head); }

    /* Action Bar */
    .action-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: rgba(20,20,20,0.9); border: 1px solid var(--border); padding: 12px 25px; border-radius: 100px; display: flex; gap: 20px; backdrop-filter: blur(10px); z-index: 500; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .action-bar.show { transform: translateX(-50%) translateY(0); }
    .action-btn { background: none; border: none; color: #fff; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; cursor: pointer; opacity: 0.8; }
    .action-btn i { font-size: 20px; }
    .action-btn.active { color: var(--accent); opacity: 1; }

    /* Lightbox / Slide View */
    .lightbox { position: fixed; inset: 0; background: #000; z-index: 4000; display: none; flex-direction: column; }
    .lb-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
    .lb-content { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
    .lb-img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .lb-footer { padding: 20px 20px 40px; display: flex; justify-content: center; gap: 30px; background: linear-gradient(to top, #000, transparent); }
    .lb-action { display: flex; flex-direction: column; align-items: center; gap: 5px; color: #fff; font-size: 11px; cursor: pointer; }
    .lb-action i { font-size: 26px; }
    .lb-action.active-fav { color: #ff4081; }

    /* Pagination Button */
    .load-more-btn { background: var(--surface); color: #fff; border: 1px solid var(--border); padding: 14px 28px; border-radius: 50px; font-weight: 700; margin: 30px auto; display: none; cursor: pointer; }

    #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); padding: 10px 20px; border-radius: 50px; z-index: 9999; display: none; }
    
    .hidden { display: none !important; }
  </style>
</head>
<body>

<audio id="successSound" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" preload="auto"></audio>
<div id="toast">Message</div>

<!-- BRANDING HEADER -->
<header id="header">
    <div class="header-bg" id="headerBg"></div>
    <div class="header-content">
        <img id="brandLogo" class="brand-logo" onerror="this.style.display='none'">
        <h1 class="brand-title" id="brandTitle">AI Face Search</h1>
        <p class="welcome-msg" id="welcomeMsg">Checking 15,000+ photos instantly...</p>
    </div>
</header>

<div class="container">
    <!-- SEARCH SCREEN -->
    <div id="screenSearch" class="screen active">
        <div class="upload-card">
            <h2 style="font-family: var(--font-head); margin-bottom: 10px;">Find Your Photos</h2>
            <p style="color: var(--muted); font-size: 13px;">AI magic will find you in thousands of photos.</p>
            
            <div class="selfie-trigger" onclick="document.getElementById('fileIn').click()">
                <div class="scan-line" id="scanLine"></div>
                <img id="previewImg" class="hidden">
                <i class="fa-solid fa-camera" id="camIcon" style="font-size: 40px; color: #333;"></i>
                <span id="triggerLabel" style="font-size: 11px; font-weight: 800; color: #555; margin-top: 10px;">OPEN CAMERA</span>
            </div>
            <!-- FIXED: Direct Camera Trigger -->
            <input type="file" id="fileIn" hidden capture="user" accept="image/*" onchange="handleSelfie(this.files[0])">
            
            <div class="counter-box" id="counterBox">
                <div style="font-size: 10px; color: var(--muted); letter-spacing: 1px; margin-bottom: 5px;">SCANNING GALLERY</div>
                <div class="counter-val"><span id="liveCount">0</span> / 15,000</div>
            </div>
            
            <p id="statusText" style="height: 20px; margin-top: 15px; color: var(--accent); font-weight: 700; font-size: 14px;"></p>
        </div>
    </div>

    <!-- GALLERY SCREEN -->
    <div id="screenGallery" class="hidden">
        <div class="results-header">
            <div class="res-count" id="resCountText">Matched 0 Photos</div>
            <div class="row" style="display:flex; gap:10px;">
                <button class="action-btn" onclick="location.reload()" style="opacity:1;"><i class="fa-solid fa-rotate"></i></button>
            </div>
        </div>
        
        <div class="grid" id="photoGrid"></div>
        <button id="btnLoadMore" class="load-more-btn" onclick="fetchNextBatch()">Load More Matched Photos</button>
    </div>
</div>

<!-- ACTION BAR (MULTI-SELECT & TOOLS) -->
<div class="action-bar" id="actionBar">
    <button class="action-btn" id="btnSelectMode" onclick="toggleSelectMode()">
        <i class="fa-solid fa-check-double"></i><span>Select</span>
    </button>
    <button class="action-btn" onclick="downloadSelected()">
        <i class="fa-solid fa-download"></i><span>Download</span>
    </button>
    <button class="action-btn" onclick="shareGallery()">
        <i class="fa-brands fa-whatsapp"></i><span>Share</span>
    </button>
    <button class="action-btn" onclick="showFavorites()">
        <i class="fa-solid fa-heart"></i><span>My Favs</span>
    </button>
</div>

<!-- LEAD MODAL -->
<div class="modal" id="leadModal">
    <div class="modal-content">
        <div style="width: 60px; height: 60px; background: var(--accent-soft); border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center;">
            <i class="fa-solid fa-wand-magic-sparkles" style="color: var(--accent); font-size: 24px;"></i>
        </div>
        <h2 style="font-family: var(--font-head); margin-bottom: 5px;">Bingo! We found you.</h2>
        <p style="color: var(--muted); font-size: 14px; margin-bottom: 25px;">Found <span id="foundTotal" style="color: #fff; font-weight: 800;">0</span> photos of you.</p>
        
        <div class="input-group">
            <label>Aapka Naam</label>
            <input id="gName" class="lead-input" placeholder="e.g. Rahul Sharma">
        </div>
        <div class="input-group">
            <label>Mobile Number</label>
            <input id="gMobile" class="lead-input" type="tel" placeholder="98XXXXXXXX">
        </div>
        
        <button class="btn-unlock" onclick="saveLeadAndShow()">View My Personal Gallery</button>
    </div>
</div>

<!-- LIGHTBOX (Slide View) -->
<div class="lightbox" id="lightbox">
    <div class="lb-header">
        <button onclick="closeLightbox()" style="background:none; border:none; color:#fff; font-size:24px;"><i class="fa-solid fa-xmark"></i></button>
        <span id="lbCounter" style="font-weight:600; color: #888;">1 / 1</span>
        <button onclick="downloadSingle()" style="background:none; border:none; color:var(--accent); font-size:20px;"><i class="fa-solid fa-download"></i></button>
    </div>
    <div class="lb-content">
        <img id="lbImg" class="lb-img">
    </div>
    <div class="lb-footer">
        <div class="lb-action" id="lbBtnFav" onclick="toggleChoice('fav')">
            <i class="fa-solid fa-heart"></i>
            <span>Favorite</span>
        </div>
        <div class="lb-action" id="lbBtnSel" onclick="toggleChoice('selected')">
            <i class="fa-solid fa-album-circle-plus"></i>
            <span>Select for Album</span>
        </div>
    </div>
</div>

<script>
    const API_BASE = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod";
    const cid = new URLSearchParams(window.location.search).get('cid');
    
    let allMatchedIds = [];
    let loadedPhotos = [];
    let selections = {}; // { photo_id: { fav: bool, selected: bool } }
    let multiSelectMode = false;
    let selectedSet = new Set();
    let currentIdx = 0;
    let currentSelfieB64 = "";
    let scanInterval = null;

    /* --- BRANDING --- */
    window.onload = async () => {
        if(!cid) return alert("Invalid Link");
        try {
            const res = await fetch(`${API_BASE}/get-branding?cid=${cid}`);
            const data = await res.json();
            const b = data.branding || data;
            if(b.collection_name || b.name) document.getElementById('brandTitle').innerText = b.collection_name || b.name;
            if(b.welcome_msg) document.getElementById('welcomeMsg').innerText = b.welcome_msg;
            if(b.header_img && b.header_img !== "null") document.getElementById('headerBg').style.backgroundImage = `url('${b.header_img}')`;
            if(b.logo && b.logo !== "null") {
                const logo = document.getElementById('brandLogo');
                logo.src = b.logo; logo.style.display = 'block';
            }
            if(b.color) document.documentElement.style.setProperty('--accent', b.color);
        } catch(e) {}
    };

    /* --- SEARCH ENGINE --- */
    function handleSelfie(file) {
        if(!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            currentSelfieB64 = e.target.result;
            document.getElementById('previewImg').src = e.target.result;
            document.getElementById('previewImg').classList.remove('hidden');
            document.getElementById('camIcon').classList.add('hidden');
            document.getElementById('triggerLabel').classList.add('hidden');
            document.getElementById('scanLine').style.display = 'block';
            document.getElementById('counterBox').style.display = 'block';
            document.getElementById('statusText').innerText = "AI is looking for you...";
            
            startLiveCounter();
            performSearch();
        };
        reader.readAsDataURL(file);
    }

    function startLiveCounter() {
        let c = 0;
        scanInterval = setInterval(() => {
            c += Math.floor(Math.random() * 400) + 150;
            if(c > 14900) c = 14900 + Math.floor(Math.random() * 50);
            document.getElementById('liveCount').innerText = c.toLocaleString();
        }, 150);
    }

    async function performSearch() {
        try {
            const res = await fetch(`${API_BASE}/search`, {
                method: 'POST',
                body: JSON.stringify({ collection_id: cid, image: currentSelfieB64.split(',')[1] })
            });
            const data = await res.json();
            clearInterval(scanInterval);
            
            if(res.ok) {
                allMatchedIds = data.all_matched_ids || [];
                loadedPhotos = data.matches || [];
                
                // Sound Effect
                document.getElementById('successSound').play().catch(e => {});
                
                // Confetti & Lead Modal
                document.getElementById('foundTotal').innerText = allMatchedIds.length > 100 ? "100+" : allMatchedIds.length;
                document.getElementById('leadModal').style.display = 'flex';
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            } else {
                alert("Koi photo nahi mili. Please dobara try karein.");
                location.reload();
            }
        } catch(e) { alert("Timeout error! Bahut saari photos hain, kripya refresh karein."); }
    }

    /* --- LEAD & GALLERY DISPLAY --- */
    function saveLeadAndShow() {
        const name = document.getElementById('gName').value;
        const mobile = document.getElementById('gMobile').value;
        if(!name || !mobile) return alert("Please fill name & mobile");

        // Background Save
        fetch(`${API_BASE}/save-details`, {
            method: 'POST',
            body: JSON.stringify({ collection_id: cid, guest_name: name, guest_mobile: mobile, photo_count: allMatchedIds.length, selfie_image: currentSelfieB64.split(',')[1] })
        });

        document.getElementById('leadModal').style.display = 'none';
        document.getElementById('screenSearch').classList.remove('active');
        document.getElementById('screenGallery').classList.add('active');
        document.getElementById('actionBar').classList.add('show');
        
        let countDisplay = allMatchedIds.length > 100 ? "100+ Photos Found" : `${allMatchedIds.length} Photos Found`;
        document.getElementById('resCountText').innerText = countDisplay;
        
        renderGrid();
        checkPagination();
    }

    function renderGrid() {
        const grid = document.getElementById('photoGrid');
        const displayList = loadedPhotos.slice(0, 50); // Pagination 50 per page local logic
        
        grid.innerHTML = displayList.map((p, i) => `
            <div class="ph-card ${selectedSet.has(p.photo_id) ? 'is-selected' : ''}" onclick="handlePhotoClick(${i})">
                <img src="${p.thumbnail_url || p.url}" onload="this.classList.add('loaded')">
                <div class="sel-indicator"><i class="fa-solid fa-check"></i></div>
                ${p.event_name ? `<div class="event-tag">${p.event_name}</div>` : ''}
            </div>
        `).join('');
    }

    function checkPagination() {
        const btn = document.getElementById('btnLoadMore');
        if(loadedPhotos.length < allMatchedIds.length) {
            btn.style.display = 'block';
            btn.innerText = `Load More Matched Photos (${allMatchedIds.length - loadedPhotos.length} remaining)`;
        } else {
            btn.style.display = 'none';
        }
    }

    async function fetchNextBatch() {
        const btn = document.getElementById('btnLoadMore');
        btn.disabled = true;
        btn.innerText = "Finding more photos...";

        const nextIds = allMatchedIds.slice(loadedPhotos.length, loadedPhotos.length + 100);
        
        try {
            const res = await fetch(`${API_BASE}/get-more-matches`, {
                method: 'POST',
                body: JSON.stringify({ ids: nextIds })
            });
            const data = await res.json();
            loadedPhotos = [...loadedPhotos, ...data.matches];
            renderGrid();
            checkPagination();
        } catch(e) { showToast("Batch load failed"); }
        btn.disabled = false;
    }

    /* --- INTERACTIONS --- */
    function handlePhotoClick(i) {
        if(multiSelectMode) {
            const id = loadedPhotos[i].photo_id;
            if(selectedSet.has(id)) selectedSet.delete(id);
            else selectedSet.add(id);
            renderGrid();
        } else {
            openLightbox(i);
        }
    }

    function toggleSelectMode() {
        multiSelectMode = !multiSelectMode;
        document.getElementById('btnSelectMode').classList.toggle('active');
        if(!multiSelectMode) selectedSet.clear();
        renderGrid();
    }

    /* --- LIGHTBOX --- */
    function openLightbox(i) {
        currentIdx = i;
        const p = loadedPhotos[i];
        document.getElementById('lbImg').src = p.url;
        document.getElementById('lbCounter').innerText = `${i+1} / ${loadedPhotos.length}`;
        
        // Sync UI
        const s = selections[p.photo_id] || { fav: false, selected: false };
        document.getElementById('lbBtnFav').className = s.fav ? 'lb-action active-fav' : 'lb-action';
        document.getElementById('lbBtnSel').className = s.selected ? 'lb-action active-sel' : 'lb-action';
        
        document.getElementById('lightbox').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
        document.getElementById('lightbox').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    function toggleChoice(type) {
        const p = loadedPhotos[currentIdx];
        if(!selections[p.photo_id]) selections[p.photo_id] = { fav: false, selected: false };
        
        selections[p.photo_id][type] = !selections[p.photo_id][type];
        
        // Sync with UI
        openLightbox(currentIdx); 
        
        // Sync with Backend (Guest Selection Tracking)
        fetch(`${API_BASE}/client-api`, {
            method: 'POST',
            body: JSON.stringify({ 
                action: "update_selection", 
                payload: { collection_id: cid, photo_id: p.photo_id, status: selections[p.photo_id] } 
            })
        });
    }

    /* --- TOOLS --- */
    function downloadSingle() {
        saveAs(loadedPhotos[currentIdx].url, `Photo_${loadedPhotos[currentIdx].photo_id}.jpg`);
    }

    async function downloadSelected() {
        const list = multiSelectMode ? Array.from(selectedSet) : [loadedPhotos[currentIdx]?.photo_id];
        if(!list.length || !list[0]) return showToast("Pehle photos select karein");
        
        showToast("Zipping photos...");
        const zip = new JSZip();
        const photosToZip = loadedPhotos.filter(p => list.includes(p.photo_id));
        
        for(let p of photosToZip) {
            const res = await fetch(p.url);
            const blob = await res.blob();
            zip.file(`Photo_${p.photo_id}.jpg`, blob);
        }
        
        zip.generateAsync({type:"blob"}).then(c => {
            saveAs(c, "EventLens_Selected.zip");
            showToast("Complete!");
        });
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    function shareGallery() {
        const url = encodeURIComponent(window.location.href);
        window.open(`https://wa.me/?text=Check out my photos from the event: ${url}`);
    }
</script>
</body>
</html>
