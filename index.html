<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EventLens – Smart AI Gallery</title>

  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #050505;
      --card: #101010;
      --accent: #00e676; /* Green Accent */
      --accent-soft: rgba(0, 230, 118, 0.15);
      --text: #ffffff;
      --muted: #a0a0a0;
      --border: #262626;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #050505;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* --- Header --- */
    header {
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      background: rgba(16, 16, 16, 0.8);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; color: var(--text); }
    .logo span { color: var(--accent); }

    /* --- Main Container --- */
    main {
      flex: 1;
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* --- Cards --- */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5);
      transition: 0.3s ease;
    }
    
    h1 { font-size: 28px; margin-bottom: 12px; line-height: 1.2; }
    p { color: var(--muted); margin-bottom: 32px; font-size: 15px; line-height: 1.5; }

    /* --- Selfie Preview --- */
    .preview-box {
      width: 160px;
      height: 160px;
      background: #000;
      border-radius: 50%;
      margin: 0 auto 32px;
      border: 2px dashed var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .preview-box img { width: 100%; height: 100%; object-fit: cover; }
    .preview-box i { font-size: 48px; color: var(--border); }

    /* --- Buttons --- */
    .btn {
      width: 100%;
      padding: 16px;
      border-radius: 100px;
      border: none;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { background: #00c853; transform: scale(1.02); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { border-color: var(--text); background: rgba(255,255,255,0.05); }

    /* --- Inputs --- */
    input {
      width: 100%;
      padding: 16px;
      background: #000;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      margin-bottom: 12px;
      outline: none;
      transition: 0.2s;
    }
    input:focus { border-color: var(--accent); }

    /* --- Gallery Grid --- */
    .gallery-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }
    .photo-item {
      aspect-ratio: 1;
      background: #222;
      overflow: hidden;
      cursor: pointer;
      position: relative;
    }
    .photo-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
    .photo-item.selected img { opacity: 0.5; transform: scale(0.95); }
    .photo-item.selected::after {
      content: '✓';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: var(--accent);
      color: #000;
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: bold;
    }

    /* --- Lightbox --- */
    .viewer {
      position: fixed; inset: 0; background: #000; z-index: 200;
      display: none; flex-direction: column;
    }
    .viewer.open { display: flex; }
    .viewer-img { flex: 1; width: 100%; object-fit: contain; }
    .viewer-controls { padding: 20px; display: flex; justify-content: space-between; background: rgba(0,0,0,0.5); }
    .v-btn { background: transparent; border: none; color: #fff; font-size: 24px; cursor: pointer; padding: 10px; }

    /* --- Utils --- */
    .hidden { display: none !important; }
    .loader { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <header>
    <div class="logo">Event<span>Lens</span></div>
  </header>

  <main>
    <!-- 1. INTRO / SELFIE -->
    <div id="stepSelfie" class="card">
      <h1>Find Your Photos</h1>
      <p>Upload a clear selfie to instantly find all your photos from the event.</p>
      
      <div class="preview-box" id="previewBox">
        <i class="fa-solid fa-camera"></i>
      </div>

      <div id="actionBtns">
        <button class="btn btn-primary" onclick="$('#cam').click()">
          <i class="fa-solid fa-camera"></i> Take Selfie
        </button>
        <button class="btn btn-outline" onclick="$('#file').click()">
          <i class="fa-solid fa-image"></i> Upload from Gallery
        </button>
      </div>

      <div id="searchBtnWrapper" class="hidden">
        <button class="btn btn-primary" onclick="doSearch()">
          Search Photos <i class="fa-solid fa-magnifying-glass"></i>
        </button>
        <button class="btn btn-outline" onclick="resetSelfie()">Retake</button>
      </div>

      <!-- Hidden Inputs -->
      <input type="file" id="cam" accept="image/*" capture="user" hidden onchange="handleInput(this)">
      <input type="file" id="file" accept="image/*" hidden onchange="handleInput(this)">
    </div>

    <!-- 2. LOADING -->
    <div id="stepLoading" class="card hidden">
      <div class="loader"></div>
      <h2>Scanning Gallery...</h2>
      <p>Matching your face with thousands of photos.</p>
    </div>

    <!-- 3. DETAILS FORM -->
    <div id="stepForm" class="card hidden">
      <div style="font-size: 40px; margin-bottom: 10px;">🎉</div>
      <h2><span id="matchCount" style="color:var(--accent)">0</span> Photos Found</h2>
      <p>Enter your details to unlock and download them.</p>
      
      <input id="userName" placeholder="Your Name">
      <input id="userPhone" type="tel" placeholder="Mobile Number">
      
      <button class="btn btn-primary" onclick="submitDetails()">
        Unlock Photos <i class="fa-solid fa-unlock"></i>
      </button>
    </div>

    <!-- 4. GALLERY -->
    <div id="stepGallery" class="hidden">
      <div class="gallery-header">
        <div>
          <h3 style="color:#fff; margin:0;">My Photos</h3>
          <span style="color:var(--muted); font-size:12px;">Tap to select</span>
        </div>
        <div style="display:flex; gap:10px;">
          <button class="btn-outline" style="padding:8px 16px; width:auto; border-radius:50px; font-size:12px;" onclick="selectAll()">Select All</button>
          <button class="btn-primary" style="padding:8px 16px; width:auto; border-radius:50px; font-size:12px;" onclick="downloadZip()">Download ZIP</button>
        </div>
      </div>
      
      <div class="grid" id="grid"></div>
      
      <div style="text-align:center; margin-top:40px;">
        <p style="margin-bottom:10px;">Missed some photos?</p>
        <button class="btn btn-outline" onclick="location.reload()">Try Another Selfie</button>
      </div>
    </div>
  </main>

  <!-- LIGHTBOX -->
  <div id="viewer" class="viewer">
    <div style="padding:20px; display:flex; justify-content:flex-end;">
      <button class="v-btn" onclick="closeViewer()">&times;</button>
    </div>
    <img id="viewerImage" class="viewer-img">
    <div class="viewer-controls">
      <button class="v-btn" onclick="prevImage()"><i class="fa-solid fa-chevron-left"></i></button>
      <button class="v-btn" style="color:var(--accent)" onclick="downloadCurrent()"><i class="fa-solid fa-download"></i></button>
      <button class="v-btn" onclick="nextImage()"><i class="fa-solid fa-chevron-right"></i></button>
    </div>
  </div>

<script>
  /* ================= CONFIG ================= */
  const API_BASE = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod";
  const params = new URLSearchParams(location.search);
  const cid = params.get('cid') || params.get('collectionId');
  const linkId = params.get('linkId'); // Backup parameter

  /* ================= STATE ================= */
  let selfieBase64 = null;
  let filteredPhotos = [];
  let selectedUrls = new Set();
  let currentViewerIndex = 0;

  /* ================= UTILS ================= */
  const $ = (s) => document.querySelector(s);
  const show = (id) => {
    ['stepSelfie','stepLoading','stepForm','stepGallery'].forEach(i => $(`#${i}`).classList.add('hidden'));
    $(`#${id}`).classList.remove('hidden');
  };

  /* ================= INIT CHECK ================= */
  window.onload = () => {
    if(!cid && !linkId) {
      document.body.innerHTML = "<h2 style='color:#fff;text-align:center;margin-top:50px;'>Invalid Link: Missing ID</h2>";
    }
  };

  /* ================= HANDLERS ================= */
  window.handleInput = (input) => {
    const file = input.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      $('#previewBox').innerHTML = `<img src="${e.target.result}">`;
      selfieBase64 = e.target.result.split(',')[1];
      $('#actionBtns').classList.add('hidden');
      $('#searchBtnWrapper').classList.remove('hidden');
    };
    reader.readAsDataURL(file);
  };

  window.resetSelfie = () => {
    selfieBase64 = null;
    $('#previewBox').innerHTML = `<i class="fa-solid fa-camera"></i>`;
    $('#actionBtns').classList.remove('hidden');
    $('#searchBtnWrapper').classList.add('hidden');
  };

  window.doSearch = async () => {
    if(!selfieBase64) return alert("Selfie required!");
    show('stepLoading');

    try {
      // --- PAYLOAD FIX: Sending ONLY what backend needs ---
      // We send 'selfie_image' as key. 
      // We prioritize 'linkId' if available. 
      // If only 'cid' is available, we send it as 'collection_id'.
      // BUT, to satisfy "Missing linkId" error, we might need to send a dummy linkId or the cid as linkId if linkId is null.
      
      const payload = {
        selfie_image: selfieBase64,
        collection_id: cid || linkId, // Always needed for logic
      };

      // Only add link_id if it exists, otherwise backend might be okay with just collection_id 
      // IF the code has changed. BUT previous error said "Missing linkId".
      // So we will force send link_id = cid if linkId is missing.
      payload.link_id = linkId || cid; 
      payload.linkId = linkId || cid; // Fallback for case sensitivity

      const res = await fetch(`${API_BASE}/search`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const data = await res.json();
      if(!res.ok) throw new Error(data.message || data.error || "Search failed");

      filteredPhotos = data.urls || data.matches || [];
      
      if(filteredPhotos.length === 0) {
        alert("No matches found. Try a clearer photo.");
        show('stepSelfie');
        window.resetSelfie();
        return;
      }

      $('#matchCount').innerText = filteredPhotos.length;
      show('stepForm');
      confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });

    } catch(e) {
      alert("Error: " + e.message);
      show('stepSelfie');
      window.resetSelfie();
    }
  };

  window.submitDetails = async () => {
    const name = $('#userName').value.trim();
    const phone = $('#userPhone').value.trim();
    if(!name || !phone) return alert("Please fill details");

    // --- SAVE DETAILS FIX ---
    // Only send link_id if it is a REAL linkId (not just cid spoofed).
    // If we only have cid, we should probably send link_id as null or undefined to avoid "None" or "Same ID" confusion in DB.
    // However, if backend requires it, we must send it.
    // Let's try sending it only if `linkId` variable is present.
    
    const payload = {
      collection_id: cid || linkId,
      name: name,
      mobile: phone,
      match_count: filteredPhotos.length,
      photo_count: filteredPhotos.length, // Send duplicate for safety
      selfie_image: selfieBase64 // Important for saving selfie to S3
    };
    
    // Explicitly handle link_id. Use cid if linkId is missing but required
    payload.link_id = linkId || cid; 

    fetch(`${API_BASE}/save-details`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    renderGrid();
    show('stepGallery');
  };

  function renderGrid() {
    const grid = $('#grid');
    grid.innerHTML = filteredPhotos.map((p, idx) => {
      const url = typeof p === 'string' ? p : (p.url || p.s3_url);
      const isSel = selectedUrls.has(url) ? 'selected' : '';
      // Store clean URL in object for viewer
      if(typeof p !== 'string') p.url = url; else filteredPhotos[idx] = {url:url};
      
      return `
        <div class="photo-item ${isSel}" onclick="toggleSelect('${url}')">
          <img src="${url}" loading="lazy">
          <div style="position:absolute; bottom:5px; right:5px;">
             <button class="btn-primary" style="padding:4px 8px; font-size:10px; border-radius:20px;" onclick="event.stopPropagation(); openViewer(${idx})">View</button>
          </div>
        </div>
      `;
    }).join('');
  }

  function toggleSelect(url) {
    selectedUrls.has(url) ? selectedUrls.delete(url) : selectedUrls.add(url);
    renderGrid();
  }

  window.selectAll = () => {
    if(selectedUrls.size === filteredPhotos.length) selectedUrls.clear();
    else filteredPhotos.forEach(p => selectedUrls.add(p.url));
    renderGrid();
  };

  window.downloadZip = async function() {
    if(selectedUrls.size === 0) return alert("Select photos first!");
    const zip = new JSZip();
    const urls = Array.from(selectedUrls);
    
    // CORS Workaround Attempt: fetching with 'no-cors' wont give data. 
    // We rely on standard fetch. If S3 blocks it, this will fail.
    // Ensure S3 bucket CORS allows GET from *
    
    for(let i=0; i<urls.length; i++) {
      try {
          const blob = await fetch(urls[i]).then(r => r.blob());
          zip.file(`photo_${i+1}.jpg`, blob);
      } catch(e) {
          console.error("DL Error", e);
      }
    }
    const content = await zip.generateAsync({type:"blob"});
    saveAs(content, "Photos.zip");
  };

  function openViewer(index) {
    currentViewerIndex = index;
    document.getElementById('viewerImage').src = filteredPhotos[index].url;
    document.getElementById('viewer').classList.add('open');
  }
  window.closeViewer = () => document.getElementById('viewer').classList.remove('open');
  window.nextImage = () => { currentViewerIndex = (currentViewerIndex + 1) % filteredPhotos.length; openViewer(currentViewerIndex); };
  window.prevImage = () => { currentViewerIndex = (currentViewerIndex - 1 + filteredPhotos.length) % filteredPhotos.length; openViewer(currentViewerIndex); };
  
  window.downloadCurrent = () => {
      const url = filteredPhotos[currentViewerIndex].url;
      const a = document.createElement('a');
      a.href = url;
      a.download = `photo_${currentViewerIndex}.jpg`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
  };

</script>
</body>
</html>
