<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find My Photos - EventLens</title>
  
  <!-- Libs -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">

  <style>
    /* ===== CSS SAME AS YOUR FILE – NOT TOUCHED ===== */
    :root {
      --bg: #000000;
      --card-bg: #111111;
      --primary: #00e676; 
      --text: #ffffff;
      --text-muted: #888888;
      --border: #333333;
      --radius: 16px;
    }
    * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    .header { position: relative; height: 200px; overflow: hidden; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 40px; background: #222; }
    .header::after { content:''; position: absolute; inset: 0; background: linear-gradient(to top, var(--bg), transparent); }
    .header-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
    .logo-area { position: relative; z-index: 10; text-align: center; margin-top: -40px; }
    .logo-img { width: 80px; height: 80px; border-radius: 50%; border: 4px solid var(--card-bg); background: #000; object-fit: cover; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .brand-title { font-size: 24px; font-weight: 800; margin-top: 10px; }
    .brand-tagline { font-size: 14px; color: var(--text-muted); }
    .container { width: 100%; max-width: 600px; margin: 0 auto; padding: 20px; flex: 1; }
    .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 30px; text-align: center; }
    .btn { background: var(--primary); color: #000; border: none; padding: 16px; border-radius: 50px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; }
    .btn.outline { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
    input { width: 100%; padding: 16px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 12px; margin-bottom: 12px; font-size: 16px; }
    .hidden { display: none !important; }
  </style>
</head>

<body>

<div class="container">

  <div id="viewInit" class="card">
    <h2>Welcome Guest</h2>
    <p>Verify to continue</p>
    <input type="password" id="pinInput" class="hidden" placeholder="PIN">
    <button class="btn" onclick="startFlow()">Find My Photos</button>
  </div>

  <div id="viewSelfie" class="card hidden">
    <h2>Upload Selfie</h2>
    <input type="file" accept="image/*" onchange="handleSelfie(this)">
    <button id="btnSearch" class="btn hidden" onclick="doSearch()">Search</button>
  </div>

  <div id="viewScan" class="card hidden">
    <p>Scanning…</p>
  </div>

  <div id="viewForm" class="card hidden">
    <h2><span id="matchCount">0</span> Photos Found</h2>
    <input id="userName" placeholder="Name">
    <input id="userPhone" placeholder="Mobile">
    <button class="btn" onclick="submitDetails()">View Gallery</button>
  </div>

  <div id="viewGallery" class="hidden">
    <p id="galSubtext"></p>
    <div id="photoGrid"></div>
  </div>

</div>

<script>
/* ================= CONFIG ================= */
const API_BASE = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod";
const params = new URLSearchParams(location.search);
const linkId = params.get('linkId');
const cid = params.get('cid');

/* ================= STATE ================= */
let selfieBase64 = null;
let foundPhotos = [];

/* ================= UTILS ================= */
const $ = s => document.querySelector(s);
const show = id => {
  document.querySelectorAll('.card,#viewGallery').forEach(e=>e.classList.add('hidden'));
  $(id).classList.remove('hidden');
};

/* ================= INIT ================= */
window.onload = () => {
  if(!linkId){
    document.body.innerHTML = "<h2 style='color:red'>Invalid Guest Link</h2>";
  }
};

function startFlow(){ show('#viewSelfie'); }

/* ================= SELFIE ================= */
function handleSelfie(input){
  const file = input.files[0];
  if(!file) return;
  const r = new FileReader();
  r.onload = e => {
    selfieBase64 = e.target.result; // ✅ FULL DATA URI
    $('#btnSearch').classList.remove('hidden');
  };
  r.readAsDataURL(file);
}

/* ================= SEARCH ================= */
async function doSearch(){
  show('#viewScan');

  const payload = {
    selfie_image: selfieBase64,
    linkId: linkId
  };

  const pin = $('#pinInput')?.value;
  if(pin) payload.pin = pin;

  const res = await fetch(`${API_BASE}/search`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(payload)
  });

  const data = await res.json();
  foundPhotos = data.matches || []; // ✅ FIX

  $('#matchCount').innerText = foundPhotos.length;
  show('#viewForm');
}

/* ================= SAVE DETAILS ================= */
function submitDetails(){
  fetch(`${API_BASE}/save-details`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      name:$('#userName').value,
      mobile:$('#userPhone').value,
      linkId,
      collection_id: cid,
      photo_count: foundPhotos.length
    })
  });
  renderGallery();
}

/* ================= GALLERY ================= */
function renderGallery(){
  show('#viewGallery');
  $('#galSubtext').innerText = `${foundPhotos.length} photos`;
  $('#photoGrid').innerHTML = foundPhotos.map(p=>`<img src="${p.url}" style="width:100%">`).join('');
}
</script>

</body>
</html>
