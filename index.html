<script>
    /* --- CONFIG --- */
    const API_BASE = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod";
    const urlParams = new URLSearchParams(window.location.search);
    const linkId = urlParams.get('linkId');
    const cid = urlParams.get('cid'); 

    /* --- STATE --- */
    let allMatches = []; 
    let selectedIndices = new Set();
    let pendingSelfieBase64 = null;
    let isSelectMode = false;
    let currentViewUrl = null;

    /* --- INIT --- */
    window.onload = async () => {
        let brandingApiUrl = "";
        if (linkId) brandingApiUrl = `${API_BASE}/get-branding?linkId=${linkId}`;
        else if (cid) brandingApiUrl = `${API_BASE}/get-branding?cid=${cid}`;
        
        if (brandingApiUrl) {
            try {
                const res = await fetch(brandingApiUrl);
                if(res.ok) applyBranding(await res.json());
            } catch(e) { console.error("Branding fetch failed", e); }
        }
    };

    /* --- BRANDING --- */
    function applyBranding(data) {
        if(data.collection_name) {
            document.getElementById('pageTitle').innerText = data.collection_name;
            document.title = `${data.collection_name} – Gallery`;
        }
        if(data.welcome_msg) {
            const el = document.getElementById('welcomeText');
            el.innerText = data.welcome_msg;
            el.style.display = 'block';
        }
        if(data.color) {
            document.documentElement.style.setProperty('--accent', data.color);
            document.documentElement.style.setProperty('--accent-soft', data.color + '26');
            document.getElementById('pageLogo').style.borderColor = data.color;
        }
        if(data.overlay_opacity) document.documentElement.style.setProperty('--overlay-op', data.overlay_opacity);
        
        // Safe Image Loading
        if(data.header_img) {
            const img = new Image();
            img.onload = () => document.getElementById('pageHeader').style.backgroundImage = `url('${data.header_img}')`;
            img.src = data.header_img; 
        }
        if(data.logo) {
            const logo = document.getElementById('pageLogo');
            logo.src = data.logo;
            logo.style.display = 'block';
        }
        if(data.footer) document.getElementById('pageFooter').innerText = data.footer;
        
        const style = document.createElement('style');
        style.innerHTML = `
            :root { --logo-size: ${data.logo_size_mob || '80'}px; --banner-height: ${data.banner_h_mob || '220'}px; }
            @media (min-width: 768px) { :root { --logo-size: ${data.logo_size_desk || '120'}px; --banner-height: ${data.banner_h_desk || '350'}px; } }
        `;
        document.head.appendChild(style);
    }

    /* --- STEP 1: SELFIE & SEARCH --- */
    function resizeImage(file, maxWidth = 800) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onerror = () => reject("Image load error. Maybe file format not supported.");
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    // Keep aspect ratio
                    if (w > maxWidth) { 
                        h = Math.round(h * (maxWidth / w)); 
                        w = maxWidth; 
                    }
                    canvas.width = w; 
                    canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    // Use somewhat high quality
                    resolve(canvas.toDataURL('image/jpeg', 0.85));
                };
            };
            reader.onerror = error => reject(error);
        });
    }

    async function handleSelfieSelect(file) {
        if(!file) return;
        
        // Basic Validation
        if (!linkId && !cid) {
            alert("Configuration Error: Missing linkId in URL.");
            return;
        }

        const loader = document.getElementById('loader');
        const loaderText = document.getElementById('loaderText');
        loader.classList.remove('hidden');
        loaderText.innerText = "Scanning your face...";
        
        try {
            // 1. Resize
            pendingSelfieBase64 = await resizeImage(file, 800);
            
            // Show small preview
            document.getElementById('selfiePreviewImg').src = pendingSelfieBase64;
            document.getElementById('selfiePreviewContainer').classList.remove('hidden');

            // 2. Search API
            loaderText.innerText = "Searching gallery...";
            
            // FIX: Robust Base64 Extraction
            let base64Data = "";
            if (pendingSelfieBase64.includes(",")) {
                base64Data = pendingSelfieBase64.split(',')[1];
            } else {
                base64Data = pendingSelfieBase64;
            }

            if (!base64Data) {
                throw new Error("Failed to process image data.");
            }
            
            // SEND EVERYTHING: Sending multiple keys to ensure backend finds what it needs
            const payload = {
                linkId: linkId || cid,
                collection_id: cid, 
                // Try all common naming conventions to prevent NoneType error
                selfie_image: base64Data,
                image: base64Data,
                file: base64Data,
                face_image: base64Data
            };
            
            const res = await fetch(`${API_BASE}/search`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            
            if (!res.ok) throw new Error("Server error");
            const data = await res.json();
            
            loader.classList.add('hidden');

            // FIX: Fallback to all_matched_ids if matches is empty
            // The backend returns { matches: [], all_matched_ids: [...], total: 534 }
            let foundMatches = [];
            if (data.matches && data.matches.length > 0) {
                foundMatches = data.matches;
            } else if (data.all_matched_ids && data.all_matched_ids.length > 0) {
                console.warn("Using all_matched_ids as fallback. Images might need URL construction.");
                foundMatches = data.all_matched_ids;
            }

            // Check if matches exist
            if(foundMatches.length > 0) {
                // Success: Show Intermediate Modal
                allMatches = foundMatches; 
                document.getElementById('leadMatchCount').innerText = allMatches.length;
                document.getElementById('leadModal').classList.add('open');
                
                // Blast confetti
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            } else {
                document.getElementById('noResultsMsg').classList.remove('hidden');
                // Allow them to proceed to empty gallery if they want, or just alert
                alert("No matching photos found. Try a selfie with better lighting.");
            }
        } catch(e) {
            console.error("Search Error:", e);
            alert("Search failed. Please checking your internet connection and try again.");
            loader.classList.add('hidden');
        }
    }

    /* --- STEP 2: LEAD CAPTURE & GALLERY --- */
    async function unlockGallery() {
        const name = document.getElementById('guestName').value;
        const mobile = document.getElementById('guestMobile').value;
        
        if(!name || !mobile) {
            alert("Please enter your Name and Mobile Number to verify.");
            return;
        }

        // Close Modal & Show Gallery
        document.getElementById('leadModal').classList.remove('open');
        document.getElementById('searchContainer').classList.add('hidden'); 
        document.getElementById('galleryContainer').classList.remove('hidden');
        
        // Render
        renderGallery(allMatches);
        
        // Async: Save Lead
        // Fire and forget
        try {
            // FIX: Ensure raw base64 is sent here too
            let base64Data = null;
            if (pendingSelfieBase64) {
                 base64Data = pendingSelfieBase64.includes(",") ? pendingSelfieBase64.split(',')[1] : pendingSelfieBase64;
            }

            fetch(`${API_BASE}/save-details`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    linkId: linkId, 
                    collection_id: cid, 
                    mobile: mobile, 
                    name: name, 
                    selfie_image: base64Data, 
                    image: base64Data, // Add here too for safety
                    photo_count: allMatches.length 
                })
            });
        } catch(e) { console.error("Lead save error", e); }
    }

    /* --- STEP 3: GALLERY & ACTIONS --- */
    function renderGallery(photos) {
        document.getElementById('matchCount').innerText = photos.length;
        const grid = document.getElementById('galleryGrid');
        
        if (photos.length === 0) {
            document.getElementById('noResultsMsg').classList.remove('hidden');
            return;
        }

        grid.innerHTML = photos.map((p, i) => {
            // FIX: SMART URL FINDER
            // Backend might send keys like 'url', 'image_url', 'link', 'src', etc.
            let imgUrl = "";
            
            if (typeof p === 'string') {
                imgUrl = p;
            } else if (typeof p === 'object' && p !== null) {
                // Try to find the URL in common property names
                imgUrl = p.url || p.image || p.link || p.src || p.image_url || p.file || p.s3_url || p.signed_url;
                
                // If still not found, try to find ANY string value that looks like a URL
                if (!imgUrl) {
                    const values = Object.values(p);
                    const found = values.find(v => typeof v === 'string' && (v.startsWith('http') || v.startsWith('https') || v.startsWith('data:')));
                    if (found) imgUrl = found;
                }
            }

            // If we absolutely cannot find a URL, show a placeholder error
            // This prevents "invisible" items in the grid
            if (!imgUrl) {
                console.warn("Could not extract URL for item:", p);
                // Try to show the ID itself if no URL found, maybe user can debug
                return `
                <div class="photo-item" style="background:#222; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#666; font-size:10px; padding:5px; overflow:hidden;">
                    <i class="fa-solid fa-image" style="font-size:20px; margin-bottom:5px;"></i>
                    <span>Image ${i+1}</span>
                </div>`;
            }

            return `
            <div class="photo-item" id="pitem-${i}" onclick="handleItemClick(${i})">
                <img src="${imgUrl}" referrerpolicy="no-referrer" loading="lazy" alt="Photo ${i+1}">
                <div class="select-ring"></div>
            </div>
            `;
        }).join('');
    }

    function toggleSelectionMode() {
        isSelectMode = !isSelectMode;
        document.body.classList.toggle('select-mode', isSelectMode);
        
        const btn = document.getElementById('btnToggleSelect');
        if(isSelectMode) {
            btn.classList.add('active');
            btn.innerHTML = `<i class="fa-solid fa-times"></i> Cancel`;
        } else {
            btn.classList.remove('active');
            btn.innerHTML = `<i class="fa-solid fa-check-double"></i> Select`;
            selectedIndices.clear();
            updateActionBar();
            document.querySelectorAll('.photo-item.selected').forEach(el => el.classList.remove('selected'));
        }
    }

    function handleItemClick(index) {
        if(isSelectMode) {
            const el = document.getElementById(`pitem-${index}`);
            if(selectedIndices.has(index)) {
                selectedIndices.delete(index);
                el.classList.remove('selected');
            } else {
                selectedIndices.add(index);
                el.classList.add('selected');
            }
            updateActionBar();
        } else {
            // Helper to get URL regardless of format
            // RE-USE THE SMART LOGIC for the viewer click
            const p = allMatches[index];
            let url = "";
             if (typeof p === 'string') {
                url = p;
            } else if (typeof p === 'object' && p !== null) {
                url = p.url || p.image || p.link || p.src || p.image_url || p.file || p.s3_url || p.signed_url;
                 if (!url) {
                    const values = Object.values(p);
                    const found = values.find(v => typeof v === 'string' && (v.startsWith('http') || v.startsWith('https')));
                    if (found) url = found;
                }
            }
            
            if(url) {
                currentViewUrl = url;
                document.getElementById('viewerImg').src = currentViewUrl;
                document.getElementById('viewer').classList.add('open');
            }
        }
    }

    function updateActionBar() {
        const bar = document.getElementById('actionBar');
        document.getElementById('selCount').innerText = selectedIndices.size;
        
        if(selectedIndices.size > 0) bar.classList.add('visible');
        else bar.classList.remove('visible');
    }

    function selectAllMatches() {
        allMatches.forEach((_, i) => {
            selectedIndices.add(i);
            const el = document.getElementById(`pitem-${i}`);
            if(el) el.classList.add('selected');
        });
        updateActionBar();
    }

    /* --- DOWNLOAD & SHARE LOGIC --- */
    async function downloadSelectedItems() {
        if(selectedIndices.size === 0) return;
        const indices = Array.from(selectedIndices);
        
        // Notify user download started
        const btn = document.querySelector('.act-btn .fa-download').parentElement;
        const originalText = btn.innerHTML;
        btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Saving...`;

        for(let i of indices) {
            const p = allMatches[i];
            
            // SMART URL FINDER AGAIN for download
            let url = "";
            if (typeof p === 'string') url = p;
            else if (typeof p === 'object' && p !== null) {
                url = p.url || p.image || p.link || p.src || p.image_url || p.file || p.s3_url || p.signed_url;
                 if (!url) {
                    const values = Object.values(p);
                    const found = values.find(v => typeof v === 'string' && (v.startsWith('http') || v.startsWith('https')));
                    if (found) url = found;
                }
            }

            if(url) {
                // Use fetch to get blob to bypass some CORS issues on direct saveAs
                try {
                    const resp = await fetch(url);
                    const blob = await resp.blob();
                    saveAs(blob, `photo_${i+1}.jpg`);
                } catch(e) {
                    // Fallback
                    saveAs(url, `photo_${i+1}.jpg`);
                }
            }
            await new Promise(r => setTimeout(r, 500)); 
        }
        btn.innerHTML = originalText;
    }

    async function downloadAsZip() {
        if(selectedIndices.size === 0) return;
        const zip = new JSZip();
        const folder = zip.folder("EventLens_Photos");
        const btn = document.querySelector('.act-btn .fa-file-zipper').parentElement;
        const originalText = btn.innerHTML;
        btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Zipping...`;

        const indices = Array.from(selectedIndices);
        
        await Promise.all(indices.map(async (idx) => {
            try {
                const p = allMatches[idx];
                
                // SMART URL FINDER AGAIN for zip
                let url = "";
                if (typeof p === 'string') url = p;
                else if (typeof p === 'object' && p !== null) {
                    url = p.url || p.image || p.link || p.src || p.image_url || p.file || p.s3_url || p.signed_url;
                     if (!url) {
                        const values = Object.values(p);
                        const found = values.find(v => typeof v === 'string' && (v.startsWith('http') || v.startsWith('https')));
                        if (found) url = found;
                    }
                }

                if(url) {
                    const blob = await fetch(url).then(r => r.blob());
                    folder.file(`photo_${idx+1}.jpg`, blob);
                }
            } catch(e) { console.error(e); }
        }));

        const content = await zip.generateAsync({type:"blob"});
        saveAs(content, "My_Photos.zip");
        btn.innerHTML = originalText;
    }

    function shareOnWhatsapp() {
        const text = `Hey! I found my photos from the event using EventLens. Check them out here: ${window.location.href}`;
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    }

    function downloadSingle() {
        if(currentViewUrl) saveAs(currentViewUrl, "photo.jpg");
    }
    
    function closeViewer() { document.getElementById('viewer').classList.remove('open'); }

</script>
