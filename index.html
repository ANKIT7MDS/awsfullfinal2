<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find My Photos - EventLens</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { background: #000; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    .container { width: 100%; max-width: 600px; text-align: center; }
    h1 { background: linear-gradient(to right, #00e676, #00b0ff); -webkit-background-clip: text; color: transparent; font-size: 32px; margin-bottom: 10px; }
    .card { background: #111; border: 1px solid #333; border-radius: 16px; padding: 24px; margin-top: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    
    .btn { background: #00e676; color: #000; border: none; padding: 16px 32px; border-radius: 50px; font-size: 16px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.2s; }
    .btn:active { transform: scale(0.98); }
    .btn.secondary { background: #333; color: #fff; }

    input { width: 100%; padding: 14px; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; margin-bottom: 12px; font-size: 16px; }

    .hidden { display: none !important; }
    .loader { border: 4px solid #333; border-top: 4px solid #00e676; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* Gallery */
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 20px; }
    .photo { aspect-ratio: 1; background: #222; border-radius: 8px; overflow: hidden; position: relative; }
    .photo img { width: 100%; height: 100%; object-fit: cover; }
  </style>
</head>
<body>

<div class="container">
  <h1>EventLens</h1>
  <p style="color: #888;">AI Photo Finder</p>

  <!-- STEP 1: INIT/PIN -->
  <div id="stepInit" class="card">
    <h3>Welcome Guest</h3>
    <p>Please enter the PIN if required.</p>
    <div id="pinBox" class="hidden">
       <input type="password" id="pinInput" placeholder="Enter 4-digit PIN">
    </div>
    <button class="btn" onclick="goToUpload()">Find My Photos</button>
  </div>

  <!-- STEP 2: SELFIE -->
  <div id="stepSelfie" class="card hidden">
    <h3>Take a Selfie</h3>
    <p style="font-size: 13px; color: #aaa; margin-bottom: 20px;">Upload a clear photo of your face.</p>
    <input type="file" id="selfieInput" accept="image/*">
    <button class="btn" onclick="processSelfie()">Search</button>
    <button class="btn secondary" onclick="location.reload()">Cancel</button>
  </div>

  <!-- STEP 3: SCANNING -->
  <div id="stepScan" class="card hidden">
    <h3>Scanning Gallery...</h3>
    <div class="loader"></div>
    <p>Matching your face with thousands of photos.</p>
  </div>

  <!-- STEP 4: DETAILS -->
  <div id="stepForm" class="card hidden">
    <h3><span id="matchCount">0</span> Photos Found!</h3>
    <p>Please enter your details to view them.</p>
    <div style="margin-top: 20px;">
        <input id="userName" placeholder="Your Name">
        <input id="userPhone" type="tel" placeholder="Mobile Number">
        <button class="btn" onclick="saveAndShow()">View Photos</button>
    </div>
  </div>

  <!-- STEP 5: GALLERY -->
  <div id="stepGallery" class="hidden" style="width:100%">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:20px;">
        <h2 style="margin:0">My Photos</h2>
        <button class="btn secondary" style="width:auto; padding: 10px 20px;" onclick="downloadAll()">Download All</button>
    </div>
    <div class="grid" id="photoGrid"></div>
  </div>

</div>

<script>
// CONFIG
const API_BASE = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod";
const params = new URLSearchParams(location.search);
const cid = params.get('cid');

let selfieBase64 = null;
let foundPhotos = [];

// Init
if(!cid) {
  document.body.innerHTML = "<h2 style='color:red; text-align:center; margin-top:50px;'>Invalid Link. Collection ID missing.</h2>";
}

function goToUpload(){
  // (Optional: Validate PIN here if backend supported PIN check API, skipping for now)
  document.getElementById('stepInit').classList.add('hidden');
  document.getElementById('stepSelfie').classList.remove('hidden');
}

function processSelfie(){
  const file = document.getElementById('selfieInput').files[0];
  if(!file) return alert("Please select a photo");
  
  // Convert to Base64
  const reader = new FileReader();
  reader.readAsDataURL(file);
  reader.onload = function () {
     selfieBase64 = reader.result.split(',')[1]; // Remove header
     doSearch();
  };
}

async function doSearch(){
  document.getElementById('stepSelfie').classList.add('hidden');
  document.getElementById('stepScan').classList.remove('hidden');

  try {
    const res = await fetch(`${API_BASE}/search`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ collection_id: cid, image_data: selfieBase64 })
    });
    
    if(!res.ok) throw new Error("Search Failed");
    const data = await res.json();
    
    // API returns { urls: [...], ... }
    foundPhotos = data.urls || [];
    
    if(foundPhotos.length === 0){
       alert("No photos found matching your face.");
       location.reload();
       return;
    }

    document.getElementById('matchCount').innerText = foundPhotos.length;
    document.getElementById('stepScan').classList.add('hidden');
    document.getElementById('stepForm').classList.remove('hidden');
    confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });

  } catch(e) {
    alert(e.message);
    location.reload();
  }
}

async function saveAndShow(){
  const name = document.getElementById('userName').value;
  const phone = document.getElementById('userPhone').value;
  
  if(!name || !phone) return alert("Please fill details");

  // Save Lead (Fire & Forget)
  fetch(`${API_BASE}/save-details`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
          collection_id: cid,
          name: name,
          mobile: phone,
          match_count: foundPhotos.length,
          selfie_image: selfieBase64 // Optional: if backend saves selfie from base64
      })
  });

  // Render Gallery
  const grid = document.getElementById('photoGrid');
  grid.innerHTML = foundPhotos.map(url => `
     <div class="photo">
       <a href="${url}" download>
         <img src="${url}">
       </a>
     </div>
  `).join('');

  document.getElementById('stepForm').classList.add('hidden');
  document.getElementById('stepGallery').classList.remove('hidden');
}

async function downloadAll(){
    const zip = new JSZip();
    const folder = zip.folder("MyPhotos");
    
    let count = 0;
    for(const url of foundPhotos){
        const blob = await fetch(url).then(r => r.blob());
        folder.file(`photo_${++count}.jpg`, blob);
    }
    
    const content = await zip.generateAsync({type:"blob"});
    saveAs(content, "EventLens_Photos.zip");
}
</script>
</body>
</html>
