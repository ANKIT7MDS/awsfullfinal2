<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find My Photos - EventLens</title>

  <!-- Libs -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">

  <!-- 🔴 CSS SAME AS YOUR FILE – NOT TOUCHED -->
  <!-- (CSS unchanged, intentionally omitted here for brevity) -->
</head>

<body>
<!-- 🔴 HTML UI SAME AS YOUR FILE – NOT TOUCHED -->

<script>
/* ================= CONFIG ================= */
const API_BASE = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod";
const params = new URLSearchParams(location.search);
const cid = params.get('cid');
const linkId = params.get('linkId');

/* ================= STATE ================= */
let selfieBase64 = null;
let foundPhotos = [];
let currentPhotoUrl = null;

/* ================= UTILS ================= */
const $ = (s) => document.querySelector(s);
const show = (id) => {
  document.querySelectorAll('.card, #viewGallery').forEach(el => el.classList.add('hidden'));
  $(id).classList.remove('hidden');
};

/* ================= INIT ================= */
window.onload = () => {
  if (!linkId) {
    document.body.innerHTML = `
      <div class="container">
        <div class="card">
          <h2 style="color:#ef4444">Invalid Guest Link</h2>
          <p>Please use the link shared by the photographer.</p>
        </div>
      </div>`;
  }
};

/* ================= SELFIE ================= */
function handleSelfie(input){
  const file = input.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = (e) => {
    $('#selfiePreview').innerHTML = `<img src="${e.target.result}">`;
    selfieBase64 = e.target.result;   // ✅ FULL DATA URI
    $('#selfieActions').classList.add('hidden');
    $('#btnSearch').classList.remove('hidden');
    $('#btnRetake').classList.remove('hidden');
  };
  reader.readAsDataURL(file);
}

function resetSelfie(){
  selfieBase64 = null;
  $('#selfiePreview').innerHTML = `<i class="fa-regular fa-user"></i>`;
  $('#selfieActions').classList.remove('hidden');
  $('#btnSearch').classList.add('hidden');
  $('#btnRetake').classList.add('hidden');
}

/* ================= SEARCH ================= */
async function doSearch(){
  if(!selfieBase64) return alert("Please take a selfie first");

  show('#viewScan');

  try {
    const payload = {
      selfie_image: selfieBase64,
      linkId: linkId
    };

    const pin = $('#pinInput')?.value;
    if(pin) payload.pin = pin;

    const res = await fetch(`${API_BASE}/search`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });

    const data = await res.json();
    if(!res.ok) throw new Error(data.error || "Search failed");

    foundPhotos = data.matches || [];   // ✅ FIX

    if(foundPhotos.length === 0){
      alert("No matching photos found.");
      show('#viewSelfie');
      resetSelfie();
      return;
    }

    $('#matchCount').textContent = foundPhotos.length;
    show('#viewForm');
    confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });

  } catch(e){
    alert(e.message);
    show('#viewSelfie');
    resetSelfie();
  }
}

/* ================= SAVE DETAILS ================= */
function submitDetails(){
  const name = $('#userName').value.trim();
  const phone = $('#userPhone').value.trim();
  if(!name || !phone) return alert("Enter details");

  fetch(`${API_BASE}/save-details`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      name,
      mobile: phone,
      linkId,
      collection_id: cid,
      photo_count: foundPhotos.length
    })
  });

  renderGallery();
}

/* ================= GALLERY ================= */
function renderGallery(){
  show('#viewGallery');
  $('#galSubtext').textContent = `${foundPhotos.length} Photos Found`;

  $('#photoGrid').innerHTML = foundPhotos.map(p => `
    <div class="photo-item" onclick="openLightbox('${p.url}')">
      <img src="${p.url}">
      <div class="check-circle"><i class="fa-solid fa-expand"></i></div>
    </div>
  `).join('');
}

function openLightbox(url){
  currentPhotoUrl = url;
  $('#lbImg').src = url;
  $('#lightbox').classList.add('open');
}

function downloadCurrent(){
  saveAs(currentPhotoUrl, "my_photo.jpg");
}
</script>

</body>
</html>
