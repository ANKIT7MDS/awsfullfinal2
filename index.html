<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Find My Photos - EventLens</title>
    <!-- Policy: No Referrer for S3 compliance -->
    <meta name="referrer" content="no-referrer">
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary: #00e676;
            --bg: #050505;
            --panel: #111;
            --text: #ffffff;
            --text-muted: #a1a1aa;
            --border: #27272a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }

        /* SCREENS */
        .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; animation: fadeIn 0.4s ease; }
        .screen.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 1. UPLOAD SCREEN */
        .hero-title { font-family: 'Outfit', sans-serif; font-size: 32px; font-weight: 800; text-align: center; margin-bottom: 10px; }
        .hero-sub { color: var(--text-muted); text-align: center; margin-bottom: 40px; font-size: 14px; }
        
        .upload-circle {
            width: 180px; height: 180px; border-radius: 50%;
            background: #1a1a1a; border: 2px dashed #444;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative; overflow: hidden;
            transition: 0.3s; margin-bottom: 30px;
        }
        .upload-circle:active { transform: scale(0.95); border-color: var(--primary); }
        .upload-circle i { font-size: 40px; color: #555; margin-bottom: 10px; }
        .upload-circle span { font-size: 12px; color: #666; font-weight: 600; text-transform: uppercase; }
        .upload-circle img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; display: none; }

        .scan-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: var(--primary); box-shadow: 0 0 10px var(--primary);
            animation: scan 1.5s infinite linear; display: none; z-index: 10;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        /* 2. RESULT COUNT & FORM */
        .result-card {
            background: var(--panel); border: 1px solid var(--border); padding: 30px;
            border-radius: 24px; width: 100%; max-width: 380px; text-align: center;
        }
        .match-badge {
            background: rgba(0, 230, 118, 0.1); color: var(--primary);
            padding: 8px 16px; border-radius: 50px; font-weight: 700; font-size: 14px;
            display: inline-block; margin-bottom: 20px; border: 1px solid rgba(0, 230, 118, 0.2);
        }
        .input-box { width: 100%; padding: 14px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 12px; margin-bottom: 15px; font-size: 15px; }
        .btn-primary {
            background: var(--primary); color: #000; border: none; padding: 16px; width: 100%;
            border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer;
        }

        /* 3. GALLERY GRID */
        .gallery-header {
            position: sticky; top: 0; z-index: 50; background: rgba(5,5,5,0.9); backdrop-filter: blur(10px);
            width: 100%; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }
        .user-info { font-size: 14px; font-weight: 600; }
        .user-info span { color: var(--text-muted); font-weight: 400; font-size: 12px; }
        
        .grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; padding: 4px;
            width: 100%; max-width: 1000px; margin: 0 auto;
        }
        @media(min-width: 768px) { .grid { grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; } }

        .photo-item { position: relative; aspect-ratio: 2/3; background: #111; border-radius: 4px; overflow: hidden; cursor: pointer; }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        
        /* LIGHTBOX */
        #lightbox { position: fixed; inset: 0; background: #000; z-index: 200; display: none; flex-direction: column; }
        .lb-img { flex: 1; object-fit: contain; width: 100%; height: 100%; }
        .lb-controls {
            padding: 20px; background: #111; display: flex; justify-content: space-around;
            border-top: 1px solid #333; padding-bottom: 40px;
        }
        .action-btn {
            background: transparent; border: none; color: #888; font-size: 11px;
            display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer;
        }
        .action-btn i { font-size: 24px; transition: 0.2s; }
        .action-btn.active i { transform: scale(1.2); }
        .action-btn.fav.active { color: #ff4081; }
        .action-btn.del.active { color: #ff4444; }

        /* TOAST */
        #toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); background: #222; padding: 10px 20px; border-radius: 30px; font-size: 13px; z-index: 300; display: none; border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="toast"></div>

    <!-- SCREEN 1: UPLOAD SELFIE -->
    <div id="screenUpload" class="screen active">
        <h1 class="hero-title">Find My Photos</h1>
        <p class="hero-sub">Upload a clear selfie to find your photos instantly.</p>
        
        <div class="upload-circle" onclick="document.getElementById('selfieInput').click()">
            <div class="scan-line" id="scanLine"></div>
            <img id="previewImg">
            <i class="fa-solid fa-camera"></i>
            <span>Tap to Upload</span>
        </div>
        <input type="file" id="selfieInput" accept="image/*" hidden onchange="handleSelfie(this.files[0])">
        
        <p id="statusText" style="font-size: 13px; color: var(--primary); height: 20px;"></p>
        
        <!-- Optional: Manual PIN entry if needed later -->
        <div id="pinArea" style="display:none; margin-top:20px;">
            <input type="password" id="manualPin" placeholder="Enter Event PIN" class="input-box" style="text-align:center; width:150px;">
        </div>
    </div>

    <!-- SCREEN 2: FOUND & DETAILS -->
    <div id="screenDetails" class="screen">
        <div class="result-card">
            <div class="match-badge"><i class="fa-solid fa-check-circle"></i> <span id="matchCount">0</span> Photos Found</div>
            <h2 style="margin: 0 0 10px 0;">Almost there!</h2>
            <p style="color: #888; font-size: 13px; margin-bottom: 25px;">Enter your details to view and manage your photos.</p>
            
            <input type="text" id="guestName" class="input-box" placeholder="Your Name">
            <input type="tel" id="guestPhone" class="input-box" placeholder="Phone Number">
            
            <button class="btn-primary" onclick="submitDetails()">View Photos</button>
        </div>
    </div>

    <!-- SCREEN 3: GALLERY GRID -->
    <div id="screenGallery" style="display:none;">
        <div class="gallery-header">
            <div class="user-info" id="headerUserInfo">Guest</div>
            <button onclick="location.reload()" style="background:none; border:none; color:var(--primary); font-size:13px;">Exit</button>
        </div>
        <div class="grid" id="photoGrid"></div>
    </div>

    <!-- LIGHTBOX -->
    <div id="lightbox">
        <div style="padding: 15px; position:absolute; top:0; right:0; z-index:10;">
            <button onclick="closeLightbox()" style="background:none;border:none;color:#fff;font-size:26px;"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div style="flex:1; display:flex; align-items:center; justify-content:center;">
            <img id="lbImg" class="lb-img" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjNDQ0IiBzdHJva2Utd2lkdGg9IjIiPjxyZWN0IHg9IjMiIHk9IjMiIHdpZHRoPSIxOCIgaGVpZ2h0PSIxOCIgcng9IjIiIHJ5PSIyIi8+PGNpcmNsZSBjeD0iOC41IiBjeT0iOC41IiByPSIxLjUiLz48cG9seWxpbmUgcG9pbnRzPSIyMSAxNSAxNiAxMCA1IDIxIi8+PC9zdmc+'">
        </div>
        <div class="lb-controls">
            <button class="action-btn fav" id="btnFav" onclick="toggleAction('fav')">
                <i class="fa-solid fa-heart"></i>
                <span>Favorite</span>
            </button>
            <button class="action-btn" onclick="downloadPhoto()">
                <i class="fa-solid fa-download"></i>
                <span>Download</span>
            </button>
            <button class="action-btn del" id="btnDel" onclick="toggleAction('delete_req')">
                <i class="fa-solid fa-trash-can"></i>
                <span>Delete</span>
            </button>
        </div>
    </div>

<script>
    // CONFIG
    const API_BASE = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod";
    const params = new URLSearchParams(window.location.search);
    const cid = params.get('cid') || params.get('collection_id');
    const linkId = params.get('linkId') || params.get('id'); // Link ID for tracking
    const urlPin = params.get('pin');
    
    // STATE
    let foundPhotos = [];
    let guestInfo = { name: '', phone: '' };
    let currentIdx = 0;

    // 1. INIT
    window.onload = () => {
        if(!cid) alert("Invalid Link: Missing Collection ID");
        // Check if user already searched (Optional session persistence)
        const saved = localStorage.getItem('el_guest_session');
        if(saved) {
            // Restore session logic if needed, for now starting fresh
        }
    };

    // 2. HANDLE SELFIE & SEARCH
    async function handleSelfie(file) {
        if(!file) return;

        // UI Updates
        const img = document.getElementById('previewImg');
        img.src = URL.createObjectURL(file);
        img.style.display = 'block';
        document.getElementById('scanLine').style.display = 'block';
        document.getElementById('statusText').innerText = "Scanning database...";
        
        try {
            const base64 = await toBase64(file);
            const pin = urlPin || document.getElementById('manualPin').value;

            // Call Search API
            // Note: Assuming 'search-faces' endpoint exists or routed via client-api
            // Using direct search endpoint as per previous discussions
            const res = await fetch(`${API_BASE}/search-faces`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    collection_id: cid,
                    image: base64.split(',')[1],
                    min_confidence: 80,
                    pin: pin // Send PIN if required by backend
                })
            });

            const data = await res.json();
            
            if(res.ok) {
                foundPhotos = data.ids || data.photos || []; 
                // If backend returns 401/403 for PIN, we catch it here
                
                if(foundPhotos.length > 0) {
                    document.getElementById('matchCount').innerText = foundPhotos.length;
                    showScreen('screenDetails');
                } else {
                    document.getElementById('statusText').innerText = "No matches found. Try another photo.";
                    document.getElementById('scanLine').style.display = 'none';
                }
            } else {
                if(res.status === 401 || res.status === 403) {
                    // Ask for PIN if not provided
                    document.getElementById('statusText').innerText = "Protected Gallery. Enter PIN below.";
                    document.getElementById('pinArea').style.display = 'block';
                    document.getElementById('scanLine').style.display = 'none';
                } else {
                    throw new Error(data.message || "Search failed");
                }
            }
        } catch(e) {
            console.error(e);
            document.getElementById('statusText').innerText = "Error searching. Please try again.";
            document.getElementById('scanLine').style.display = 'none';
        }
    }

    // 3. SUBMIT DETAILS & SHOW GALLERY
    function submitDetails() {
        const name = document.getElementById('guestName').value.trim();
        const phone = document.getElementById('guestPhone').value.trim();
        
        if(!name || !phone) return showToast("Please enter your name and phone");
        
        guestInfo = { name, phone };
        
        // Log the search to backend (Optional 'save-lead' call)
        // For now, we proceed to show gallery
        
        document.getElementById('headerUserInfo').innerHTML = `${name}<br><span>${phone}</span>`;
        renderGallery();
        
        document.getElementById('screenDetails').classList.remove('active');
        document.getElementById('screenGallery').style.display = 'block';
    }

    function renderGallery() {
        const grid = document.getElementById('photoGrid');
        grid.innerHTML = '';
        
        foundPhotos.forEach((p, idx) => {
            const div = document.createElement('div');
            div.className = 'photo-item';
            div.onclick = () => openLightbox(idx);
            // Plain img tag for max compatibility
            div.innerHTML = `<img src="${p.thumbnail_url || p.url}" loading="lazy">`;
            grid.appendChild(div);
        });
    }

    // 4. LIGHTBOX & ACTIONS
    function openLightbox(idx) {
        currentIdx = idx;
        const p = foundPhotos[idx];
        document.getElementById('lbImg').src = p.url;
        
        // Reset buttons (visual state only for now unless we fetch existing status)
        document.getElementById('btnFav').classList.remove('active');
        document.getElementById('btnDel').classList.remove('active');
        
        document.getElementById('lightbox').style.display = 'flex';
    }

    function closeLightbox() {
        document.getElementById('lightbox').style.display = 'none';
    }

    async function toggleAction(type) {
        const p = foundPhotos[currentIdx];
        const btn = document.getElementById(type === 'fav' ? 'btnFav' : 'btnDel');
        const isActive = btn.classList.toggle('active');
        
        showToast(isActive ? (type === 'fav' ? 'Added to Favorites' : 'Delete Requested') : 'Removed');

        // Send to Backend for Admin Dashboard
        try {
            await fetch(`${API_BASE}/client-api`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: "update_selection",
                    payload: {
                        collection_id: cid,
                        photo_id: p.photo_id || p.id,
                        status: {
                            [type]: isActive,
                            guest_name: guestInfo.name,
                            guest_mobile: guestInfo.phone,
                            timestamp: Date.now()
                        }
                    }
                })
            });
        } catch(e) { console.error("Action failed", e); }
    }

    function downloadPhoto() {
        const url = foundPhotos[currentIdx].url;
        const a = document.createElement('a');
        a.href = url;
        a.download = `EventPhoto_${Date.now()}.jpg`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    // HELPERS
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function toBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }
</script>
</body>
</html>
