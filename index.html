<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>EventLens – Smart AI Gallery</title>
  <meta name="referrer" content="no-referrer">
  
  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #050505; --card: #121212; --surface: #1e1e1e;
      --accent: #00e676; --accent-dark: #00b35c; --accent-soft: rgba(0, 230, 118, 0.15);
      --text: #ffffff; --muted: #a1a1aa; --border: #27272a;
      --font-main: 'Plus Jakarta Sans', sans-serif;
      --font-head: 'Outfit', sans-serif;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--font-main); overflow-x: hidden; padding-bottom: 80px; }
    
    /* Branding Header */
    header { position: relative; height: 260px; overflow: hidden; background: #111; border-bottom: 1px solid var(--border); }
    .header-bg { position: absolute; inset: 0; background-size: cover; background-position: center; filter: brightness(0.4); transform: scale(1.05); transition: 0.5s; background-repeat: no-repeat; }
    .header-content { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding: 30px; background: linear-gradient(to top, var(--bg) 10%, transparent); }
    .brand-logo { width: 85px; height: 85px; border-radius: 50%; border: 3px solid var(--accent); object-fit: cover; margin-bottom: 15px; background: #000; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .brand-title { font-family: var(--font-head); font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin: 0; text-align: center; }
    .welcome-msg { font-size: 13px; color: var(--muted); margin-top: 5px; text-align: center; }

    .container { max-width: 1200px; margin: 0 auto; padding: 16px; width: 100%; }
    .screen { display: none; min-height: 60vh; flex-direction: column; align-items: center; justify-content: center; }
    .screen.active { display: flex; }

    /* Selfie Box */
    .upload-card { width: 100%; max-width: 400px; background: var(--card); border: 1px solid var(--border); border-radius: 30px; padding: 40px 30px; text-align: center; margin-top: -50px; position: relative; z-index: 10; backdrop-filter: blur(10px); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
    .selfie-trigger { width: 160px; height: 160px; border-radius: 50%; background: var(--surface); border: 2px dashed #444; margin: 25px auto; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; transition: 0.3s; }
    .selfie-trigger img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
    .scan-line { position: absolute; width: 100%; height: 4px; background: var(--accent); box-shadow: 0 0 15px var(--accent); top: 0; animation: scan 2s infinite linear; display: none; z-index: 5; }
    @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

    /* Counter */
    .counter-box { margin-top: 20px; display: none; background: #000; padding: 12px; border-radius: 15px; border: 1px solid var(--border); }
    .counter-val { font-size: 20px; font-weight: 800; color: var(--accent); }

    /* Lead Modal - Professional UI */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 20px; animation: fadeIn 0.3s; }
    .modal-content { background: #1a1a1a; border: 1px solid var(--border); border-radius: 24px; padding: 35px; width: 100%; max-width: 420px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.8); }
    .lead-label { display: block; text-align: left; font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; font-weight: 700; }
    .lead-input { width: 100%; padding: 16px; background: #0a0a0a; border: 1px solid var(--border); color: #fff; border-radius: 12px; font-size: 16px; margin-bottom: 12px; transition: 0.3s; }
    .lead-input:focus { border-color: var(--accent); background: #000; }
    .btn-unlock { background: var(--accent); color: #000; border: none; padding: 18px; width: 100%; border-radius: 50px; font-weight: 800; font-size: 16px; cursor: pointer; margin-top: 10px; }

    /* Gallery - 3 columns for mobile */
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 4px; }
    @media (min-width: 768px) { .grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; padding: 16px; } }
    .ph-card { position: relative; aspect-ratio: 1; background: #111; overflow: hidden; cursor: pointer; border-radius: 4px; }
    .ph-card img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: 0.3s; }
    .ph-card img.loaded { opacity: 1; }
    .event-tag { position: absolute; bottom: 4px; left: 4px; background: rgba(0,0,0,0.7); color: #fff; padding: 2px 5px; font-size: 7px; border-radius: 3px; font-weight: 700; text-transform: uppercase; border: 0.5px solid rgba(255,255,255,0.2); }
    .sel-indicator { position: absolute; top: 5px; right: 5px; width: 18px; height: 18px; border-radius: 50%; background: var(--accent); color: #000; display: none; align-items: center; justify-content: center; font-size: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
    .ph-card.is-selected .sel-indicator { display: flex; }

    /* Action Bar */
    .action-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(120px); background: rgba(15,15,15,0.95); border: 1px solid var(--border); padding: 12px 25px; border-radius: 100px; display: flex; gap: 20px; backdrop-filter: blur(15px); z-index: 500; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .action-bar.show { transform: translateX(-50%) translateY(0); }
    .action-btn { background: none; border: none; color: #fff; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 9px; cursor: pointer; opacity: 0.8; transition: 0.2s; }
    .action-btn i { font-size: 20px; }
    .action-btn.active { color: var(--accent); opacity: 1; }

    /* --- LIGHTBOX / SLIDE VIEW --- */
    .lightbox { position: fixed; inset: 0; background: #000; z-index: 4000; display: none; flex-direction: column; }
    .lb-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 10; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
    .lb-content { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; width: 100%; overflow: hidden; }
    .lb-img { max-width: 100%; max-height: 100%; object-fit: contain; transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
    
    .lb-nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 15px; border-radius: 50%; cursor: pointer; z-index: 20; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    .lb-nav-btn:active { background: var(--accent); color: #000; }
    .lb-nav-prev { left: 15px; }
    .lb-nav-next { right: 15px; }
    @media (max-width: 768px) { .lb-nav-btn { display: none; } } /* Use swipe on mobile */

    .lb-footer { padding: 20px 20px 40px; display: flex; justify-content: center; gap: 40px; background: linear-gradient(to top, #000, transparent); position: relative; z-index: 10; }
    .lb-action { display: flex; flex-direction: column; align-items: center; gap: 6px; color: #fff; font-size: 10px; cursor: pointer; }
    .lb-action i { font-size: 26px; }
    .lb-action.active-fav { color: #ff4081; }
    .lb-action.active-sel { color: var(--accent); }

    .load-more-btn { background: var(--surface); color: #fff; border: 1px solid var(--border); padding: 14px 28px; border-radius: 50px; font-weight: 700; margin: 30px auto; display: none; cursor: pointer; width: 220px; transition: 0.2s; }
    .load-more-btn:active { transform: scale(0.95); background: #222; }

    #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); padding: 10px 20px; border-radius: 50px; z-index: 9999; display: none; font-size: 13px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- Audio for Success -->
<audio id="successSound" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" preload="auto"></audio>
<div id="toast">Message</div>

<!-- BRANDING HEADER -->
<header id="header">
    <div class="header-bg" id="headerBg"></div>
    <div class="header-content">
        <img id="brandLogo" class="brand-logo" onerror="this.style.display='none'">
        <h1 class="brand-title" id="brandTitle">AI Face Search</h1>
        <p class="welcome-msg" id="welcomeMsg">हजारों फोटोज में से आपको ढूँढ रहे हैं...</p>
    </div>
</header>

<div class="container">
    <!-- SEARCH SCREEN -->
    <div id="screenSearch" class="screen active">
        <div class="upload-card">
            <h2 style="font-family: var(--font-head); margin-bottom: 10px;">अपनी फोटोज ढूँढें</h2>
            <p style="color: var(--muted); font-size: 13px;">AI मैजिक से हजारों फोटोज में खुद को तुरंत पाएं।</p>
            
            <div class="selfie-trigger" onclick="document.getElementById('fileIn').click()">
                <div class="scan-line" id="scanLine"></div>
                <img id="previewImg" class="hidden">
                <i class="fa-solid fa-camera" id="camIcon" style="font-size: 40px; color: #333;"></i>
                <span id="triggerLabel" style="font-size: 11px; font-weight: 800; color: #555; margin-top: 10px;">सेल्फी लें</span>
            </div>
            <!-- capture="user" triggers camera on mobile -->
            <input type="file" id="fileIn" hidden capture="user" accept="image/*" onchange="handleSelfie(this.files[0])">
            
            <div class="counter-box" id="counterBox">
                <div style="font-size: 10px; color: var(--muted); letter-spacing: 1px; margin-bottom: 5px;">गैलरी स्कैन हो रही है</div>
                <div class="counter-val"><span id="liveCount">0</span> / 15,000</div>
            </div>
            
            <p id="statusText" style="height: 20px; margin-top: 15px; color: var(--accent); font-weight: 700; font-size: 14px;"></p>
        </div>
    </div>

    <!-- GALLERY SCREEN -->
    <div id="screenGallery" class="hidden">
        <div style="display:flex; justify-content:space-between; padding: 15px; background:var(--bg); position:sticky; top:0; z-index:100; border-bottom:1px solid var(--border);">
            <div id="resCountText" style="font-weight:800; font-family: var(--font-head);">0 फोटोज मिलीं</div>
            <button class="action-btn" onclick="location.reload()" style="opacity:1; color:var(--accent);"><i class="fa-solid fa-rotate"></i></button>
        </div>
        
        <div class="grid" id="photoGrid"></div>
        <div id="btnLoadMore" class="load-more-btn" onclick="fetchNextBatch()">और लोड करें...</div>
    </div>
</div>

<!-- ACTION BAR -->
<div class="action-bar" id="actionBar">
    <button class="action-btn" id="btnSelectMode" onclick="toggleSelectMode()"><i class="fa-solid fa-check-double"></i><span>सिलेक्ट</span></button>
    <button class="action-btn" onclick="downloadSelected()"><i class="fa-solid fa-download"></i><span>डाउनलोड</span></button>
    <button class="action-btn" onclick="shareGallery()"><i class="fa-brands fa-whatsapp"></i><span>शेयर</span></button>
</div>

<!-- LEAD MODAL -->
<div class="modal" id="leadModal">
    <div class="modal-content">
        <i class="fa-solid fa-wand-magic-sparkles" style="color: var(--accent); font-size: 32px; margin-bottom:15px;"></i>
        <h2 style="font-family: var(--font-head); margin-bottom: 5px;">बिंगो! हमने आपको ढूँढ लिया।</h2>
        <p style="color: var(--muted); font-size: 14px; margin-bottom: 25px;">आपकी <span id="foundTotal" style="color: #fff; font-weight: 800;">0</span> फोटोज मिलीं।</p>
        
        <label class="lead-label">आपका नाम</label>
        <input id="gName" class="lead-input" placeholder="Rahul Soni">
        
        <label class="lead-label">मोबाइल नंबर</label>
        <input id="gMobile" class="lead-input" type="tel" placeholder="98XXXXXXXX">
        
        <button class="btn-unlock" onclick="saveLeadAndShow()">अपनी गैलरी देखें</button>
    </div>
</div>

<!-- LIGHTBOX (Slide View) -->
<div class="lightbox" id="lightbox">
    <div class="lb-header">
        <button onclick="closeLightbox()" style="background:none; border:none; color:#fff; font-size:24px; cursor:pointer;"><i class="fa-solid fa-xmark"></i></button>
        <span id="lbCounter" style="color: #888; font-weight: 600;">1 / 1</span>
        <button onclick="downloadSingle()" style="background:none; border:none; color:var(--accent); font-size:20px; cursor:pointer;"><i class="fa-solid fa-download"></i></button>
    </div>
    
    <div class="lb-content" id="lbTouchArea">
        <button class="lb-nav-btn lb-nav-prev" onclick="navLightbox(-1)"><i class="fa-solid fa-chevron-left"></i></button>
        <img id="lbImg" class="lb-img">
        <button class="lb-nav-btn lb-nav-next" onclick="navLightbox(1)"><i class="fa-solid fa-chevron-right"></i></button>
    </div>
    
    <div class="lb-footer">
        <div class="lb-action" id="lbBtnFav" onclick="toggleChoice('fav')"><i class="fa-solid fa-heart" style="font-size:26px;"></i><span>Favorite</span></div>
        <div class="lb-action" id="lbBtnSel" onclick="toggleChoice('selected')"><i class="fa-solid fa-check-circle" style="font-size:26px;"></i><span>Select</span></div>
    </div>
</div>

<script>
    const API_BASE = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod";
    const urlParams = new URLSearchParams(window.location.search);
    const linkId = urlParams.get('linkId') || urlParams.get('id');
    let cid = urlParams.get('cid');
    
    let allMatchedIds = [];
    let loadedPhotos = [];
    let selections = {}; 
    let multiSelectMode = false;
    let selectedSet = new Set();
    let currentIdx = 0;
    let currentSelfieB64 = "";
    let scanInterval = null;
    let guestInfo = { name: '', mobile: '' };

    /* --- BRANDING LOAD --- */
    window.onload = async () => {
        if(!cid && !linkId) return alert("Invalid Link");
        try {
            const url = cid ? `${API_BASE}/get-branding?cid=${cid}` : `${API_BASE}/get-branding?linkId=${linkId}`;
            const res = await fetch(url);
            const raw = await res.json();
            const data = (raw.body && typeof raw.body === 'string') ? JSON.parse(raw.body) : (raw.branding || raw);
            applyBranding(data);
            if(!cid) cid = data.collection_id || data.collectionId;
        } catch(e) { console.error("Branding failed to load", e); }
    };

    function applyBranding(b) {
        if(b.collection_name || b.name) document.getElementById('brandTitle').innerText = b.collection_name || b.name;
        if(b.welcome_msg) document.getElementById('welcomeMsg').innerText = b.welcome_msg;
        if(b.header_img && b.header_img !== "null") document.getElementById('headerBg').style.backgroundImage = `url('${b.header_img}')`;
        if(b.logo && b.logo !== "null") {
            const logo = document.getElementById('brandLogo');
            logo.src = b.logo; logo.style.display = 'block';
        }
        if(b.color) {
            document.documentElement.style.setProperty('--accent', b.color);
            document.documentElement.style.setProperty('--accent-soft', b.color + '26');
        }
    }

    /* --- SEARCH FLOW --- */
    function handleSelfie(file) {
        if(!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            currentSelfieB64 = e.target.result;
            document.getElementById('previewImg').src = e.target.result;
            document.getElementById('previewImg').classList.remove('hidden');
            document.getElementById('camIcon').classList.add('hidden');
            document.getElementById('triggerLabel').classList.add('hidden');
            document.getElementById('scanLine').style.display = 'block';
            document.getElementById('counterBox').style.display = 'block';
            document.getElementById('statusText').innerText = "AI आपको ढूँढ रहा है...";
            startLiveCounter();
            performSearch();
        };
        reader.readAsDataURL(file);
    }

    function startLiveCounter() {
        let c = 0;
        scanInterval = setInterval(() => {
            c += Math.floor(Math.random() * 400) + 150;
            if(c > 14900) c = 14900 + Math.floor(Math.random() * 50);
            document.getElementById('liveCount').innerText = c.toLocaleString();
        }, 150);
    }

    async function performSearch() {
        try {
            const res = await fetch(`${API_BASE}/search`, {
                method: 'POST',
                body: JSON.stringify({ collection_id: cid, image: currentSelfieB64.split(',')[1], linkId: linkId })
            });
            const raw = await res.json();
            const data = (raw.body && typeof raw.body === 'string') ? JSON.parse(raw.body) : raw;
            clearInterval(scanInterval);
            
            if(res.ok) {
                allMatchedIds = data.all_matched_ids || [];
                loadedPhotos = data.matches || [];
                document.getElementById('foundTotal').innerText = allMatchedIds.length > 100 ? "100+" : allMatchedIds.length;
                document.getElementById('successSound').play().catch(e => {});
                document.getElementById('leadModal').style.display = 'flex';
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#00e676', '#ffffff'] });
            } else {
                alert("कोई फोटो नहीं मिली। कृपया साफ़ फोटो के साथ दोबारा कोशिश करें।");
                location.reload();
            }
        } catch(e) { alert("Timeout error! पेज रिफ्रेश करके दोबारा कोशिश करें।"); }
    }

    /* --- LEAD & GRID --- */
    function saveLeadAndShow() {
        const name = document.getElementById('gName').value;
        const mobile = document.getElementById('gMobile').value;
        if(!name || !mobile) return alert("कृपया नाम और मोबाइल नंबर भरें");
        
        guestInfo = { name, mobile };

        fetch(`${API_BASE}/save-details`, {
            method: 'POST',
            body: JSON.stringify({ 
                collection_id: cid, 
                name: name, guest_name: name,
                mobile: mobile, guest_mobile: mobile,
                photo_count: allMatchedIds.length, 
                selfie_image: currentSelfieB64.split(',')[1] 
            })
        });

        document.getElementById('leadModal').style.display = 'none';
        document.getElementById('screenSearch').classList.add('hidden');
        document.getElementById('screenGallery').classList.remove('hidden');
        document.getElementById('actionBar').classList.add('show');
        
        document.getElementById('resCountText').innerText = `${allMatchedIds.length} Photos Found`;
        renderGrid();
        checkPagination();
    }

    function renderGrid() {
        const grid = document.getElementById('photoGrid');
        grid.innerHTML = loadedPhotos.map((p, i) => `
            <div class="ph-card ${selectedSet.has(p.photo_id) ? 'is-selected' : ''}" onclick="handlePhotoClick(${i})">
                <img src="${p.thumbnail_url || p.url}" onload="this.classList.add('loaded')">
                <div class="sel-indicator"><i class="fa-solid fa-check"></i></div>
                ${p.event_name ? `<div class="event-tag">${p.event_name}</div>` : ''}
            </div>
        `).join('');
    }

    /* --- PAGINATION --- */
    async function fetchNextBatch() {
        const btn = document.getElementById('btnLoadMore');
        btn.disabled = true; btn.innerText = "लोड हो रहा है...";
        const nextIds = allMatchedIds.slice(loadedPhotos.length, loadedPhotos.length + 100);
        
        try {
            const res = await fetch(`${API_BASE}/get_more_matches`, {
                method: 'POST',
                body: JSON.stringify({ ids: nextIds })
            });
            const raw = await res.json();
            const data = (raw.body && typeof raw.body === 'string') ? JSON.parse(raw.body) : raw;
            
            if(data.matches) {
                loadedPhotos = [...loadedPhotos, ...data.matches];
                renderGrid();
                checkPagination();
            }
        } catch(e) { console.error(e); }
        btn.disabled = false;
        btn.innerText = "और लोड करें...";
    }

    function checkPagination() {
        document.getElementById('btnLoadMore').style.display = loadedPhotos.length < allMatchedIds.length ? 'block' : 'none';
    }

    /* --- INTERACTIONS --- */
    function handlePhotoClick(i) {
        if(multiSelectMode) {
            const id = loadedPhotos[i].photo_id;
            if(selectedSet.has(id)) selectedSet.delete(id); else selectedSet.add(id);
            renderGrid();
        } else { openLightbox(i); }
    }

    function toggleSelectMode() {
        multiSelectMode = !multiSelectMode;
        document.getElementById('btnSelectMode').classList.toggle('active');
        if(!multiSelectMode) selectedSet.clear();
        renderGrid();
    }

    /* --- LIGHTBOX (Improved Slide View) --- */
    function openLightbox(i) {
        currentIdx = i;
        showLbPhoto();
        document.getElementById('lightbox').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    function showLbPhoto() {
        const p = loadedPhotos[currentIdx];
        const img = document.getElementById('lbImg');
        img.src = p.url;
        document.getElementById('lbCounter').innerText = `${currentIdx + 1} / ${loadedPhotos.length}`;
        
        // Sync UI choices
        const s = selections[p.photo_id] || { fav: false, selected: false };
        document.getElementById('lbBtnFav').style.color = s.fav ? '#ff4081' : '#fff';
        document.getElementById('lbBtnSel').style.color = s.selected ? 'var(--accent)' : '#fff';
    }

    function navLightbox(dir) {
        currentIdx += dir;
        if(currentIdx < 0) currentIdx = loadedPhotos.length - 1;
        if(currentIdx >= loadedPhotos.length) currentIdx = 0;
        showLbPhoto();
    }

    function toggleChoice(type) {
        const p = loadedPhotos[currentIdx];
        if(!selections[p.photo_id]) selections[p.photo_id] = { fav: false, selected: false };
        selections[p.photo_id][type] = !selections[p.photo_id][type];
        showLbPhoto();
        
        // SYNC SELECTION WITH ADMIN DASHBOARD
        fetch(`${API_BASE}/client-api`, { 
            method: 'POST', 
            body: JSON.stringify({ 
                action: "update_selection", 
                payload: { 
                    collection_id: cid, photo_id: p.photo_id, 
                    status: { 
                        ...selections[p.photo_id], 
                        guest_name: guestInfo.name, 
                        guest_mobile: guestInfo.mobile,
                        timestamp: Date.now()
                    } 
                } 
            })
        });
    }

    function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; document.body.style.overflow = 'auto'; }
    function downloadSingle() { saveAs(loadedPhotos[currentIdx].url, `Photo_${loadedPhotos[currentIdx].photo_id}.jpg`); }

    async function downloadSelected() {
        const list = multiSelectMode ? Array.from(selectedSet) : [loadedPhotos[currentIdx]?.photo_id];
        if(!list.length || !list[0]) return showToast("कृपया फोटोज सिलेक्ट करें");
        
        showToast("Zip फाइल तैयार हो रही है...");
        const zip = new JSZip();
        const photosToZip = loadedPhotos.filter(p => list.includes(p.photo_id));
        
        for(let p of photosToZip) {
            try {
                const res = await fetch(p.url);
                const blob = await res.blob();
                zip.file(`Photo_${p.photo_id}.jpg`, blob);
            } catch(e) {}
        }
        
        zip.generateAsync({type:"blob"}).then(c => {
            saveAs(c, "EventLens_Selected.zip");
            showToast("Complete!");
        });
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    function shareGallery() {
        const url = encodeURIComponent(window.location.href);
        window.open(`https://wa.me/?text=मेरे इवेंट की फोटोज यहाँ देखें: ${url}`);
    }

    /* Swipe Logic for Mobile */
    let touchStartX = 0;
    document.getElementById('lbTouchArea').addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].screenX;
    }, false);
    document.getElementById('lbTouchArea').addEventListener('touchend', e => {
        let touchEndX = e.changedTouches[0].screenX;
        if (touchStartX - touchEndX > 50) navLightbox(1);  // Swipe Left -> Next
        if (touchEndX - touchStartX > 50) navLightbox(-1); // Swipe Right -> Prev
    }, false);

</script>
</body>
</html>
