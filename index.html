<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EventLens – Smart AI Gallery</title>

  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #050505;
      --card: #101010;
      --accent: #00e676; /* Default Green */
      --accent-soft: rgba(0, 230, 118, 0.15);
      --text: #ffffff;
      --muted: #a0a0a0;
      --border: #262626;
      --font-main: 'Plus Jakarta Sans', sans-serif;
    }

    * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; font-family: var(--font-main); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; display: flex; flex-direction: column; }

    /* BRANDING HEADER */
    header { 
        position: relative; 
        height: 280px; 
        overflow: hidden; 
        border-bottom: 1px solid var(--border);
        background-size: cover; 
        background-position: center;
        background-image: url('https://images.unsplash.com/photo-1511795409834-ef04bbd61622?q=80&w=2069&auto=format&fit=crop');
        transition: background-image 0.5s ease;
    }
    .header-overlay {
        position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.3), var(--bg));
        display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; text-align: center; align-items: center;
    }
    .brand-logo {
        width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--accent);
        object-fit: cover; margin-bottom: 10px; background: #000;
        display: none; 
    }
    .brand-title { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
    
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; flex: 1; width: 100%; }

    /* SEARCH BOX */
    .search-card {
        background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 30px;
        text-align: center; margin-top: -40px; position: relative; z-index: 10;
        box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    .selfie-btn {
        background: var(--accent); color: #000; border: none; padding: 16px 32px; border-radius: 50px;
        font-size: 16px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 10px;
        transition: transform 0.2s;
    }
    .selfie-btn:hover { transform: scale(1.05); }

    /* GALLERY GRID */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; margin-top: 30px; }
    
    /* Masonry Mode Override */
    .grid.masonry { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); grid-auto-rows: 10px; }
    
    .photo-item { 
        aspect-ratio: 1; background: #222; border-radius: 8px; overflow: hidden; position: relative; 
        opacity: 0; animation: fadeIn 0.5s forwards; cursor: pointer;
    }
    .photo-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
    .photo-item:hover img { transform: scale(1.05); }

    /* MODAL */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; display: none; align-items: center; justify-content: center; }
    .modal.open { display: flex; }
    .modal-img { max-width: 90%; max-height: 80vh; border-radius: 8px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
    .close-btn { position: absolute; top: 20px; right: 20px; background: none; border: none; color: #fff; font-size: 32px; cursor: pointer; }
    .download-btn {
        position: absolute; bottom: 30px; background: var(--accent); color: #000; border: none;
        padding: 12px 24px; border-radius: 30px; font-weight: 700; cursor: pointer;
    }

    /* LEAD FORM INPUTS */
    .lead-input { width: 100%; padding: 14px; margin-bottom: 12px; background: #222; border: 1px solid #444; border-radius: 8px; color: #fff; font-size: 16px; }
    .lead-input:focus { border-color: var(--accent); }

    /* FOOTER */
    footer { text-align: center; padding: 30px; color: var(--muted); border-top: 1px solid var(--border); font-size: 14px; margin-top: auto; }

    @keyframes fadeIn { to { opacity: 1; } }
    .hidden { display: none; }
  </style>
</head>
<body>

<header id="pageHeader">
    <div class="header-overlay">
        <img id="pageLogo" class="brand-logo" alt="Logo">
        <div class="brand-title" id="pageTitle">EventLens Gallery</div>
    </div>
</header>

<div class="container">
    <div class="search-card">
        <h3>Find Your Photos</h3>
        <p style="color:var(--muted); margin-bottom: 20px;">Upload a selfie to find all your photos instantly using AI.</p>
        
        <input type="file" id="selfieInput" accept="image/*" hidden onchange="prepareSelfie(this.files[0])">
        <button class="selfie-btn" type="button" onclick="document.getElementById('selfieInput').click()">
            <i class="fa-solid fa-camera"></i> Find My Photos
        </button>

        <div id="loader" class="hidden" style="margin-top: 20px; color: var(--accent);">
            <i class="fa-solid fa-circle-notch fa-spin fa-2x"></i>
            <p>Scanning faces... (Compressing image)</p>
        </div>
    </div>

    <h3 id="resultsTitle" class="hidden" style="margin-top: 30px;">Your Photos <span id="matchCount" style="color:var(--accent)"></span></h3>
    <div class="grid" id="galleryGrid"></div>
</div>

<footer id="pageFooter">
    Powered by EventLens
</footer>

<!-- LEAD FORM MODAL -->
<div class="modal" id="leadModal" style="z-index: 200;">
    <div class="search-card" style="max-width: 400px; margin: 0; text-align: left;">
        <h3 style="margin-top:0;">Almost there!</h3>
        <p style="color:var(--muted); margin-bottom: 20px; font-size: 14px;">Enter your details to view your matched photos.</p>
        
        <label style="font-size:12px; color:#888; margin-bottom:4px; display:block;">YOUR NAME</label>
        <input id="guestName" class="lead-input" placeholder="e.g. Rahul Sharma">
        
        <label style="font-size:12px; color:#888; margin-bottom:4px; display:block;">MOBILE NUMBER</label>
        <input id="guestMobile" class="lead-input" placeholder="e.g. 9876543210" type="tel">
        
        <button class="selfie-btn" type="button" onclick="submitGuestDetails()" style="width: 100%; justify-content: center; margin-top: 10px;">
            View Photos
        </button>
    </div>
</div>

<!-- VIEWER -->
<div class="modal" id="viewer">
    <button class="close-btn" onclick="closeViewer()">&times;</button>
    <img id="viewerImg" class="modal-img">
    <button class="download-btn" onclick="downloadPhoto()">Download HD</button>
</div>

<script>
    const API_BASE = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod";
    const urlParams = new URLSearchParams(window.location.search);
    const linkId = urlParams.get('linkId');
    const cid = urlParams.get('cid'); // Fallback Collection ID

    let currentPhotoUrl = '';
    let pendingSelfieBase64 = null; 

    // --- ON LOAD: FETCH BRANDING ---
    window.onload = async () => {
        // Build API URL intelligently
        let brandingApiUrl = "";
        
        if (linkId) {
            brandingApiUrl = `${API_BASE}/get-branding?linkId=${linkId}`;
        } else if (cid) {
            brandingApiUrl = `${API_BASE}/get-branding?cid=${cid}`;
        } else {
            console.log("No ID provided for branding.");
            return;
        }
        
        try {
            const res = await fetch(brandingApiUrl);
            if(res.ok) {
                const branding = await res.json();
                applyBranding(branding);
            } else {
                console.warn("Branding API returned:", res.status);
            }
        } catch(e) {
            console.error("Failed to fetch branding:", e);
        }
    };

    function applyBranding(data) {
        // 1. Title
        if(data.collection_name) {
            document.getElementById('pageTitle').innerText = data.collection_name;
            document.title = `${data.collection_name} – Gallery`;
        }
        
        // 2. Colors
        if(data.color) {
            document.documentElement.style.setProperty('--accent', data.color);
            document.documentElement.style.setProperty('--accent-soft', data.color + '26');
            // Update border colors dynamically if needed
            const logo = document.getElementById('pageLogo');
            if(logo) logo.style.borderColor = data.color;
        }
        
        // 3. Header Image
        if(data.header_img) {
            document.getElementById('pageHeader').style.backgroundImage = `url('${data.header_img}')`;
        }
        
        // 4. Logo
        if(data.logo) {
            const logo = document.getElementById('pageLogo');
            logo.src = data.logo;
            logo.style.display = 'block';
        }

        // 5. Footer
        if(data.footer) {
            document.getElementById('pageFooter').innerText = data.footer;
        }

        // 6. Layout (Grid vs Masonry)
        if(data.layout === 'masonry') {
            document.getElementById('galleryGrid').classList.add('masonry');
        }
    }

    // --- RESIZE IMAGE FUNCTION ---
    function resizeImage(file, maxWidth = 800) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;

                    if (width > maxWidth) {
                        height *= maxWidth / width;
                        width = maxWidth;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.85)); // Returns Base64
                };
                img.onerror = reject;
            };
            reader.onerror = reject;
        });
    }

    // Step 1: User Selects Selfie -> Resize -> Show Lead Modal
    async function prepareSelfie(file) {
        if(!file) return;
        
        document.getElementById('loader').classList.remove('hidden');
        document.querySelector('#loader p').innerText = "Optimizing Selfie...";
        
        try {
            pendingSelfieBase64 = await resizeImage(file, 800);
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('leadModal').classList.add('open');
        } catch(e) {
            console.error(e);
            alert("Could not process image. Please try another one.");
            document.getElementById('loader').classList.add('hidden');
        }
    }

    // Step 2: User Submits Details -> Process Search
    async function submitGuestDetails() {
        const name = document.getElementById('guestName').value;
        const mobile = document.getElementById('guestMobile').value;
        
        if(!name || !mobile) {
            alert("Please enter your name and mobile number.");
            return;
        }

        if(!pendingSelfieBase64) {
            alert("Selfie missing. Please select again.");
            document.getElementById('leadModal').classList.remove('open');
            return;
        }

        document.getElementById('leadModal').classList.remove('open');
        document.getElementById('loader').classList.remove('hidden');
        document.querySelector('#loader p').innerText = "Scanning faces...";
        document.getElementById('galleryGrid').innerHTML = '';
        document.getElementById('resultsTitle').classList.add('hidden');

        try {
            const res = await fetch(`${API_BASE}/search`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    linkId: linkId, 
                    selfie_image: pendingSelfieBase64
                })
            });

            const data = await res.json();
            document.getElementById('loader').classList.add('hidden');
            
            if(data.matches && data.matches.length > 0) {
                renderGallery(data.matches);
                
                // IMPORTANT: Fix for saving leads with correct Collection ID
                const payload = {
                    linkId: linkId,
                    collection_id: cid, // Now sending CID explicitly
                    mobile: mobile,
                    name: name,
                    selfie_image: pendingSelfieBase64,
                    photo_count: data.matches.length
                };
                
                fetch(`${API_BASE}/save-details`, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            } else {
                alert("No matches found. Try a clearer selfie with good lighting!");
            }
        } catch(e) {
            console.error(e);
            alert("Server Error. Please try again later.");
            document.getElementById('loader').classList.add('hidden');
        }
    }

    function renderGallery(photos) {
        const grid = document.getElementById('galleryGrid');
        document.getElementById('resultsTitle').classList.remove('hidden');
        document.getElementById('matchCount').innerText = `(${photos.length})`;

        grid.innerHTML = photos.map(p => `
            <div class="photo-item" onclick="openViewer('${p.url}')">
                <img src="${p.url}" loading="lazy">
            </div>
        `).join('');
    }

    function openViewer(url) {
        currentPhotoUrl = url;
        document.getElementById('viewerImg').src = url;
        document.getElementById('viewer').classList.add('open');
    }

    function closeViewer() {
        document.getElementById('viewer').classList.remove('open');
    }

    async function downloadPhoto() {
        if(!currentPhotoUrl) return;
        try {
            const res = await fetch(currentPhotoUrl);
            const blob = await res.blob();
            saveAs(blob, "eventlens_photo.jpg");
        } catch(e) {
            window.open(currentPhotoUrl, '_blank');
        }
    }
</script>
</body>
</html>
