<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>EventLens – Find Your Photos</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <!-- Confetti & ZIP Libs -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

  <style>
    :root {
      --bg-dark: #030305;
      --bg-panel: #0f0f12;
      --primary: #00e676;
      --primary-dim: rgba(0, 230, 118, 0.15);
      --text: #ffffff;
      --muted: #94949e;
      --border: rgba(255, 255, 255, 0.08);
      --glass-bg: rgba(20, 20, 23, 0.65);
      --radius-lg: 20px;
      --radius-full: 9999px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }

    body {
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 50% 10%, rgba(0, 230, 118, 0.05) 0%, transparent 60%);
      color: var(--text);
      font-family: "Plus Jakarta Sans", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
      padding: 20px;
      flex: 1;
    }

    /* HEADER */
    header {
      text-align: center;
      margin-bottom: 30px;
      padding-top: 10px;
    }
    header h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }
    header p { color: var(--muted); font-size: 14px; }

    /* CARDS */
    .card {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
      animation: slideUp 0.4s ease-out;
    }
    @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

    .step-title {
      font-family: 'Outfit', sans-serif;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--text);
    }

    /* UPLOAD AREA */
    .upload-box {
      border: 2px dashed var(--border);
      border-radius: var(--radius-lg);
      padding: 40px 20px;
      text-align: center;
      transition: 0.2s;
      background: rgba(255,255,255,0.01);
      cursor: pointer;
    }
    .upload-box:active { background: rgba(255,255,255,0.03); transform: scale(0.98); }
    
    .cam-icon {
      font-size: 48px;
      color: var(--primary);
      margin-bottom: 16px;
      filter: drop-shadow(0 0 10px var(--primary-dim));
    }

    /* PREVIEW */
    #previewContainer { text-align: center; margin-top: 20px; display: none; }
    #previewImg {
      width: 150px; height: 150px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--primary);
      box-shadow: 0 0 30px var(--primary-dim);
      margin: 0 auto 20px;
    }

    /* INPUTS & BUTTONS */
    input[type="text"], input[type="tel"] {
      width: 100%;
      padding: 14px 18px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: white;
      font-size: 16px;
      margin-bottom: 16px;
      font-family: inherit;
    }
    input:focus { border-color: var(--primary); background: rgba(0,0,0,0.5); }

    .btn {
      width: 100%;
      padding: 16px;
      border-radius: var(--radius-full);
      border: none;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      transition: 0.2s;
    }
    
    .btn.primary {
      background: var(--primary);
      color: #000;
      box-shadow: 0 8px 24px var(--primary-dim);
    }
    .btn.primary:active { transform: scale(0.97); }
    
    .btn.secondary {
      background: rgba(255,255,255,0.05);
      color: var(--text);
      margin-top: 12px;
    }

    .btn.whatsapp {
      background: #25D366;
      color: white;
      margin-top: 20px;
    }

    /* GALLERY */
    .search-bar { position: relative; margin-bottom: 16px; }
    .search-bar i { position: absolute; left: 16px; top: 14px; color: var(--muted); }
    .search-bar input { padding-left: 44px; margin-bottom: 0; border-radius: var(--radius-full); }

    .filters {
      display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 10px;
      scrollbar-width: none;
    }
    .filters::-webkit-scrollbar { display: none; }
    
    .chip {
      white-space: nowrap; padding: 8px 16px; border-radius: 20px;
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      color: var(--muted); font-size: 13px; cursor: pointer; font-weight: 500;
    }
    .chip.active { background: var(--primary-dim); border-color: var(--primary); color: var(--primary); }

    .grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    }
    .ph {
      aspect-ratio: 1; border-radius: 12px; overflow: hidden; position: relative;
      background: #000; cursor: pointer;
    }
    .ph img { width: 100%; height: 100%; object-fit: cover; }
    
    .ph .check {
      position: absolute; top: 8px; right: 8px;
      width: 24px; height: 24px; border-radius: 50%;
      background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.5);
      display: flex; align-items: center; justify-content: center;
      color: transparent; transition: 0.2s;
    }
    .ph.selected img { opacity: 0.6; transform: scale(0.95); transition:0.2s; }
    .ph.selected .check { background: var(--primary); border-color: var(--primary); color: #000; }

    /* VIEWER */
    .viewer {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.95); backdrop-filter: blur(10px);
      display: none; flex-direction: column; align-items: center; justify-content: center;
    }
    .viewer.open { display: flex; animation: fadeIn 0.3s; }
    .viewer img { max-width: 100%; max-height: 80vh; object-fit: contain; }
    .viewer-close { position: absolute; top: 20px; right: 20px; color: #fff; font-size: 24px; padding: 10px; cursor: pointer; }
    
    /* Loading */
    .loading-text { text-align: center; color: var(--primary); font-weight: 600; margin-top: 16px; }
    .dots::after { content: ' .'; animation: dots 1s steps(5, end) infinite; }
    @keyframes dots { 0%, 20% { content: ' .'; } 40% { content: ' ..'; } 60% { content: ' ...'; } 80%, 100% { content: ' ....'; } }

  </style>
</head>
<body>

<div class="container">
  <header>
    <h1><i class="fa-brands fa-camera-retro" style="color:var(--primary)"></i> EventLens</h1>
    <p>AI Powered Instant Photo Finder</p>
  </header>

  <!-- STEP 1: UPLOAD -->
  <div id="step1" class="card">
    <div class="step-title">1. Upload Your Selfie</div>
    
    <input type="file" id="cameraInput" accept="image/*" capture="user" style="display:none">
    <input type="file" id="galleryInput" accept="image/*" style="display:none">

    <div id="uploadArea">
      <label for="cameraInput" class="upload-box" style="display:block">
        <div class="cam-icon"><i class="fa-solid fa-camera"></i></div>
        <div style="font-weight:700; font-size:16px;">Take a Selfie</div>
        <div style="color:var(--muted); font-size:13px; margin-top:4px;">or tap to upload</div>
      </label>
      
      <div style="text-align:center; margin-top:16px;">
        <label for="galleryInput" style="color:var(--muted); font-size:14px; text-decoration:underline; cursor:pointer;">Upload from Gallery</label>
      </div>
    </div>

    <div id="previewContainer">
      <img id="previewImg">
      <div style="display:grid; gap:10px;">
        <button id="searchBtn" class="btn primary">Find My Photos <i class="fa-solid fa-wand-magic-sparkles"></i></button>
        <button id="retakeBtn" class="btn secondary">Retake Photo</button>
      </div>
    </div>

    <div id="loadingText" class="loading-text" style="display:none">Scanning faces with AI<span class="dots"></span></div>
  </div>

  <!-- STEP 2: DETAILS -->
  <div id="step2" class="card" style="display:none">
    <div class="step-title">2. One step closer!</div>
    <div style="text-align:center; margin-bottom:24px;">
      <div style="font-size:40px; font-weight:800; color:var(--primary)" id="matchCount">0</div>
      <div style="color:var(--muted)">Photos Found</div>
    </div>
    
    <input type="text" id="guestName" placeholder="Your Name (e.g. Rahul)">
    <input type="tel" id="guestMobile" placeholder="Mobile Number (10 digits)" maxlength="10">
    
    <button id="showGalleryBtn" class="btn primary">View My Photos <i class="fa-solid fa-arrow-right"></i></button>
  </div>

  <!-- STEP 3: GALLERY -->
  <div id="step3" class="card" style="display:none; padding:16px; background:transparent; border:none; box-shadow:none;">
    
    <div class="search-bar">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" id="searchInput" placeholder="Search (e.g. 'Stage', 'Smile')...">
    </div>

    <div class="filters">
      <div class="chip active" onclick="filterPhotos('ALL', this)">All</div>
      <div class="chip" onclick="filterPhotos('BEST', this)">⭐ Best</div>
      <div class="chip" onclick="filterPhotos('HAPPY', this)">😊 Smile</div>
      <div class="chip" onclick="filterPhotos('GROUP', this)">👥 Group</div>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <span style="font-size:13px; color:var(--muted)">Selected: <b id="selCount" style="color:#fff">0</b></span>
      <div style="display:flex; gap:8px;">
        <button class="btn secondary" style="padding:8px 16px; font-size:12px; width:auto; margin:0;" onclick="selectAll()">Select All</button>
        <button class="btn primary" style="padding:8px 16px; font-size:12px; width:auto; margin:0;" onclick="downloadZip()"><i class="fa-solid fa-download"></i></button>
      </div>
    </div>

    <div id="photoGrid" class="grid"></div>

    <button id="whatsappBtn" class="btn whatsapp" onclick="shareOnWhatsApp()" style="display:none;">
      <i class="fa-brands fa-whatsapp" style="font-size:20px;"></i> Share on WhatsApp
    </button>
  </div>

</div>

<!-- VIEWER -->
<div id="viewer" class="viewer">
  <div class="viewer-close" onclick="closeViewer()"><i class="fa-solid fa-xmark"></i></div>
  <img id="viewerImage">
  <div style="position:absolute; bottom:30px; display:flex; gap:20px;">
    <button class="btn secondary" style="width:50px; height:50px; border-radius:50%; padding:0;" onclick="prevImage()"><i class="fa-solid fa-chevron-left"></i></button>
    <button class="btn primary" style="width:auto; padding:0 24px;" onclick="toggleViewerSelect()">Select / Unselect</button>
    <button class="btn secondary" style="width:50px; height:50px; border-radius:50%; padding:0;" onclick="nextImage()"><i class="fa-solid fa-chevron-right"></i></button>
  </div>
</div>

<script>
  // YOUR APIS
  const SEARCH_API = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod/search";
  const SAVE_API = "https://oel3deh9q3.execute-api.ap-south-1.amazonaws.com/prod/save-details";

  // STATE
  let allPhotos = [];
  let filteredPhotos = [];
  let selectedUrls = new Set();
  let selfieBase64 = null;
  let currentViewerIndex = 0;
  let currentMatchCount = 0; 

  // --- UPLOAD LOGIC ---
  function handleFileSelect(e) {
    const file = e.target.files[0];
    if(file){
      const reader = new FileReader();
      reader.onload = function(ev) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const MAX_WIDTH = 800;
          let width = img.width;
          let height = img.height;
          if (width > height) { if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; } }
          else { if (height > MAX_WIDTH) { width *= MAX_WIDTH / height; height = MAX_WIDTH; } }
          canvas.width = width;
          canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          selfieBase64 = canvas.toDataURL('image/jpeg', 0.8); // slight compression
          
          document.getElementById('previewImg').src = selfieBase64;
          document.getElementById('uploadArea').style.display = 'none';
          document.getElementById('previewContainer').style.display = 'block';
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    }
  }

  document.getElementById('cameraInput').addEventListener('change', handleFileSelect);
  document.getElementById('galleryInput').addEventListener('change', handleFileSelect);
  
  document.getElementById('retakeBtn').addEventListener('click', () => {
    selfieBase64 = null;
    document.getElementById('previewContainer').style.display = 'none';
    document.getElementById('uploadArea').style.display = 'block';
    document.getElementById('cameraInput').value = '';
    document.getElementById('galleryInput').value = '';
  });

  // --- SEARCH LOGIC ---
  document.getElementById('searchBtn').addEventListener('click', async () => {
    if(!selfieBase64) return alert("Please upload a selfie first.");
    
    // Get Link ID from URL (e.g. index.html?linkId=XYZ)
    const params = new URLSearchParams(window.location.search);
    const linkId = params.get('linkId');
    
    if (!linkId) {
      alert("Error: Invalid Link. Please open this page from the link shared by your photographer.");
      return;
    }

    const loadingText = document.getElementById('loadingText');
    loadingText.style.display = 'block';
    document.getElementById('searchBtn').disabled = true;

    try {
      const res = await fetch(SEARCH_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ linkId: linkId, selfie_image: selfieBase64 })
      });
      
      const data = await res.json();
      allPhotos = data.matches || [];
      
      // Filter out invalid URLs
      allPhotos = allPhotos.filter(p => p.url && p.url.startsWith('http'));

      filteredPhotos = [...allPhotos];
      currentMatchCount = allPhotos.length;
      
      document.getElementById('matchCount').innerText = currentMatchCount;
      
      // Transition
      document.getElementById('step1').style.display = 'none';
      document.getElementById('step2').style.display = 'block';
      
      if (currentMatchCount > 0) {
        confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: ['#00e676', '#6366f1'] });
      } else {
        alert("No photos found matching your face. Try a clearer selfie?");
      }

    } catch(err) { 
      console.error(err);
      alert("Failed to search photos. Please try again."); 
    }
    finally { 
      document.getElementById('searchBtn').disabled = false; 
      loadingText.style.display = 'none';
    }
  });

  // --- DETAILS & SAVE LOGIC ---
  document.getElementById('showGalleryBtn').addEventListener('click', () => {
    const name = document.getElementById('guestName').value.trim();
    const mobile = document.getElementById('guestMobile').value.trim();
    
    if(!name || mobile.length < 10) return alert("Please enter valid name and mobile number.");

    const params = new URLSearchParams(window.location.search);
    const linkId = params.get('linkId');
    const COLLECTION_ID = params.get('cid') || "default-collection";

    // Async save (don't wait)
    fetch(SAVE_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        collection_id: COLLECTION_ID,
        link_id: linkId,
        linkId: linkId,
        name: name, 
        mobile: mobile, 
        selfie_image: selfieBase64,
        photo_count: currentMatchCount
      })
    }).catch(console.error);

    document.getElementById('step2').style.display = 'none';
    document.getElementById('step3').style.display = 'block';
    renderGrid();
    setTimeout(() => { document.getElementById('whatsappBtn').style.display = 'block'; }, 1000);
  });

  // --- GALLERY LOGIC ---
  document.getElementById('searchInput').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    filteredPhotos = allPhotos.filter(photo => (photo.ai_tags || []).join(' ').toLowerCase().includes(q));
    renderGrid();
  });

  window.filterPhotos = (type, btn) => {
    // Reset active chips
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');

    if(type === 'ALL') filteredPhotos = [...allPhotos];
    // Mock filters (backend usually returns tags)
    // Here implies we assume tags exist
    else if(type === 'HAPPY') filteredPhotos = allPhotos.filter(p => (p.ai_tags||[]).includes('Smile') || (p.ai_tags||[]).includes('Happy'));
    else if(type === 'GROUP') filteredPhotos = allPhotos.filter(p => (p.ai_tags||[]).includes('Group'));
    else if(type === 'BEST') filteredPhotos = allPhotos.slice(0, 5); // Just top 5 for demo

    renderGrid();
  };

  function renderGrid() {
    const grid = document.getElementById('photoGrid');
    grid.innerHTML = "";
    
    if(filteredPhotos.length === 0) {
      grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; padding:20px; color:var(--muted)">No photos found</div>';
      return;
    }

    filteredPhotos.forEach((photo, index) => {
      const div = document.createElement('div');
      div.className = `ph ${selectedUrls.has(photo.url) ? 'selected' : ''}`;
      // Click on checkmark triggers select, click on image opens viewer
      div.onclick = (e) => {
        if(e.target.closest('.check')) toggleSelect(photo.url);
        else openViewer(index);
      };
      
      div.innerHTML = `
        <img src="${photo.url}" loading="lazy">
        <div class="check"><i class="fa-solid fa-check"></i></div>
      `;
      grid.appendChild(div);
    });
    document.getElementById('selCount').innerText = selectedUrls.size;
  }

  function toggleSelect(url) {
    if(selectedUrls.has(url)) selectedUrls.delete(url);
    else selectedUrls.add(url);
    renderGrid();
  }

  window.selectAll = () => {
    if(selectedUrls.size === filteredPhotos.length) selectedUrls.clear();
    else filteredPhotos.forEach(p => selectedUrls.add(p.url));
    renderGrid();
  };

  window.downloadZip = async function() {
    if(selectedUrls.size === 0) return alert("Please select photos to download!");
    
    const btn = document.querySelector('button[onclick="downloadZip()"]');
    const originalContent = btn.innerHTML;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
    btn.disabled = true;

    try {
      const zip = new JSZip();
      const urls = Array.from(selectedUrls);
      
      // Fetch concurrently in batches
      const fetchPhoto = async (url, i) => {
        try {
          const blob = await fetch(url).then(r => r.blob());
          zip.file(`EventLens_Photo_${i+1}.jpg`, blob);
        } catch(e) { console.error("Failed to dl", url); }
      };

      await Promise.all(urls.map((u, i) => fetchPhoto(u, i)));

      const content = await zip.generateAsync({type:"blob"});
      saveAs(content, "My_Event_Photos.zip");
    } catch(e) {
      alert("Download failed. Try selecting fewer photos.");
    } finally {
      btn.innerHTML = originalContent;
      btn.disabled = false;
    }
  };

  window.shareOnWhatsApp = () => {
    const text = `🎉 Found my photos using EventLens AI! Check it out: ${window.location.href}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
  };

  // --- VIEWER LOGIC ---
  function openViewer(index) {
    currentViewerIndex = index;
    const p = filteredPhotos[index];
    if(!p) return;
    document.getElementById('viewerImage').src = p.url;
    document.getElementById('viewer').classList.add('open');
  }
  
  window.closeViewer = () => document.getElementById('viewer').classList.remove('open');
  
  window.nextImage = () => { 
    currentViewerIndex = (currentViewerIndex + 1) % filteredPhotos.length; 
    openViewer(currentViewerIndex); 
  };
  
  window.prevImage = () => { 
    currentViewerIndex = (currentViewerIndex - 1 + filteredPhotos.length) % filteredPhotos.length; 
    openViewer(currentViewerIndex); 
  };
  
  window.toggleViewerSelect = () => {
    const url = filteredPhotos[currentViewerIndex].url;
    toggleSelect(url);
    // Show visual feedback in viewer? 
    // Usually rerender grid is enough, but user might want to see 'selected' state in viewer.
    // For simplicity, we just toggle.
  };

</script>
</body>
</html>
